<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- dark rounded bg -->
  <rect width="64" height="64" rx="14" fill="#06080d"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="#63b3ff" stroke-width="0.5" opacity="0.2"/>

  <!-- F - white, bold geometric -->
  <rect x="8" y="14" width="6" height="36" rx="1" fill="#f0f0f5"/>
  <rect x="8" y="14" width="18" height="6" rx="1" fill="#f0f0f5"/>
  <rect x="8" y="28" width="14" height="5" rx="1" fill="#f0f0f5"/>

  <!-- S - blue gradient, bold geometric -->
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#63b3ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect x="33" y="14" width="20" height="6" rx="1" fill="url(#sg)"/>
  <rect x="33" y="14" width="6" height="18" rx="1" fill="url(#sg)"/>
  <rect x="33" y="28" width="20" height="5" rx="1" fill="url(#sg)"/>
  <rect x="47" y="28" width="6" height="18" rx="1" fill="url(#sg)"/>
  <rect x="33" y="44" width="20" height="6" rx="1" fill="url(#sg)"/>

  <!-- Green dot -->
  <circle cx="57" cy="9" r="3.5" fill="#34d399"/>
</svg>
