      {
        id: 19,
        title: "Refren i terytorium (Plateau 11)",
        html: `<h4 class="r-h3">18.1. Środowiska i rytm</h4>
<p>Plateau „1837: O refrenie" konstruuje teorię terytorium i ekspresji, łącząc etologię z estetyką. <strong>Środowisko</strong> (<em>milieu</em>) to wibrujący blok czasoprzestrzeni zdefiniowany przez periodyczną powtarzalność określonego komponentu. <strong>Rytm</strong> stanowi odpowiedź środowisk na chaos — nie jest metrum ani kadencją, lecz „nierównym" przejściem pomiędzy środowiskami. Rytm istnieje w „pomiędzy", na granicy jednego środowiska i drugiego. Refren jest „pryzmatem" lub „kryształem" czasoprzestrzeni, którego istoty żywe używają, by ustalić centrum w sercu chaosu, zorganizować stabilny „dom" i wreszcie wyrwać się z okręgu, by połączyć się z siłami kosmicznymi.</p>
<h4 class="r-h3">18.2. Terytorium jako ekspresja</h4>
<p><strong>Terytorium</strong> powstaje wówczas, gdy komponenty środowiskowe przestają być czysto funkcjonalne i stają się <strong>ekspresyjne</strong> lub jakościowe. Terytorium jest pierwszą asamblacją — „posiadaniem" głębszym niż „bycie." Wyznacza ono krytyczny dystans między członkami gatunku, organizując przestrzeń wokół ekspresyjnych znaków. Centralne twierdzenie: sztuka nie jest ludzkim przywilejem, lecz aktem etologicznym, terytorializującym, obecnym w naturze. Ptak scenograf (<em>Stagemaker Bird</em>) odwracający liście, by ukazać ich bladą stronę, tworzy „materię ekspresji" — terytorium jako dzieło sztuki natury.</p>
<h4 class="r-h3">18.3. Deterytorializacja: od terytorium do kosmosu</h4>
<p>Deterytorializacja to ruch, poprzez który opuszcza się terytorium. Refren pełni funkcję „wektora deterytorializacji", umożliwiającego asamblacji otwarcie się na zewnętrze, przekroczenie granic terytorialnych ku kosmosowi. Ruch życia i sztuki to progresja od zestratyfikowanych środowisk do asamblacji terytorialnych i wreszcie do maszyny kosmicznej. <strong>Natal</strong> to intensywne centrum terytorium, często projektowane na zewnątrz jako „nieznana ojczyzna." <strong>Ziemia</strong> to zdeterytorializowany korelat absolutnej deterytorializacji — „glacjalna rzeczywistość" przynależąca do kosmosu, a nie do żadnego konkretnego terytorium.</p>
<h4 class="r-h3">18.4. Klasycyzm, romantyzm, sztuka nowoczesna</h4>
<p>Autorzy konstruują periodyzację estetyczną: <strong>klasycyzm</strong> operuje relacją forma–materia, organizując chaos w zakodowane środowiska. <strong>Romantyzm</strong> koncentruje się na Terytorium i Ziemi — artysta jest „Bohaterem", który stawia czoła bezgruntowej sile Ziemi. <strong>Sztuka nowoczesna</strong> (Epoka Kosmiczna) zastępuje relację forma–materia relacją <strong>materiał–siła</strong> — celem jest opracowanie materiału molekularnego zdolnego do „uchwycenia" niewidzialnych sił kosmicznych. Syntezator jest narzędziem technologicznym kompozycji konsystencji, które molekularyzuje materię w celu uchwycenia energii kosmicznej.</p>
<h4 class="r-h3">18.5. Mały refren i wielki refren</h4>
<p><strong>Mały refren</strong> to melodia terytorialna — dziecko śpiewające w ciemności, by stworzyć centrum, punkt stabilności w chaosie. <strong>Wielki refren</strong> to refren kosmiczny, zdeterytorializowany, który łączy się z siłami przyszłości i wszechświata, przekraczając wszelkie terytoria. Przejście od małego do wielkiego refrenu stanowi model etyczno-estetyczny całego <em>Tysiąca plateau</em>.</p>
<p>Wśród przykładów mała fraza Vinteuila z <em>Poszukiwania</em> Prousta jest początkowo „plakatem" miłości Swanna, lecz ostatecznie ujawnia plan konsystencji i zdeterytorializowany potencjał muzyki. Syntezator to nowoczesne narzędzie techniczne „kompozycji konsystencji", które molekularyzuje materię w celu uchwycenia energii kosmicznej. Implikacje polityczne refrenu są fundamentalne: muzyka i refreny (bębny, trąby) mogą wciągać ludzi w „czarną dziurę" zniszczenia lub na „linię abolicji" — faszyzm wykorzystywał maszynę muzyczną na skalę bezprecedensową. Nowoczesna „depopulacja" (przez mass media) oznacza, że „ludu brakuje" — zadaniem „kosmicznego rzemieślnika" (poety, artysty) jest uwolnienie molekularnych populacji, które mogłyby zrodzić „lud, który ma nadejść" (<em>un peuple à venir</em>). Polityka łączy się tu nierozerwalnie z estetyką — mikropolityka refrenu jest zarazem kwestią organizacji pragnienia i oporu wobec faszystowskich reterytorializacji.</p>
<p>Refren łączy się z pojęciem CbO jako „glacjalnej rzeczywistości" lub „jajka", na którym refren kreśli swoje linie — jest to plan konsystencji opierający się edypalizacji. Deleuze i Guattari przeciwstawiają zwierzę edypalne (domowe zwierzątko, pies szczekający po kość) zwierzęciu stadnemu lub „anomalnemu" (Moby Dick), które reprezentuje prawdziwe stawanie-się. Terytorium jest zatem nie tylko kategorią etologiczną — jest pierwszą asamblacją, „posiadaniem" głębszym niż „bycie", twórczym aktem ekspresji, który łączy naturę ze sztuką i sztuką z polityką.</p>`

      {
        id: 20,
        title: "Maszyna wojenna i nomadologia (Plateau 12)",
        html: `<h4 class="r-h3">19.1. Dwa bieguny państwa</h4>
<p>Plateau „1227: Traktat o nomadologii — Maszyna wojenna" stanowi najbardziej rozbudowaną analizę polityczną w <em>Tysiącu plateau</em>. Opierając się na badaniach Georgesa Dumézila, Deleuze i Guattari wskazują, że suwerenność polityczna posiada dwie głowy: <strong>magicznego króla-despotę</strong> (procesy chwytania, wiązania, władza magiczno-religijna) i <strong>króla-prawnika</strong> (pakty, kontrakty, organizacja prawna i racjonalna). Oba bieguny stanowią <em>milieu</em> wewnętrzności (<em>interiority</em>) i wspólnie tworzą aparat państwowy jako warstwę stratyfikacyjną.</p>
<h4 class="r-h3">19.2. Maszyna wojenna jako zewnętrzność</h4>
<p>Maszyna wojenna jest z definicji <strong>zewnętrzna</strong> wobec aparatu państwowego. Państwo nie posiada własnej maszyny wojennej — może ją jedynie zaanektować w formie instytucji militarnej, co zawsze wiąże się z ryzykiem, napięciami i niestabilnością. Zewnętrzność maszyny wojennej nie jest redukowalna do dialektyki z państwem — jest to zewnętrzność ontologiczna, nie geograficzna. Reprezentowana jest przez bóstwa takie jak Indra czy Thor — „człowiek wojny" wnosi furię, szybkość, tajemnicę i moc metamorfozy. Z punktu widzenia państwa jego natura jest postrzegana negatywnie — jako grzeszna, szalona lub nielegalna, ponieważ destabilizuje on państwowy porządek suwerenności.</p>
<p>Główna teza: maszyna wojenna jest wynalazkiem nomadów, a jej pierwotnym celem nie jest wojna, lecz <strong>zajmowanie i utrzymywanie gładkiej przestrzeni</strong>. Wojna staje się obiektem maszyny wojennej dopiero w momencie jej zderzenia z państwem, które dąży do prążkowania przestrzeni i chwytania przepływów. Apropriacja maszyny wojennej przez państwo, przekształcająca ją w aparat militarny podległy politycznym celom suwerena, nigdy nie jest całkowita — maszyna wojenna zachowuje swoją zewnętrzność, gotowa wymknąć się chwytowi przy każdej okazji.</p>
<h4 class="r-h3">19.3. Nauka mniejsza vs. królewska</h4>
<p>Opozycja między <strong>nauką królewską</strong> (państwową) a <strong>nauką mniejszą</strong> (nomadyczną) odpowiada opozycji między językiem większościowym a mniejszościowym z plateau 4. Nauka królewska dąży do ustalania stałych praw, operuje w przestrzeni prążkowanej (metrycznej), posługuje się modelem hylomorficznym (nakładanie formy na jednorodną materię). Nauka mniejsza jest itinerantna (wędrowna), posługuje się modelem hydraulicznym (przepływy, turbulencje), zajmuje się problemami (zdarzeniami) zamiast twierdzeniami i dąży do podążania za materią-przepływem (<em>phylum</em> maszynowe). Architektura gotycka jest tutaj przykładem nauki nomadycznej — „operatywna geometria rysu" tworzy gładkie, wznoszące się przestrzenie w opozycji do państwowej administracji narzucającej model hylomorficzny stałych form.</p>
<h4 class="r-h3">19.4. Przestrzeń nomadyczna (gładka)</h4>
<p>Przestrzeń nomadyczna jest <strong>przestrzenią gładką</strong> (<em>nomos</em>), którą się zajmuje bez jej liczenia, w przeciwieństwie do przestrzeni prążkowanej (<em>polis</em>), którą się liczy, aby ją zająć. Nomadzi nie migrują (nie idą z punktu do punktu), lecz trzymają się przestrzeni gładkiej, czyniąc z punktów jedynie punkty odpoczynku na trajektorii. Porównanie szachów (gra państwowa, prążkowana, hierarchiczna) i Go (gra nomadyczna, gładka, terytorialna) stanowi jedno z najbardziej znanych rozróżnień <em>Tysiąca plateau</em>.</p>
<h4 class="r-h3">19.5. Narzędzia/znaki vs. broń/biżuteria</h4>
<p>Narzędzia są powiązane z modelem pracy, grawitacją i pismem (znakowanie materii) — są introjektywne, podporządkowane organizacji pracy. Broń wiąże się z modelem wolnego działania, czystą szybkością i biżuterią, która stanowi „afekty" broni i jest właściwa dla obiektów w ruchu — jest projektywna, ukierunkowana na deterytorializację.</p>
<h4 class="r-h3">19.6. Metalurgia i phylum maszynowe</h4>
<p>Kowal jest pierwotnym typem wędrownego rzemieślnika, który <strong>podąża za phylum maszynowym materii</strong> — myślą o materii-przepływie. Metalurgia ujawnia, że materia posiada własne, nieorganiczne życie. Kowal zajmuje szczególną pozycję — nie należy w pełni ani do państwa, ani do nomadów, lecz przemieszcza się w „przestrzeni dziurawej" (<em>holey space</em>) — trzeciej przestrzeni, która komunikuje się z oboma pozostałymi typami.</p>
<h4 class="r-h3">19.7. Przestrzeń gładka, prążkowana, dziurawa</h4>
<p>Trzy typy przestrzeni: <strong>prążkowana</strong> (państwo mierzy, buduje drogi, tworzy granice — striuje przestrzeń), <strong>gładka</strong> (nomadzi operują w pustynnej, morskiej, stepowej przestrzeni ciągłej zmienności) i <strong>dziurawa</strong> (<em>holey space</em> — kowale drążą przejścia w podłożu, tworząc trzecią przestrzeń, podziemną i mineralną, łączącą gładkie i prążkowane). Te trzy przestrzenie nie istnieją w izolacji, lecz nieustannie się transformują i przenikają.</p>
<h4 class="r-h3">19.8. Implikacje polityczne i odwrócenie Clausewitza</h4>
<p>Argumentacja plateau prowadzi do fundamentalnego odwrócenia formuły Clausewitza: w nowoczesności to nie wojna jest kontynuacją polityki, lecz <strong>polityka staje się kontynuacją wojny</strong>. Maszyna wojenna, zautomatyzowana i planetarna, bierze za obiekt pokój (terroru lub odstraszania), czyniąc z państw jedynie swoje części składowe. Nowe maszyny wojenne (partyzantka, ruchy rewolucyjne) powstają poprzez wytyczanie linii ujścia i tworzenie przestrzeni gładkich przeciwko globalnej aksjomatyce kapitalizmu.</p>
<p>Wśród przykładów historycznych: Huryci (Hyksosi) wprowadzający kompozycję numeryczną do Egiptu, Czyngis-chan organizujący step, Mojżesz tworzący maszynę sprawiedliwych na pustyni. Kleist (Pentesilea i Achilles) modeluje zewnętrzność i szybkość maszyny wojennej — postaci opętane furią, szybkością i metamorfozą, nieredukowalne do logiki państwowej.</p>`

      {
        id: 21,
        title: "Aparat chwytania (Plateau 13)",
        html: `<h4 class="r-h3">20.1. Urstaat: hipoteza paleolitycznego państwa</h4>
<p>Plateau „7000 p.n.e. — Aparat chwytania" konstruuje teorię państwa jako aparatu chwytania. Deleuze i Guattari odrzucają ewolucjonistyczny pogląd, jakoby państwo było wynikiem postępującego rozwoju rolnictwa i technologii. Przywołując przykład Çatal Hüyük, sugerują, że to państwo (jako ośrodek miejski) mogło <strong>stworzyć</strong> rolnictwo poprzez krzyżowanie nasion i oswajanie zwierząt zebranych z różnych terytoriów. Państwo pojawia się „od razu", w pełnej formie, jako nieuwarunkowany <strong>Urstaat</strong>. Społeczeństwa prymitywne są definiowane przez mechanizmy uprzedzania i zapobiegania (<em>anticipation-prevention</em>) — mają na celu niedopuszczenie do krystalizacji władzy centralnej. Oznacza to, że państwo jest granicą, którą społeczeństwa prymitywne zawsze „wyczuwały" i starały się odepchnąć.</p>
<h4 class="r-h3">20.2. Trzy formy chwytania: renta, podatek, zysk</h4>
<p>Aparat chwytania operuje przez trzy powiązane formy: <strong>renta gruntowa</strong> (chwytanie terytorium poprzez porównanie ziem i ich monopolistyczne przywłaszczenie — ustanawia własność prywatną ziemi); <strong>zysk</strong> (chwytanie działalności/pracy poprzez porównanie trudów i monopolistyczne przywłaszczenie nadwyżki pracy — ustanawia wartość dodatkową); <strong>podatek</strong> (chwytanie wymiany poprzez stworzenie pieniądza jako generalnego ekwiwalentu — to podatek tworzy pieniądz, a nie handel, co stanowi fundamentalne odwrócenie klasycznej ekonomii politycznej).</p>
<p>Przemoc państwowa (policja) jest przemocą <strong>uprzednio dokonaną</strong> (<em>preaccomplished violence</em>), która ustanawia prawo do chwytania, zanim jeszcze zostanie bezpośrednio użyta. Prawo poprzedza faktyczną przemoc — to fundamentalny mechanizm legitymizacji państwa.</p>
<h4 class="r-h3">20.3. Poddanie społeczne vs. zniewolenie maszynowe</h4>
<p>Autorzy wyodrębniają dwa sposoby, w jakie aparat chwytania operuje na ludziach: <strong>zniewolenie maszynowe</strong> (<em>machinic enslavement</em>) — człowiek jest częścią składową maszyny, dotyczy zarówno archaicznych imperiów (człowiek jako trybik megamaszyny despotycznej), jak i nowoczesnej cybernetyki (człowiek jako interfejs sieci informatycznych); oraz <strong>poddanie społeczne</strong> (<em>social subjection</em>) — państwo konstytuuje człowieka jako podmiot używający maszyny (klasyczny kapitalizm przemysłowy, w którym robotnik jest podmiotem wobec maszyny jako narzędzia). Rozróżnienie to pozwala zrozumieć specyfikę współczesnych form dominacji, w których obie modalności nakładają się na siebie.</p>
<h4 class="r-h3">20.4. Aksjomatyka kapitalistyczna</h4>
<p>Kapitalizm nie opiera się na kodach (znaczeniach jakościowych, tradycyjnych hierarchiach), lecz na funkcjonalnej <strong>aksjomatyce</strong> operującej bezpośrednio na zdekodowanych przepływach (ilościach abstrakcyjnych). Aksjomatyka jest elastyczna — można do niej <strong>dodawać</strong> aksjomaty (państwo socjaldemokratyczne: regulowanie przepływów przez nowe reguły, rozszerzanie praw socjalnych) lub je <strong>odejmować</strong> (państwo totalitarne lub neoliberalne: redukcja do minimum, deregulacja). Wszystkie nowoczesne państwa — demokratyczne, totalitarne, socjalistyczne — są <strong>izomorficzne</strong> w odniesieniu do światowego rynku, różniąc się jedynie konkretnymi zmiennymi.</p>
<h4 class="r-h3">20.5. Dodawanie i odejmowanie aksjomatów</h4>
<p>Kapitalizm potrzebuje państwa jako <strong>modelu realizacji</strong> swojej światowej aksjomatyki. Państwo moderuje „absolutną deterytorializację" kapitału, dostarczając mu niezbędnych reterytorializacji (np. rynek wewnętrzny, prawa pracy, kontrola granic). Peryferie globalnego kapitalizmu (Trzeci Świat) doświadczają jednocześnie najostrzejszego zniewolenia maszynowego i najsłabszego poddania społecznego — brak praw obywatelskich przy pełnej eksploatacji. Mniejszości i ruchy rewolucyjne stanowią zbiory nieprzeliczalne, które wymykają się aksjomatyce i mogą tworzyć nowe maszyny wojenne.</p>
<p>Wśród przykładów ilustrujących mechanizmy chwytania: Korynt — podatek wprowadził pieniądz, by umożliwić wykup ziemi przez biednych, co stworzyło obieg pieniężny i przekształciło relacje społeczne. NASA — państwo (USA) zahamowało deterytorializację w kosmos, by reterytorializować kapitał na „pasie" wokół Ziemi — technologia kosmiczna podporządkowana logice kapitalistycznej. Mit o zombie jako metafora zniewolenia maszynowego — człowiek pozbawiony podmiotowości, funkcjonujący jako czysta siła robocza. Pojęcie „penultimatywności" — marginalny punkt, w którym asamblacja musi się zacząć od nowa lub zmienić naturę (przejście od limitu do progu) — ilustruje dynamikę aksjomatyki, która nieustannie dodaje lub odejmuje aksjomaty, nigdy nie osiągając stabilnego stanu.</p>
<p>Plateau 13 łączy się bezpośrednio z <em>Anty-Edypem</em> poprzez rozwinięcie tezy o kapitalizmie jako abstrakcyjnej koniunkcji dwóch zdekodowanych przepływów: wolnej pracy (odłączonej od ziemi) i niezależnego kapitału (odłączonego od produkcji). Państwo w <em>Anty-Edypie</em> było „ciałem pełnym" socius; tutaj jest aparatem chwytania, który przypisuje sobie produktywność (renta, zysk) na powierzchni zapisu. Ziemia jest zdeterytorializowanym CbO, na którym państwa budują swoje stratyfikacje i prążkowania.</p>`

      {
        id: 22,
        title: "Gładkie i prążkowane (Plateau 14)",
        html: `<h4 class="r-h3">21.1. Sześć modeli analizy</h4>
<p>Plateau „1440: Gładkie i prążkowane" systematyzuje fundamentalną dwuznaczność przestrzenną poprzez sześć modeli analizy:</p>
<p><strong>Model technologiczny:</strong> Tkanina (prążkowana) vs. filc (gładki). Tkanina to dwa równoległe elementy (osnowa i wątek) krzyżujące się prostopadle — przestrzeń zamknięta, ograniczona, z określonym góra–dół. Filc to „anty-tkanina" utworzona przez splatanie włókien poprzez folowanie — nieskończona, otwarta, bez stałych elementów czy centrum. Patchwork stanowi pierwotny przykład przestrzeni gładkiej — amorficzna kolekcja zestawionych kawałków (przestrzeń Riemannowska).</p>
<p><strong>Model muzyczny:</strong> Prążkowane obejmuje „czas pulsowany" i metryczne wielorakości, gładkie — „czas niepulsowany" i ciągłą zmienność. Pierre Boulez jest głównym źródłem tego modelu.</p>
<p><strong>Model morski:</strong> Morze jest archetypem przestrzeni gładkiej — kierunkowej, wektorowej, percypowanej haptycznie (dotykowo). Historycznie państwo prążkowało morze przez nawigację astronomiczną i siatki kartograficzne. Nowoczesna technologia (np. strategiczny okręt podwodny) „retroaktywnie wygładziła" morze.</p>
<p><strong>Model matematyczny:</strong> Przestrzeń Riemannowska (gładka) vs. euklidesowa (prążkowana). Riemannowskie wielorakości to amorficzne kolekcje „sąsiedztw", gdzie połączenia nie są z góry określone. Fraktale definiują przestrzeń gładką — agregaty o wymiarach ułamkowych, które wypełniają przestrzeń bez stawania się pełnym wymiarem.</p>
<p><strong>Model fizyczny:</strong> Praca (prążkowana) vs. wolne działanie (gładkie). Praca jest definiowana przez grawitację i przepływ laminarny, wolne działanie — przez <em>clinamen</em> (najmniejsze odchylenie) i wir (turbulencję).</p>
<p><strong>Model estetyczny:</strong> Przestrzeń optyczna (prążkowana) vs. haptyczna (gładka). Sztuka nomadyczna egzemplifikowana jest przez „skręcone zwierzęta" i „linię abstrakcyjną" (gotycką/nomadyczną), która opisuje gładką przestrzeń.</p>
<h4 class="r-h3">21.2. Filc vs. tkanina, haptyczne vs. optyczne</h4>
<p>Opozycja filc/tkanina jest modelem materialnym dla opozycji gładkie/prążkowane. Filc nie ma osnowy ani wątku — jest splątaniem bez porządku, bezgranicznym, nieskończenie rozszerzalnym. Tkanina natomiast wymaga ramy (krosna), jest przestrzenią ograniczoną, hierarchiczną. Opozycja haptyczne/optyczne odpowiada temu samemu napięciu: widzenie bliskie (haptyczne) nie rozróżnia tła i figury, nie zna perspektywy — orientacja zmienia się krok po kroku, lokalnie. Widzenie odległe (optyczne) organizuje formy, tło i centralną perspektywę.</p>
<h4 class="r-h3">21.3. Interakcja i wzajemna transformacja</h4>
<p>Centralnym argumentem jest twierdzenie, że gładkie i prążkowane istnieją <strong>tylko w mieszaninie</strong> — żadna przestrzeń nie jest czysto jednym lub drugim. Dwie przestrzenie pozostają w ciągłym stanie przepływu i wzajemnej transformacji:</p>
<p><strong>Prążkowanie gładkiego:</strong> Aparat państwowy nieustannie chwyta przestrzeń gładką (morze, pustynię, powietrze), by ją zmierzyć, podzielić i kontrolować. Nawigacja astronomiczna prążkuje morze; kartografia prążkuje pustynię; prawo lotnicze prążkuje powietrze.</p>
<p><strong>Wygładzanie prążkowanego:</strong> Przestrzeń gładka nieustannie wyłania się z wnętrza prążkowanego. Miasto jest siłą prążkowania, lecz jednocześnie wydziela przestrzenie gładkie (slumsy, nomadyczne tranzyty, squaty), które zwracają się przeciw państwu. Strategiczny okręt podwodny „retroaktywnie wygładza" morze, używając go jako przestrzeni absolutnego ruchu do kontrolowania prążkowanego lądu.</p>
<p>Nie należy zatem wartościować a priori — gładkie nie jest z góry „lepsze" od prążkowanego. Przestrzeń gładka może być równie dobrze instrumentem dominacji (gładkość globalnego kapitału) jak i oporu (gładkość ruchu partyzanckiego). Kluczowe jest śledzenie konkretnych transformacji i przejść między nimi. Kapitalizm operuje jako aksjomatyka dokonująca „zgeneralizowanego maszynowego zniewolenia" — choć opiera się na najsurowszym prążkowaniu (kontrola pracy), jednocześnie tworzy zdeterytorializowaną gładką przestrzeń dla absolutnej prędkości cyrkulującego kapitału. To fundamentalna dwuznaczność kapitalizmu, która łączy analizę z tego plateau z analizą aksjomatyki z plateau 13.</p>
<p>Wśród przykładów: szachy vs. Go (powtórzony motyw przewodni — szachy jako prążkowana gra państwowa z zakodowanymi figurami, frontem i tyłem, Go jako gładka gra maszyny wojennej z anonimowymi żetonami i otwartą przestrzenią); architektura gotycka (nauka nomadyczna — materiały-siły tworzące gładkie, wznoszące się przestrzenie); przestrzeń eskimoska/pustynna (haptyczne przestrzenie bez horyzontu ani perspektywy, nawigacja zależna od lokalnych, niemetrycznych haecceitas — wiatrów, dźwięków, tekstur). CbO jest przestrzennym korelatem przestrzeni gładkiej — jest intensywne, nieformalne, wypełnione wielorakościami zamiast zorganizowanymi podmiotami. Przestrzeń prążkowana odpowiada poddaniu społecznemu (robotnik jako podmiot używający narzędzia), podczas gdy nowe „gładkie" przestrzenie globalnego kapitalizmu ułatwiają zniewolenie maszynowe (ludzie jako części składowe systemu informatycznego, logistycznego).</p>`

        html: `<h4 class="r-h3">22.1. Synteza: wszystko jest kompleksem linii</h4>
<p>Konkluzja <em>Tysiąca plateau</em> dokonuje syntezy wszystkich pojęć wypracowanych w poprzednich plateau. Centralnym twierdzeniem jest sformułowanie: <strong>wszystko jest kompleksem linii</strong>. Jesteśmy jednocześnie złożeni z trzech typów linii: sztywnych linii molarnych (segmenty makropolityczne, binarne podziały), giętkich linii molekularnych (mikro-ruchy, giętka segmentarność) i linii ujścia (deterytorializacja, ucieczka ku nowemu). Kartografia tych linii — a nie interpretacja „ukrytych znaczeń" — stanowi właściwą praktykę schizoanalityczną.</p>
<h4 class="r-h3">22.2. Maszyna abstrakcyjna konsystencji</h4>
<p>Maszyny abstrakcyjne, w przeciwieństwie do platońskich Idei, są immanentne i syngularne. Składają się z nieuformowanych materii (<em>phylum</em>) i nieformalnych funkcji (diagram). Nie posiadają formy ani substancji, lecz służą jako mechanizmy „pilotujące", kreślące linie ujścia i dokonujące mutacji wewnątrz konkretnych asamblacji. Abstrakcyjna maszyna konsystencji musi być konstruowana kawałek po kawałku — poprzez selekcję i łączenie linii ujścia, tworząc plan konsystencji, który unika pułapek zarówno sztywnej stratyfikacji, jak i samobójczej abolicji.</p>
<p><strong>Plan konsystencji</strong> (lub kompozycji) jest planem immanencji, który zna jedynie <strong>długości geograficzne</strong> (prędkości i spowolnienia nieuformowanych elementów) i <strong>szerokości geograficzne</strong> (intensywne afekty). Przeciwstawiony jest <strong>planowi organizacji</strong> (lub rozwoju), który jest transcendentny i teleologiczny, skupiony na formowaniu podmiotów i rozwoju form.</p>
<p>Konkretne asamblacje są tetrawalentnymi strukturami, które powstają wewnątrz strat, ale często operują w strefach zdekodowanych. Posiadają oś horyzontalną (maszynowa asamblacja ciał jako treść + kolektywna asamblacja wypowiadania jako wyrażenie) oraz oś wertykalną (oscylacja między terytorialnością i deterytorializacją). Deterytorializacja może być względna (powiązana z reterytorializacją na nowej stracie), absolutna (tworzenie nowej ziemi i łączenie linii ujścia), negatywna (zablokowana przez państwo) lub pozytywna (twórcza, otwierająca na nowe możliwości). Konkluzja systematyzuje te rozróżnienia, pokazując, że schizoanaliza musi jednocześnie analizować strata (warstwy organizacji), asamblacje (konkretne konfiguracje pragnienia) i maszyny abstrakcyjne (mechanizmy mutacji i transformacji).</p>
<h4 class="r-h3">22.3. Reguły ostrożności</h4>
<p>Autorzy formułują konkretne reguły ostrożności, które stanowią etyczny rdzeń całego projektu schizoanalitycznego. Nie chodzi o niszczenie strat gwałtownym ciosem — to prowadzi do katastrofy (puste CbO, linia śmierci). Chodzi o cierpliwy demontaż, zachowujący minimum organizmu, podmiotowości i znaczenia, aby przetrwać, jednocześnie otwierając przestrzenie dla eksperymentowania. Cztery niebezpieczeństwa — strach, jasność, władza, pasja zniesienia — muszą być nieustannie rozpoznawane i unikane. Opór wymaga kreślenia linii ujścia, które „przeciekają" między molarnymi segmentami, ale musi to być czynione z ostrożnością, by uniknąć „nowotworowych" proliferacji lub „linii śmierci."</p>
<h4 class="r-h3">22.4. Książka jako asemblaż-kłącze</h4>
<p>Sama książka jest prezentowana jako <strong>asemblaż-kłącze</strong> zaprojektowany do funkcjonowania z „zewnętrzem." Nie jest traktatem systematycznym, lecz maszyną do myślenia — zbudowaną z plateau, które mogą być czytane w dowolnej kolejności, łączą się ze sobą przez podziemne łodygi i otwierają się na to, co jeszcze nie istnieje. Konkluzja zamyka krąg, wracając do zasad kłącza z plateau 1, ale teraz wzbogaconych o cały arsenał pojęciowy wypracowany na przestrzeni czternastu plateau.</p>
<p>Zadanie schizoanalityczne — kontynuujące i rozwijające program <em>Anty-Edypa</em> — polega na jednoczesnym: rozmontowywaniu aparatów chwytania (destratyfikacja), kreśleniu linii ujścia (deterytorializacja), konstruowaniu nowych asamblacji (twórcza reterytorializacja) i zachowaniu ostrożności wobec pułapek (faszyzm, abolicja, rakowe CbO). „Maszyny pragnienia" z <em>Anty-Edypa</em> zostają rozwinięte w szersze pojęcie „asamblacji maszynowych"; CbO zostaje doprecyzowane jako plan konsystencji będący jednocześnie wynikiem destratyfikacji i powierzchnią, na której formują się strata; schizoanaliza staje się kartografią linii, asamblacji i maszyn abstrakcyjnych — praktyką zarazem ontologiczną, polityczną i estetyczną.</p>
<p>Polityczne implikacje konkluzji obejmują wezwanie do stawania po stronie „nieprzeliczalnych" — mniejszości definiowanych nie przez liczbę, lecz przez swój status zbiorów nieprzeliczalnych, które wymykają się kapitalistycznej aksjomatyce. Opór wymaga tworzenia <strong>grup-podmiotów</strong> (<em>groupes-sujets</em>) — w przeciwieństwie do „grup podlegających" (<em>groupes assujettis</em>) — które podporządkowują władzę produkcji pragnienia. Maszyna wojenna musi zostać odzyskana od państwa i przekierowana ku tworzeniu nowych form życia, nie ku wojnie czy zniszczeniu.</p>
<p>Wśród powracających motywów przewodnich: szachy vs. Go (przestrzeń państwowa vs. nomadyczna), osa i orchidea (blok stawania-się w kłączu), Człowiek-Wilk (krytyka psychoanalitycznej redukcji wielości do molarnych jedności) i quilt/kołdra (technologiczny model przejścia od prążkowanego haftu do gładkiego patchworku). Każdy z tych motywów łączy wiele plateau jednocześnie, tworząc sieć rezonansów — kłącze pojęciowe, w którym żadne plateau nie jest „nad" ani „przed" innymi, lecz wszystkie łączą się przez podziemne łodygi wzajemnych odniesień.</p>
<h4 class="r-h3">Podsumowanie siatki pojęciowej <em>Tysiąca plateau</em></h4>
<p>Przez wszystkie plateau przewija się kilka fundamentalnych napięć, które nie podlegają dialektycznej syntezie, lecz istnieją jako ciągłe, nieredukowalne oscylacje:</p>
<p>- <strong>Deterytorializacja vs. reterytorializacja</strong> — każdy ruch ucieczki może zostać przechwycony, ale żadne przechwycenie nie jest ostateczne. - <strong>Gładkie vs. prążkowane</strong> — żadna przestrzeń nie jest czysto jednym lub drugim; istnieją tylko w mieszaninie i ciągłej wzajemnej transformacji. - <strong>Maszyna wojenna vs. państwo</strong> — zewnętrzność i wewnętrzność jako nieredukowalne modalności polityczne. - <strong>Kodowanie vs. aksjomatyka</strong> — przejście od tradycyjnych społeczeństw do kapitalizmu jako przejście od jakościowych kodów do ilościowej aksjomatyki zdekodowanych przepływów. - <strong>Ostrożność vs. twórczość</strong> — linia ujścia może prowadzić zarówno do wyzwolenia, jak i do destrukcji; sztuka ostrożności polega na nawigowaniu między tymi biegunami. - <strong>Molarny vs. molekularny</strong> — dwa poziomy współistniejące w każdym zjawisku, nieredukowalne do siebie nawzajem, ale nieustannie się przenikające.</p>
<p><em>Tysiąc plateau</em> realizuje w swojej formie to, co głosi w swoich pojęciach: jest kłączem, asamblażem, maszyną do myślenia, która nie zamyka się w systemie, lecz otwiera się na eksperymentowanie — na to, co jeszcze nie istnieje, a co może nadejść jedynie przez ostrożne kreślenie nowych linii ujścia.</p>
<p>Schizoanaliza, zainicjowana w <em>Anty-Edypie</em>, znajduje w <em>Tysiącu plateau</em> swoje pełne rozwinięcie jako praktyka łącząca cztery wymiary: <strong>kartografię</strong> (mapowanie linii, a nie interpretacja symboli — plateau 1, 8, 9), <strong>pragmatykę</strong> (analiza konkretnych asamblacji, a nie abstrakcyjnych struktur — plateau 3, 4, 5), <strong>mikropolitykę</strong> (uwaga na molekularne ruchy pragnienia, a nie tylko molarne formacje władzy — plateau 9, 12, 13) i <strong>eksperymentację</strong> (konstruowanie planu konsystencji, a nie odkrywanie ukrytych znaczeń — plateau 6, 10, 11). Każdy z tych wymiarów jest obecny w każdym plateau, lecz każde plateau akcentuje inny aspekt, tworząc wielowymiarową mapę, która nie daje się zredukować do linearnej narracji.</p>
<p>Ostateczna lekcja <em>Tysiąca plateau</em> jest zarazem ontologiczna, etyczna i polityczna: rzeczywistość jest wielością linii, a nie drzewem jedności; pragnienie jest produktywne, a nie brakowe; myślenie jest eksperymentowaniem, a nie reprezentacją; polityka jest mikropolityką, a nie tylko makropolityką; ostrożność jest cnotą, a nie tchórzostwem. Książka ta nie zamyka się — otwiera. Nie odpowiada — pyta. Nie kończy — zaczyna od nowa, w innym punkcie, na innym plateau.</p>`

        title: "Słownik kluczowych pojęć schizoanalizy",
        html: `<p>Poniższy słownik obejmuje kluczowe pojęcia obu tomów <em>Kapitalizmu i schizofrenii</em> -- <em>Anty-Edypa</em> (1972) oraz <em>Tysiąca plateau</em> (1980). Każde hasło zawiera definicję, kontekst pojawienia się oraz, tam gdzie to istotne, ewolucję pojęcia między dwoma tomami. Skróty: AE = <em>Anty-Edyp</em>; TP = <em>Tysiąc plateau</em>.</p>
<h4 class="r-h3">1. Aksjomatyka (<em>axiomatique</em>)</h4>
<p><strong>Definicja:</strong> System czysto funkcjonalnych reguł operujących na zdekodowanych przepływach za pomocą abstrakcyjnych ilości (przede wszystkim pieniądza), zastępujący jakościowe kody wcześniejszych formacji społecznych. W odróżnieniu od kodów, aksjomatyka nie narzuca znaczeń, lecz reguluje relacje ilościowe między przepływami.</p>
<p><strong>Kontekst:</strong> Pojęcie wprowadzone w AE, rozdział 3, w analizie maszyny kapitalistycznej. Rozwinięte w TP, plateau 13 (<em>Aparat chwytania</em>), gdzie aksjomatyka staje się centralnym mechanizmem kapitalizmu -- elastycznym systemem, do którego można dodawać lub odejmować aksjomaty (np. państwo socjaldemokratyczne dodaje aksjomaty socjalne, neoliberalizm je odejmuje).</p>
<p><strong>Ewolucja AE--TP:</strong> W AE aksjomatyka jest opisana jako cecha wyróżniająca kapitalizm na tle kodowania (maszyna terytorialna) i nadkodowania (maszyna despotyczna). W TP pojęcie to zyskuje precyzję polityczną: aksjomatyka staje się narzędziem analizy globalnego systemu państw i ich izomorfii wobec rynku światowego.</p>
<h4 class="r-h3">2. Alians (<em>alliance</em>)</h4>
<p><strong>Definicja:</strong> Relacja powinowactwa w linii bocznej, mająca charakter polityczny i ekonomiczny. W społeczeństwach pierwotnych alians stanowi „kapitał obrotowy" maszyny społecznej -- mobilny blok długów i zobowiązań, regulujący wymiany między grupami.</p>
<p><strong>Kontekst:</strong> AE, rozdział 3 (maszyna terytorialna). Alians i filiacja tworzą parę pojęciową, za pomocą której Deleuze i Guattari opisują funkcjonowanie socius w społeczeństwach pierwotnych. W maszynie despotycznej despota ustanawia „nowy alians" z ludem, przywłaszczając dotychczasowe zapasy filiacyjne. W kapitalizmie alians przybiera formę bankową.</p>
<p><strong>Ewolucja AE--TP:</strong> W TP alians zostaje rozwinięty w kontekście stawania-się (plateau 10): stawanie-się przebiega porządkiem sojuszu (paktu), nie filiacji (dziedziczności). Czarownik zawiera pakt z Anomalnym -- jest to logika aliansu przeciwstawiona logice rodziny.</p>
<h4 class="r-h3">3. Anomalny (<em>anomal</em>)</h4>
<p><strong>Definicja:</strong> Figura graniczna w obrębie sfory lub wielości, odróżnialna od „anormalnego" (patologicznego). Anomalny jest Outsiderem, bytem na krawędzi wielości, który określa jej wymiary i z którym podmiot wchodzi w demoniczny sojusz, aby uruchomić stawanie-się.</p>
<p><strong>Kontekst:</strong> TP, plateau 10 (<em>Stawanie-się-intensywnym</em>) i plateau 2 (<em>Jeden czy kilka wilków?</em>). Przykłady: Moby Dick jako Anomalny sfory wielorybów, z którym kapitan Ahab zawiera potworny pakt.</p>
<h4 class="r-h3">4. Antyprodukcja (<em>antiproduction</em>)</h4>
<p><strong>Definicja:</strong> Domena jałowej, nieproduktywnej powierzchni, do której należy Ciało bez Organów. Antyprodukcja nie jest zaprzeczeniem produkcji, lecz jej niezbędnym komplementem -- powierzchnią, na której produkcja jest spożytkowana, zapisana i konsumowana. Na poziomie społecznym antyprodukcja przybiera formę socius (Ziemi, Ciała Despoty, Kapitału), który przypisuje sobie siły wytwórcze jako quasi-przyczyna.</p>
<p><strong>Kontekst:</strong> AE, rozdział 1 (sekcja 2) i rozdział 3. W kapitalizmie antyprodukcja rozlewa się po całym ciele społecznym w formie sztucznej rzadkości, aparatu biurokratycznego i militarnego.</p>
<h4 class="r-h3">5. Asemblaż / agencement (<em>agencement</em>)</h4>
<p><strong>Definicja:</strong> Konkretny, „dwugłowy" byt łączący heterogeniczne elementy w funkcjonalną całość. Asemblaż posiada oś horyzontalną (maszynowy asemblaż ciał jako treść + kolektywny asemblaż wypowiadania jako wyrażenie) oraz oś wertykalną (oscylacja między terytorialnością a deterytorializacją). Nie jest strukturą statyczną, lecz dynamicznym układem podlegającym ciągłym transformacjom.</p>
<p><strong>Kontekst:</strong> Pojęcie centralne dla TP, choć jego zaczątki obecne są w AE pod postacią „maszyny pragnącej". W TP pojawia się już w plateau 1 (książka jako asemblaż) i zostaje systematycznie rozwinięte w plateau 3 (<em>Geologia moralności</em>) oraz w konkluzji.</p>
<p><strong>Ewolucja AE--TP:</strong> Asemblaż zastępuje i rozszerza pojęcie maszyny pragnącej z AE. Podczas gdy maszyna pragnąca akcentowała produkcję nieświadomą, asemblaż obejmuje również wymiar wypowiadania, terytorialności i deterytorializacji, stając się bardziej elastycznym narzędziem analitycznym.</p>
<h4 class="r-h3">6. Biała ściana / Czarna dziura (<em>mur blanc / trou noir</em>)</h4>
<p><strong>Definicja:</strong> Dwa komponenty abstrakcyjnej maszyny twarzowości. Biała ściana to powierzchnia znaczącości (signifiance), na której osadzają się znaki i ustanawiana jest redundancja. Czarna dziura to punkt rezonansu, w którym lokuje się świadomość i podmiotowość. Ich przecięcie tworzy system twarzy.</p>
<p><strong>Kontekst:</strong> TP, plateau 7 (<em>Rok zerowy: Twarzowość</em>) i plateau 5 (<em>O kilku reżimach znaków</em>). Biała ściana odpowiada reżimowi znaczącemu (despotycznemu), czarna dziura -- reżimowi podmiotowemu (post-znaczącemu).</p>
<h4 class="r-h3">7. Blok stawania-się (<em>bloc de devenir</em>)</h4>
<p><strong>Definicja:</strong> Strefa bliskości lub nieodróżnialności, w której punkty wyjścia i przybycia przestają być rozpoznawalne. Blok stawania-się nie jest imitacją ani analogią, lecz realnym procesem „inwolucji twórczej", w którym dwa heterogeniczne elementy tworzą wspólną deterytorializację (np. osa-orchidea).</p>
<p><strong>Kontekst:</strong> TP, plateau 10 (<em>Stawanie-się-intensywnym</em>). Pojęcie ściśle powiązane z wielością, Anomalnym i haecceitas.</p>
<h4 class="r-h3">8. Ciało bez Organów (CbO / BwO -- <em>corps sans organes</em>)</h4>
<p><strong>Definicja:</strong> Jałowa, nieproduktywna powierzchnia, która powstaje jako produkt-zastój maszyn pragnących. CbO nie jest brakiem organów, lecz sprzeciwem wobec organizmu -- wobec hierarchicznej organizacji organów. Jest „nieruchomym poruszycielem" pragnienia, na którym zapisują się intensywności i rozkładają wielości. Funkcjonuje jako płaszczyzna konsystencji, na której organy istnieją jedynie jako czyste intensywności, progi i gradienty.</p>
<p><strong>Kontekst:</strong> Pojęcie zapożyczone od Antonina Artauda. W AE pojawia się w rozdziale 1 (sekcja 2) jako element procesu produkcji pragnącej. W TP zostaje rozwinięte w plateau 6 (<em>Jak wytworzyć sobie CbO?</em>), plateau 3 (<em>Geologia moralności</em>) i konkluzji.</p>
<p><strong>Ewolucja AE--TP:</strong> W AE CbO funkcjonuje przede wszystkim jako pojęcie kliniczne -- powierzchnia zapisu intensywności, na której podmiot lokalizuje swoje stany. W TP CbO zyskuje wymiar ontologiczny -- staje się płaszczyzną konsystencji (planem immanencji), Ciałem Ziemi, na którym tworzą się strata jako „zgrubienia". Wprowadzone zostają trzy typy CbO: pełne (udane), puste (zablokowane) i rakowe (faszystowskie).</p>
<h4 class="r-h3">9. Cięcie-przepływ (<em>coupure-flux</em>)</h4>
<p><strong>Definicja:</strong> Elementarna operacja maszyny pragnącej. Maszyna funkcjonuje jako system binarny: jedna maszyna wytwarza ciągły przepływ (hylè), a podłączona do niej druga maszyna działa jako cięcie, pobierając porcję tego przepływu. Cięcie nie sprzeciwia się ciągłości, lecz jest jej warunkiem. Trzy typy cięć odpowiadają trzem syntezom: cięcie-pobranie (synteza łącząca), cięcie-odłączenie (synteza rozłączna), cięcie-reszta (synteza koniunktywna).</p>
<p><strong>Kontekst:</strong> AE, rozdział 1 (sekcja 5, <em>Maszyny</em>).</p>
<h4 class="r-h3">10. Deterytorializacja (<em>déterritorialisation</em>)</h4>
<p><strong>Definicja:</strong> Ruch, poprzez który element, przepływ lub podmiot opuszcza terytorium -- wyłamuje się z przypisanych mu kodów, znaczeń i granic. Deterytorializacja może być względna (powiązana z reterytorializacją na nowym terytorium), absolutna (tworzenie nowej ziemi), negatywna (zablokowana przez państwo lub Edypa) lub pozytywna (twórcza, otwierająca nowe możliwości).</p>
<p><strong>Kontekst:</strong> Pojęcie obecne w obu tomach, choć w AE występuje przede wszystkim w kontekście ekonomiczno-historycznym (dekodowanie przepływów przez kapitalizm), a w TP zyskuje wymiar ontologiczny i kosmiczny (deterytorializacja jako fundamentalny ruch materii i życia).</p>
<p><strong>Ewolucja AE--TP:</strong> W AE deterytorializacja opisuje proces ekonomiczno-historyczny: kapitalizm dekoduje i deterytorializuje przepływy, jednocześnie je reterytorializując na rodzinie (Edyp) i państwie. W TP deterytorializacja staje się kategorią ontologiczną: jest ruchem wpisanym w samą naturę strat, asemblaży i linii ujścia. Otrzymuje systematyczną typologię (względna/absolutna, pozytywna/negatywna).</p>
<h4 class="r-h3">11. Diagram (<em>diagramme</em>)</h4>
<p><strong>Definicja:</strong> Niefiguratywna funkcja maszyny abstrakcyjnej, która nie reprezentuje rzeczywistości, lecz konstruuje rzeczywistość mającą nadejść. Diagram rozmywa granicę między cząstką a znakiem, operując na nieuformowanych materiach i nieformalnych funkcjach.</p>
<p><strong>Kontekst:</strong> TP, plateau 5 (<em>O kilku reżimach znaków</em>) i plateau 15 (konkluzja). Pojęcie inspirowane semiotyką Peirce'a, gdzie diagram jest ikoną relacji.</p>
<h4 class="r-h3">12. Dysjunkcja włączająca (<em>disjonction inclusive</em>)</h4>
<p><strong>Definicja:</strong> Prawomocne użycie syntezy rozłącznej, w którym alternatywy nie wykluczają się wzajemnie, lecz współistnieją jako permutacje na powierzchni Ciała bez Organów. Logika „lub... lub... lub..." (nie „albo... albo"), w której podmiot może przemieszczać się między stanami bez trwałego uwięzienia w żadnym z nich. Przeciwstawiona dysjunkcji wykluczającej, narzucanej przez Edypa.</p>
<p><strong>Kontekst:</strong> AE, rozdział 2 (sekcja 4, <em>Synteza rozłączna zapisu</em>).</p>
<h4 class="r-h3">13. Edyp (<em>Oedipe</em>)</h4>
<p><strong>Definicja:</strong> Kompleks rodzinny (trójkąt tata-mama-ja), który psychoanaliza narzuca nieświadomości jako wyłączną miarę pragnienia. Edyp nie jest faktem psychologicznym, lecz „intymną formacją kolonialną", operacją polegającą na „zwinięciu" nieskończonego pola społecznego do skończonego trójkąta rodzinnego. W kapitalizmie Edyp pełni funkcję wewnętrznej granicy, neutralizując rewolucyjny potencjał pragnienia.</p>
<p><strong>Kontekst:</strong> AE, przede wszystkim rozdział 2 (<em>Psychoanaliza i familializm</em>) i rozdział 4 (<em>Wprowadzenie do schizoanalizy</em>). W TP obecny pośrednio jako krytykowany model redukcji wielości do jedności (plateau 2, <em>Jeden czy kilka wilków?</em>).</p>
<h4 class="r-h3">14. Filiacja (<em>filiation</em>)</h4>
<p><strong>Definicja:</strong> Pokrewieństwo w linii prostej, mające charakter administracyjny i hierarchiczny. Jest „zapasem filiacyjnym" lub kapitałem trwałym maszyny społecznej. W maszynie despotycznej despota ustanawia bezpośrednią filiację z bóstwem. W kapitalizmie filiacja przybiera formę filiacji kapitałowej (pieniądz rodzi pieniądz: M--M').</p>
<p><strong>Kontekst:</strong> AE, rozdział 3. W TP filiacja jest przeciwstawiona sojuszowi jako porządkowi stawania-się (plateau 10).</p>
<h4 class="r-h3">15. Gładkie / Prążkowane (<em>lisse / strié</em>)</h4>
<p><strong>Definicja:</strong> Dwa typy przestrzeni istniejące wyłącznie w mieszaninie i ciągłej wzajemnej transformacji. Przestrzeń gładka jest kierunkowa, wektorowa, haptyczna (dotykowo-wizualna), acentryczna -- „zajmowana bez liczenia" przez nomadów. Przestrzeń prążkowana jest metryczna, scentralizowana, optyczna -- „liczona, by być zajęta" przez państwo. Sześć modeli analizy: technologiczny (filc/tkanina), muzyczny, morski, matematyczny (Riemann/Euklides), fizyczny (wolne działanie/praca), estetyczny (haptyczne/optyczne).</p>
<p><strong>Kontekst:</strong> TP, plateau 14 (<em>Gładkie i prążkowane</em>), z licznymi odniesieniami w plateau 12 (<em>Nomadologia</em>) i 13 (<em>Aparat chwytania</em>).</p>
<h4 class="r-h3">16. Haecceitas (<em>haecceité / haecceity</em>)</h4>
<p><strong>Definicja:</strong> Sposób indywiduacji odrębny od osoby lub substancji. Ciało definiowane nie przez formę czy organ, lecz przez długość (relacje prędkości i powolności między cząsteczkami) i szerokość (intensywne afekty, do których jest zdolne). Haecceitas to doskonałe indywidualności składające się z relacji i afektów -- pora roku, godzina, wiatr, wydarzenie. Pojęcie zapożyczone od Dunsa Szkota.</p>
<p><strong>Kontekst:</strong> TP, plateau 10 (<em>Stawanie-się-intensywnym</em>).</p>
<h4 class="r-h3">17. Imperializm Edypa (<em>impérialisme d'Oedipe</em>)</h4>
<p><strong>Definicja:</strong> Proces, w którym psychoanaliza narzuca figurę trójkąta rodzinnego jako wyłączną miarę nieświadomości. Edyp działa jak „intymna formacja kolonialna", która osacza pragnienie, zmuszając je do wyrażania się wyłącznie w kategoriach rodzinnych, zamiast pozwolić mu na bezpośrednią inwestycję w pole społeczno-historyczne.</p>
<p><strong>Kontekst:</strong> AE, rozdział 2 (sekcja 1).</p>
<h4 class="r-h3">18. Intensywność (<em>intensité</em>)</h4>
<p><strong>Definicja:</strong> Wielkość niedająca się podzielić bez zmiany natury; czysta różnica stopnia, która zaludnia Ciało bez Organów. Intensywności nie są mierzalne, lecz doświadczalne -- przechodzi się przez nie jako przez pasma, progi i gradienty. Stopień zero intensywności nie oznacza braku, lecz pozytywny stan nieuformowanej materii.</p>
<p><strong>Kontekst:</strong> AE, rozdział 1 (sekcja 3, podmiot nomadyczny przechodzi przez stany intensywne). TP, plateau 6 (CbO jako jajko intensywności) i plateau 10 (stawanie-się jako ruch intensywny).</p>
<h4 class="r-h3">19. Kłącze / Rhizome (<em>rhizome</em>)</h4>
<p><strong>Definicja:</strong> Acentryczny, nielinearny system zdefiniowany przez sześć zasad: połączenie, heterogeniczność, wielość, zerwanie aznaczące, kartografia i dekalkomania. Kłącze przeciwstawione jest drzewu (hierarchii, binarności). Każdy punkt kłącza może być połączony z każdym innym; kłącze nie ma początku ani końca, lecz środek, z którego rośnie we wszystkich kierunkach. Jest mapą, nie kalką.</p>
<p><strong>Kontekst:</strong> TP, plateau 1 (<em>Wprowadzenie: Kłącze</em>) -- fundament metodologiczny całej książki.</p>
<h4 class="r-h3">20. Kod / Nadkodowanie / Dekodowanie (<em>code / surcodage / décodage</em>)</h4>
<p><strong>Definicja:</strong> Trzy operacje na przepływach definiujące trzy maszyny społeczne. <strong>Kod</strong> to jakościowy system regulacji przepływów, zapisywany na ciałach w społeczeństwach pierwotnych (kodowanie terytorialne). <strong>Nadkodowanie</strong> (surcodage) to operacja państwa despotycznego, polegająca na narzuceniu transcendentnej jedności uprzednio zakodowanym przepływom. <strong>Dekodowanie</strong> to proces właściwy kapitalizmowi, polegający na pozbawieniu przepływów ich tradycyjnych znaczeń i zastąpieniu kodów aksjomatyką ilości abstrakcyjnych.</p>
<p><strong>Kontekst:</strong> AE, rozdział 3 (trzy maszyny społeczne). TP, plateau 5 (reżimy znaków) i 13 (aparat chwytania).</p>
<h4 class="r-h3">21. Libido / Numen / Voluptas</h4>
<p><strong>Definicja:</strong> Trzy formy energii odpowiadające trzem syntezom pasywnym nieświadomości. <strong>Libido</strong> jest energią syntezy łączącej (produkcji) -- energią pobrań, łączącą obiekty częściowe z przepływami. <strong>Numen</strong> jest energią syntezy rozłącznej (zapisu) -- boską energią odłączeń, działającą na powierzchni CbO. <strong>Voluptas</strong> jest energią syntezy koniunktywnej (konsumpcji) -- resztkową rozkoszą, z której wyłania się podmiot nomadyczny.</p>
<p><strong>Kontekst:</strong> AE, rozdział 1 (sekcje 1--3) i rozdział 2 (podsumowanie syntez).</p>
<h4 class="r-h3">22. Linia ujścia (<em>ligne de fuite</em>)</h4>
<p><strong>Definicja:</strong> Abstrakcyjna, niesegmentarna linia odpowiadająca absolutnej deterytorializacji. Linia ujścia nie łączy punktów, lecz przechodzi między nimi, prowadząc do stawania-się-niedostrzegalnym. Nie jest wycofaniem ani ucieczką bierną, lecz twórczym aktem „stwarzania ujścia" dla całego systemu. Może jednak zamienić się w linię śmierci, jeśli zostanie pozbawiona ostrożności.</p>
<p><strong>Kontekst:</strong> AE, rozdział 4 (biegun schizo-rewolucyjny). TP, plateau 8 (<em>Trzy nowele</em>) i 9 (<em>Mikropolityka i segmentarność</em>), gdzie linie ujścia stają się centralnym narzędziem kartografii schizoanalitycznej.</p>
<p><strong>Ewolucja AE--TP:</strong> W AE linia ujścia jest związana przede wszystkim z deterytorializacją przepływów pragnienia. W TP pojęcie to zyskuje kartograficzną precyzję: staje się jedną z trzech fundamentalnych linii (obok molowej i molekularnej), a jego niebezpieczeństwa (linia śmierci, pasja zniesienia) zostają szczegółowo przeanalizowane.</p>
<h4 class="r-h3">23. Maszyna abstrakcyjna (<em>machine abstraite</em>)</h4>
<p><strong>Definicja:</strong> Immanentny i syngularny mechanizm składający się z nieuformowanych materii (phylum) i nieformalnych funkcji (diagram). Maszyna abstrakcyjna nie posiada formy ani substancji -- służy jako mechanizm „pilotujący", kreślący linie ujścia i dokonujący mutacji w asemblażach. Istnieje w dwóch stanach: owiniętym (ecumenon -- uwięziona w stracie) i rozwiniętym (planomenon -- przecinająca strata na płaszczyźnie konsystencji).</p>
<p><strong>Kontekst:</strong> TP, plateau 3 (<em>Geologia moralności</em>), 5 (<em>O kilku reżimach znaków</em>) i konkluzja.</p>
<h4 class="r-h3">24. Maszyna pragnąca (<em>machine désirante</em>)</h4>
<p><strong>Definicja:</strong> Realny system cięć i przepływów, stanowiący mikrofizyczną jednostkę nieświadomości. Maszyna pragnąca nie jest metaforą ani narzędziem -- jest maszynowym układem, w którym pragnienie produkuje rzeczywistość. Działa jedynie wtedy, gdy się psuje; składa się z obiektów częściowych powiązanych „brakiem związku" (dysjunkcją włączającą). Jest „córką urodzoną bez matki" -- nie wywodzi się z reprodukcji, lecz z połączeń na CbO.</p>
<p><strong>Kontekst:</strong> AE, rozdział 1 (wszystkie sekcje) i dodatek (<em>Bilans-program dla maszyn pragnących</em>).</p>
<p><strong>Ewolucja AE--TP:</strong> W TP maszyny pragnące zostają rozwinięte w pojęcie asemblażu (agencement), które jest bardziej elastyczne i obejmuje dodatkowe wymiary (terytorialność, wypowiadanie).</p>
<h4 class="r-h3">25. Maszyna wojenna (<em>machine de guerre</em>)</h4>
<p><strong>Definicja:</strong> Wynalazek nomadów, z definicji zewnętrzny wobec aparatu państwowego. Pierwotnym celem maszyny wojennej nie jest wojna, lecz zajmowanie i utrzymywanie gładkiej przestrzeni. Wojna staje się jej obiektem dopiero w momencie zderzenia z państwem. Państwo nie posiada własnej maszyny wojennej -- może ją jedynie zaanektować w formie instytucji militarnej, co zawsze wiąże się z napięciami i niestabilnością.</p>
<p><strong>Kontekst:</strong> TP, plateau 12 (<em>Traktat o nomadologii</em>).</p>
<h4 class="r-h3">26. Mikropolityka / Makropolityka (<em>micropolitique / macropolitique</em>)</h4>
<p><strong>Definicja:</strong> Dwa współistniejące i wzajemnie przenikające się wymiary polityki. Makropolityka zajmuje się agregatami molarnymi i sztywnymi segmentami (klasy, państwo, instytucje). Mikropolityka operuje na poziomie przepływów molekularnych i „drobnych strumyczków" pragnienia, które umykają kontroli makropolitycznej. Nie ma makropolityki bez mikropolityki i odwrotnie.</p>
<p><strong>Kontekst:</strong> TP, plateau 9 (<em>Mikropolityka i segmentarność</em>). Kluczowa teza: faszyzm jest zjawiskiem przede wszystkim mikropolitycznym -- molekularnym ruchem masowym opartym na mikrofaszyzmach.</p>
<h4 class="r-h3">27. Molarne / Molekularne (<em>molaire / moléculaire</em>)</h4>
<p><strong>Definicja:</strong> Dwa porządki wielkości, które nie są metaforami, lecz realnymi stanami materii i energii. <strong>Porządek molowy</strong> dotyczy wielkich zbiorów statystycznych, ustrukturyzowanych całości podlegających prawu wielkich liczb (państwo, klasy, osoby zindywidualizowane). <strong>Porządek molekularny</strong> to domena przedosobowych osobliwości, czystych intensywności i obiektów częściowych; mikrofizyka nieświadomości. Oba porządki współistnieją -- formacje molowe są statystycznym wynikiem akumulacji elementów molekularnych.</p>
<p><strong>Kontekst:</strong> AE, rozdział 1 (sekcja 5) i rozdział 4 (sekcja 2, <em>Nieświadomość molekularna</em>). TP, we wszystkich plateau, szczególnie w plateau 3 (strata), 9 (segmentarność) i konkluzji.</p>
<h4 class="r-h3">28. Obiekty częściowe (<em>objets partiels</em>)</h4>
<p><strong>Definicja:</strong> Samodzielne, funkcjonalne jednostki maszyn pragnących (np. pierś, usta, odbyt). Nie są fragmentami utraconej całości (jak w tradycyjnej psychoanalizie) ani częściami „osób globalnych" (Matki, Ojca). Są molekularnymi funkcjami nieświadomości, które emitują lub przecinają przepływy. Niczego im nie brakuje -- brak jest ideologicznym konstruktem narzuconym przez psychoanalizę i klasę panującą.</p>
<p><strong>Kontekst:</strong> AE, rozdział 1 (sekcja 1 i 6) i rozdział 2 (sekcja 3, krytyka Melanie Klein).</p>
<h4 class="r-h3">29. Paralogizm (<em>paralogisme</em>)</h4>
<p><strong>Definicja:</strong> Błąd logiczny popełniany przez psychoanalizę w stosowaniu syntez nieświadomości. Deleuze i Guattari identyfikują trzy główne paralogizmy (w niektórych ujęciach -- pięć): (1) paralogizm ekstrapolacji (synteza łącząca) -- ekstrapolacja obiektu częściowego do transcendentnego Fallusa; (2) paralogizm podwójnego wiązania (synteza rozłączna) -- uwięzienie nieświadomości w edypalnej pułapce bez wyjścia; (3) paralogizm przyporządkowania/aplikacji (synteza koniunktywna) -- „zwinięcie" pola społecznego na trójkąt rodzinny.</p>
<p><strong>Kontekst:</strong> AE, rozdział 2 (sekcje 3--6).</p>
<h4 class="r-h3">30. Phylum maszynowe (<em>phylum machinique</em>)</h4>
<p><strong>Definicja:</strong> Materialność w ruchu -- przepływ materii-energii, w którym materia posiada własne, nieorganiczne życie. Phylum maszynowe to strumień materii, za którym „podąża" nomadyczny rzemieślnik (kowal), odkrywając jej wewnętrzne tendencje, zamiast narzucać jej zewnętrzną formę.</p>
<p><strong>Kontekst:</strong> TP, plateau 12 (<em>Nomadologia</em>), w analizie metalurgii i nauki mniejszej.</p>
<h4 class="r-h3">31. Płaszczyzna konsystencji / Płaszczyzna organizacji (<em>plan de consistance / plan d'organisation</em>)</h4>
<p><strong>Definicja:</strong> Dwa antagonistyczne plany. <strong>Płaszczyzna organizacji</strong> (lub rozwoju) jest transcendentna i teleologiczna -- ukryty plan, który rządzi rozwojem form i formowaniem podmiotów („Sąd Boży"). <strong>Płaszczyzna konsystencji</strong> (lub kompozycji) jest immanentna -- zna jedynie długości geograficzne (prędkości i spowolnienia nieuformowanych elementów) i szerokości geograficzne (intensywne afekty). Jest Ciałem bez Organów, na którym pisane są wszystkie haecceitas i stawania-się.</p>
<p><strong>Kontekst:</strong> TP, plateau 10 (<em>Stawanie-się-intensywnym</em>) i konkluzja.</p>
<h4 class="r-h3">32. Podmiot nomadyczny (<em>sujet nomade</em>)</h4>
<p><strong>Definicja:</strong> Podmiot bez stałej tożsamości, stale zdecentrowany, wywiedziony ze stanów intensywnych, przez które przechodzi na Ciele bez Organów. Podmiot nomadyczny rodzi się z każdego kolejnego stanu serii i odradza w następnym, konsumując te, które go zrodziły. Jest „resztką" (rezyduum) pozostawioną po podziałach na powierzchni zapisu, nie centrum ani przyczyną pragnienia.</p>
<p><strong>Kontekst:</strong> AE, rozdział 1 (sekcja 3, <em>Podmiot i rozkosz</em>). Pojęcie zapowiedziane już w tekście Deleuze'a <em>Po czym rozpoznać strukturalizm?</em> (1967/1972).</p>
<h4 class="r-h3">33. Produkcja pragnąca (<em>production désirante</em>)</h4>
<p><strong>Definicja:</strong> Fundamentalny proces nieświadomości, w którym pragnienie nie wyraża braku, lecz jest siłą wytwórczą produkującą rzeczywistość (Realne). Składa się z trzech syntez pasywnych (łączącej, rozłącznej, koniunktywnej) i jest tożsama z produkcją społeczną -- różnią się one jedynie reżimem funkcjonowania (molekularnym vs. molowym).</p>
<p><strong>Kontekst:</strong> AE, rozdział 1, fundament ontologiczny całego dzieła.</p>
<h4 class="r-h3">34. Rabattement (<em>rabattement</em>)</h4>
<p><strong>Definicja:</strong> Operacja „nakładania" lub „zwijania" nieskończonego pola społeczno-historycznego (zbiór wyjściowy: klasy, rasy, historia) na mały, skończony trójkąt rodzinny (zbiór docelowy: tata-mama-ja). Jest to trzeci paralogizm psychoanalizy, odpowiadający nieuprawionemu użyciu syntezy koniunktywnej.</p>
<p><strong>Kontekst:</strong> AE, rozdział 2 (sekcja 5) i rozdział 3 (<em>Wreszcie Edyp</em>).</p>
<h4 class="r-h3">35. Refren / Rytornela (<em>ritournelle</em>)</h4>
<p><strong>Definicja:</strong> Pryzmat lub kryształ czasoprzestrzeni, którego istoty żywe używają do organizacji relacji z chaosem. Trzy aspekty refrenu: (1) ustalenie centrum w chaosie (dziecko śpiewające w ciemności), (2) organizacja stabilnego terytorium (okrąg wokół centrum), (3) otwarcie tego okręgu ku kosmosowi (ucieczka ku siłom przyszłości). Refren jest wektorem deterytorializacji.</p>
<p><strong>Kontekst:</strong> TP, plateau 11 (<em>O refrenie</em>). Refren łączy się z pojęciem terytorium, deterytorializacji i asemblażu.</p>
<h4 class="r-h3">36. Represja / Wyparcie (<em>répression / refoulement</em>)</h4>
<p><strong>Definicja:</strong> Dwa odrębne, choć powiązane mechanizmy. <strong>Represja społeczna</strong> jest działaniem świadomym i zewnętrznym, sprawowanym przez maszynę społeczną na pragnienie. <strong>Wyparcie psychiczne</strong> jest operacją nieświadomą, zachodzącą wewnątrz aparatu psychicznego. Wyparcie jest całkowicie uzależnione od represji społecznej -- rodzina pełni funkcję „oddelegowanego agenta wyparcia", zastępując realną produkcję pragnącą sfałszowanym obrazem popędów kazirodczych.</p>
<p><strong>Kontekst:</strong> AE, rozdział 2 (sekcja 7, <em>Represja i wyparcie</em>).</p>
<h4 class="r-h3">37. Reterytorializacja (<em>reterritorialisation</em>)</h4>
<p><strong>Definicja:</strong> Ruch odtwarzania terytorium po deterytorializacji. Może być twórcza (tworzenie nowej ziemi) lub reakcyjna (sztuczna reterytorializacja na archaicznych formach, takich jak rodzina, naród, Edyp). Kapitalizm funkcjonuje poprzez podwójny ruch: deterytorializuje przepływy jedną ręką, reterytorializuje je drugą.</p>
<p><strong>Kontekst:</strong> AE, rozdział 3 i 4. TP, we wszystkich plateau.</p>
<h4 class="r-h3">38. Schizoanaliza (<em>schizo-analyse</em>)</h4>
<p><strong>Definicja:</strong> Analiza transcendentalna i materialistyczna, która traktuje nieświadomość jako fabrykę produkującą realność, a nie jako teatr przedstawień. Obejmuje zadania negatywne (destrukcja Edypa, kastracji, znaczącego) i pozytywne (odkrycie maszyn pragnących podmiotu; dotarcie do nieświadomych inwestycji pola społecznego). Zamiast pytać „co to znaczy?", pyta „jak to działa?". W TP schizoanaliza staje się kartografią linii, pragmatyką i mikropolityką.</p>
<p><strong>Kontekst:</strong> AE, rozdział 4 (<em>Wprowadzenie do schizoanalizy</em>). TP, konkluzja i plateau 8--9.</p>
<h4 class="r-h3">39. Schizofrenia: proces vs. klinika (<em>schizophrénie: processus vs. entité clinique</em>)</h4>
<p><strong>Definicja:</strong> Kluczowe rozróżnienie. <strong>Schizofrenia jako proces</strong> to fundamentalna matryca nieświadomości; pozytywny ruch deterytorializacji, „przełom" (breakthrough), który przekracza granice społeczne. <strong>Schizofrenia kliniczna</strong> to „autystyczny ludzki wrak", produkt psychiatrii i represji społecznej, powstały w wyniku brutalnego przerwania procesu schizofrenicznego; jest to „upadek" (breakdown), a nie skutek procesu.</p>
<p><strong>Kontekst:</strong> AE, rozdział 1 (sekcja 4, <em>Materialistyczna psychiatria</em>) i rozdział 2 (sekcja 9, <em>Proces</em>).</p>
<h4 class="r-h3">40. Schizofrenizacja (<em>schizophrénisation</em>)</h4>
<p><strong>Definicja:</strong> Odblokowanie procesu schizofrenicznego w polu społecznym -- rozbijanie struktur molowych (Edyp, „ja") w celu uwolnienia molekularnych przepływów pragnienia. Nie oznacza wywoływania choroby klinicznej, lecz uwalnianie deterytorializacji ku rewolucyjnemu ujściu. Schizoanaliza ma „wyleczyć ludzkość z terapeutycznego uleczenia" (neurotyzacji).</p>
<p><strong>Kontekst:</strong> AE, rozdział 1 (sekcja 4) i rozdział 4 (sekcja 4).</p>
<h4 class="r-h3">41. Segmentarność (<em>segmentarité</em>)</h4>
<p><strong>Definicja:</strong> Ludzie są „zwierzętami segmentarnymi" -- organizują swoje życie w segmenty. Segmentarność molowa (sztywna) charakteryzuje się binarnymi opozycjami, koncentrycznymi kręgami i nadkodowanymi liniami; jest domeną aparatu państwowego. Segmentarność molekularna (giętka) opiera się na przepływach pragnienia i wiary, z płynnymi segmentami i rozmytymi granicami.</p>
<p><strong>Kontekst:</strong> TP, plateau 9 (<em>Mikropolityka i segmentarność</em>).</p>
<h4 class="r-h3">42. Simulakrum (<em>simulacre</em>)</h4>
<p><strong>Definicja:</strong> W kontekście AE: osoby prywatne (ojciec, matka, dziecko) jako „obrazy obrazów" -- symulakra, które nie reprezentują realnej produkcji społecznej, lecz są domowymi „residuami" pozwalającymi kapitalizmowi stosować obrazy społeczne do osób prywatnych. Simulakrum jest trzecim stopniem przedstawienia kapitalistycznego (po figurach aksjomatyki i obrazach/personach społecznych).</p>
<p><strong>Kontekst:</strong> AE, rozdział 3 (sekcja 10, <em>Przedstawienie kapitalistyczne</em>).</p>
<h4 class="r-h3">43. Socius</h4>
<p><strong>Definicja:</strong> „Ciało pełne" danej formacji społecznej -- instancja antyprodukcji, której główną rolą jest nakładanie się na procesy produkcji i przypisywanie ich sobie jako quasi-przyczyny. Trzy historyczne formy socius: Ziemia (maszyna terytorialna), Ciało Despoty/Bóg (maszyna despotyczna), Kapitał-Pieniądz (maszyna kapitalistyczna). Socius jest społecznym odpowiednikiem indywidualnego CbO.</p>
<p><strong>Kontekst:</strong> AE, rozdział 3.</p>
<p><strong>Ewolucja AE--TP:</strong> W TP pojęcie socius zostaje rozwinięte w kierunku pojęcia strata -- warstw stratyfikacji na Ciele Ziemi.</p>
<h4 class="r-h3">44. Stawanie-się (<em>devenir</em>)</h4>
<p><strong>Definicja:</strong> Realny proces różnicowania, ściśle odróżniany od imitacji, filiacji i podobieństwa. Stawanie-się jest inwolucją twórczą, ruchem przebiegającym „między" terminami i pod przypisywalnymi relacjami. Przebiega porządkiem sojuszu (zarażenia, epidemii), nie porządkiem dziedziczności. Seria stawań-się: stawanie-się-kobietą (pierwsze, wprowadzające), stawanie-się-dzieckiem, stawanie-się-zwierzęciem, stawanie-się-molekularne, stawanie-się-niedostrzegalnym (ostateczny cel).</p>
<p><strong>Kontekst:</strong> TP, plateau 10 (<em>Stawanie-się-intensywnym</em>).</p>
<h4 class="r-h3">45. Strata / Stratyfikacja (<em>strate / stratification</em>)</h4>
<p><strong>Definicja:</strong> Warstwy lub pasy istniejące jako „zgrubienia" na Ciele Ziemi. Strata organizują niestabilne materie i „uwięziają" wolne intensywności w systemach rezonansu i redundancji. Każda strata jest „podwójnie artykułowana" -- posiada treść (uformowane materie) i wyrażenie (sformalizowane struktury). Trzy główne strata: fizykochemiczna, organiczna, alloplastyczna (antropomorficzna). Stratyfikacja jest porównywana do „Sądu Bożego" -- operacji ograniczającej intensywność Ziemi.</p>
<p><strong>Kontekst:</strong> TP, plateau 3 (<em>Geologia moralności</em>) i konkluzja.</p>
<h4 class="r-h3">46. Synteza łącząca / rozłączna / koniunktywna (<em>synthèse connective / disjonctive / conjonctive</em>)</h4>
<p><strong>Definicja:</strong> Trzy pasywne syntezy nieświadomości, stanowiące fundament produkcji pragnącej. (1) <strong>Synteza łącząca</strong> (produkcji) -- „i... i potem..." -- sprzęga maszyny-organy z maszynami-źródłami, mobilizując Libido. (2) <strong>Synteza rozłączna</strong> (zapisu) -- „lub..." -- zapisuje procesy na CbO, mobilizując Numen. (3) <strong>Synteza koniunktywna</strong> (konsumpcji) -- „a więc to tak!" -- konsumuje stany intensywne, wytwarzając podmiot jako residuum, mobilizując Voluptas.</p>
<p><strong>Kontekst:</strong> AE, rozdział 1 (sekcje 1--3) i rozdział 2 (sekcje 3--6, prawomocne vs. nieuprawnione użycia syntez).</p>
<p><strong>Ewolucja AE--TP:</strong> W TP trzy syntezy nie są wprost powtórzone, ale ich logika przenika pojęcie trzech linii (molowa, molekularna, ujścia) oraz koncepcję strat jako podwójnej artykulacji.</p>
<h4 class="r-h3">47. Terytorium (<em>territoire</em>)</h4>
<p><strong>Definicja:</strong> W TP: powstaje, gdy komponenty środowiskowe przestają być czysto funkcjonalne i stają się ekspresyjne lub jakościowe. Terytorium jest pierwszym asemblażem -- „posiadaniem" głębszym niż „bycie". Wyznacza krytyczny dystans i organizuje przestrzeń wokół ekspresyjnych znaków. Terytorium nie jest synonimem „obszaru geograficznego" -- jest aktem ekspresji, który konstytuuje „dom".</p>
<p><strong>Kontekst:</strong> TP, plateau 11 (<em>O refrenie</em>) i 12 (<em>Nomadologia</em>).</p>
<h4 class="r-h3">48. Transformacje bezcielesne (<em>transformations incorporelles</em>)</h4>
<p><strong>Definicja:</strong> Akty językowe, w których słowa-hasła (mots d'ordre) natychmiastowo przypisują ciałom nowe atrybuty, nie zmieniając ich materialności. Wyrok sędziego przekształca oskarżonego w skazańca; porywacz przekształca pasażerów w zakładników. Transformacje bezcielesne to czyste wydarzenia, rozpoznawalne po ich natychmiastowości.</p>
<p><strong>Kontekst:</strong> TP, plateau 4 (<em>Postulaty lingwistyki</em>).</p>
<h4 class="r-h3">49. Twarzowość (<em>visagéité</em>)</h4>
<p><strong>Definicja:</strong> Maszyna abstrakcyjna produkująca twarz poprzez nałożenie systemu biała ściana/czarna dziura na ciało i głowę. Twarz nie jest naturalnym elementem ludzkiego ciała -- jest wytwarzana przez konkretne asemblacje władzy. Twarz Chrystusa jest modelem centralnym dla zachodniej maszyny twarzowości, funkcjonując jak „centralny komputer" do biuniwokalizacji (skanowanie i kategoryzacja twarzy według stopni odchylenia od standardu Białego-Mężczyzny). Rasizm operuje przez twarzowość.</p>
<p><strong>Kontekst:</strong> TP, plateau 7 (<em>Rok zerowy: Twarzowość</em>).</p>
<h4 class="r-h3">50. Urstaat</h4>
<p><strong>Definicja:</strong> Pra-państwo -- źródłowy, odwieczny model państwa, który nawiedza całą historię powszechną jako jej horyzont. Nie jest konkretnym państwem historycznym, lecz abstrakcyjną maszyną, która powraca w każdej formacji społecznej. Urstaat jest „odwieczne" -- „zawsze było i zawsze będzie", jako wirtualność w tle każdego społeczeństwa. Społeczeństwa pierwotne aktywnie egzorcyzmują Urstaat.</p>
<p><strong>Kontekst:</strong> AE, rozdział 3 (sekcja 8). TP, plateau 12 i 13.</p>
<h4 class="r-h3">51. Wartość dodatkowa kodu / Wartość dodatkowa przepływu (<em>plus-value de code / plus-value de flux</em>)</h4>
<p><strong>Definicja:</strong> Dwa typy nadwyżki odpowiadające dwóm typom maszyn społecznych. <strong>Wartość dodatkowa kodu</strong> występuje w społeczeństwach pierwotnych i despotycznych -- jakościowa nadwyżka oparta na prestiżu, długu i honorze. <strong>Wartość dodatkowa przepływu</strong> występuje w kapitalizmie -- ilościowa, określona przez różnicową relację między przepływem finansowania (kapitał) a przepływem płac (praca).</p>
<p><strong>Kontekst:</strong> AE, rozdział 3 (sekcje 5 i 9) i rozdział 1 (sekcja 5, maszynowy nadmiar jako przechwycenie kodu).</p>
<h4 class="r-h3">52. Wielość (<em>multiplicité</em>)</h4>
<p><strong>Definicja:</strong> Kategoria używana jako rzeczownik, nie przymiotnik, znosząca opozycję „jednego i wielu". Wielość jest definiowana nie przez punkty wewnętrzne, lecz przez „zewnętrze" -- linie ujścia lub deterytorializacji, wzdłuż których łączy się z innymi wielościami. Nie ma ani podmiotu, ani przedmiotu -- jedynie determinacje i wymiary, które nie mogą wzrastać bez zmiany natury wielości. Pojęcie inspirowane matematyką Riemanna i filozofią Bergsona.</p>
<p><strong>Kontekst:</strong> TP, plateau 1 (trzecia zasada kłącza) i plateau 2 (sfora jako wielość molekularna vs. masa jako wielość molowa).</p>`

        html: `<h4 class="r-h3">25.1. Maszyny pragnące → asemblaże</h4>
<p>Ewolucja od maszyn pragnących do asemblaży stanowi najbardziej fundamentalne przesunięcie pojęciowe między dwoma tomami. W <em>Anty-Edypie</em> maszyna pragnąca jest definiowana jako binarny system cięć i przepływów -- mikrofizyka nieświadomości, w której pragnienie produkuje rzeczywistość. Pojęcie to akcentuje przede wszystkim wymiar produkcyjny i kliniczny: maszyny pragnące funkcjonują na poziomie molekularnym, a ich relacja z maszynami społecznymi (molowymi) jest opisana w kategoriach tożsamości natury przy różnicy reżimu.</p>
<p>W <em>Tysiącu plateau</em> maszyna pragnąca ustępuje miejsca pojęciu asemblażu (<em>agencement</em>), które jest bardziej wielowymiarowe. Asemblaż posiada oś horyzontalną (maszynowy asemblaż ciał + kolektywny asemblaż wypowiadania) i oś wertykalną (terytorialność ↔ deterytorializacja). Ta „tetrawalencja" pozwala na jednoczesną analizę materialnych ciał, aktów mowy, procesów terytorializacji i linii ujścia -- czego pojęcie maszyny pragnącej nie obejmowało w sposób systematyczny.</p>
<p>Przesunięcie to nie jest odrzuceniem, lecz rozwinięciem. Jak zauważa Buchanan, maszyny pragnące pozostają „wnętrzem" asemblaży -- ich libidynalną, molekularną bazą. Asemblaż natomiast umożliwia opis relacji między pragnieniem a polem społecznym bez redukcji jednego do drugiego.</p>
<h4 class="r-h3">25.2. CbO jako pojęcie kliniczne → CbO jako płaszczyzna konsystencji</h4>
<p>W <em>Anty-Edypie</em> Ciało bez Organów jest elementem procesu produkcji pragnącej -- powierzchnią zapisu, na której maszyny pragnące osadzają swoje intensywności. Relacja CbO z maszynami pragnącymi jest jednocześnie konfliktowa (odpychanie -- maszyny paranoiczne) i komplementarna (przyciąganie -- maszyny cudowne). CbO pełni funkcję kliniczną: jest doświadczeniem schizofrenika, katatonika, masochisty.</p>
<p>W <em>Tysiącu plateau</em> CbO zyskuje rangę pojęcia ontologicznego. Staje się Ciałem Ziemi -- płaszczyzną konsystencji, na której strata tworzą się jako zgrubienia. Plateau 6 (<em>Jak wytworzyć sobie CbO?</em>) transformuje CbO z pojęcia opisowego w pojęcie praktyczne i eksperymentalne, wprowadzając typologię (pełne, puste, rakowe CbO) oraz zasadę ostrożności. CbO nie jest już tylko powierzchnią zapisu, lecz polem immanencji pragnienia -- płaszczyzną, na której wszystkie asemblaże, strata i linie ujścia mogą być kartograficznie zmapowane.</p>
<h4 class="r-h3">25.3. Trzy syntezy → trzy linie</h4>
<p>Trzy syntezy pasywne nieświadomości (łącząca, rozłączna, koniunktywna) stanowią centralny mechanizm <em>Anty-Edypa</em>. W <em>Tysiącu plateau</em> nie są one wprost powtórzone, ale ich logika zostaje przetransponowana na pojęcie trzech linii, które organizują kartografię schizoanalityczną.</p>
<p>Linia molowa (sztywna segmentarność) odpowiada nieuprawnionemu użyciu syntez -- zakrzepłym formom, binarnym podziałom, edypalnej triangulacji. Linia molekularna (giętka segmentarność) odpowiada mikropolityce pragnienia -- drobnym przesunięciom, pęknięciom, przepływom wymykającym się molarnej kontroli. Linia ujścia odpowiada procesowi deterytorializacji -- absolutnemu ruchowi, który przekracza wszelkie segmenty.</p>
<p>Przejście od syntez do linii oznacza zmianę perspektywy: z analizy mechanizmów produkcji pragnącej na kartografię życia (jednostkowego i zbiorowego). Schizoanaliza w TP nie pyta już przede wszystkim o „maszyny pragnące podmiotu", lecz o „linie, które go składają".</p>
<h4 class="r-h3">25.4. Socius → strata</h4>
<p>Pojęcie socius -- „ciała pełnego" formacji społecznej -- jest w <em>Anty-Edypie</em> narzędziem analizy historii powszechnej (Ziemia, Despota, Kapitał). W <em>Tysiącu plateau</em> socius zostaje włączony w szerszą ontologię stratyfikacji. Strata to nie tylko formacje społeczne, lecz warstwy organizujące całą rzeczywistość: fizykochemiczne, organiczne, alloplastyczne. Socius jest szczególnym przypadkiem stratum -- warstwą, w której materia społeczna zostaje podwójnie artykułowana w treść i wyrażenie.</p>
<p>Przesunięcie to poszerza zasięg analizy: schizoanaliza w TP nie ogranicza się do krytyki społecznej, lecz obejmuje geologię, biologię i semiotykę jako wymiary stratyfikacji.</p>
<h4 class="r-h3">25.5. Molowe/molekularne: pogłębienie i rozwinięcie</h4>
<p>Rozróżnienie molowe/molekularne jest obecne w obu tomach, lecz w <em>Tysiącu plateau</em> zyskuje wielowymiarową precyzję. W AE opozycja ta opisuje przede wszystkim relację między maszynami pragnącymi (molekularnymi) a maszynami społecznymi (molowymi), z tezą o tożsamości natury przy różnicy reżimu. W TP molowe/molekularne staje się narzędziem mikropolityki: molekularne ruchy pragnienia mogą zarówno podważać molarne struktury (rewolucja), jak i je wzmacniać (mikrofaszyzm). Faszyzm jest analizowany jako zjawisko przede wszystkim molekularne -- „rakowe CbO", w którym małe czarne dziury zaczynają ze sobą rezonować.</p>
<h4 class="r-h3">25.6. Deterytorializacja: od procesu ekonomicznego do ontologii ruchu</h4>
<p>W <em>Anty-Edypie</em> deterytorializacja jest przede wszystkim kategorią ekonomiczno-historyczną: kapitalizm deterytorializuje przepływy (odrywa pracowników od ziemi, pieniądz od produkcji), jednocześnie je reterytorializując na sztucznych resztkach (rodzina, państwo, Edyp). W <em>Tysiącu plateau</em> deterytorializacja staje się fundamentalnym ruchem ontologicznym, wpisanym w samą naturę strat, asemblaży i linii ujścia. Otrzymuje systematyczną typologię (względna/absolutna, pozytywna/negatywna) i staje się centralnym narzędziem analizy we wszystkich plateau -- od lingwistyki po estetykę, od polityki po geologię.</p>
<h4 class="r-h3">25.7. Krytyka psychoanalizy: od frontalnego ataku do subtelnej kartografii</h4>
<p><em>Anty-Edyp</em> jest przede wszystkim systematyczną krytyką psychoanalizy i kompleksu Edypa. Rozdział 2 stanowi bezlitosne demontowanie paralogizmów psychoanalitycznych, a rozdział 4 proponuje schizoanalizę jako radykalną alternatywę. Ton jest polemiczny, niekiedy pamfletowy.</p>
<p>W <em>Tysiącu plateau</em> krytyka psychoanalizy nie znika, ale zmienia formę. Zamiast frontalnego ataku, autorzy proponują subtelną kartografię alternatywnych pojęć, które czynią psychoanalizę zbyteczną. Plateau 2 (<em>Jeden czy kilka wilków?</em>) jest ostatnim wielkim rozrachunkiem z Freudem (redukcja sfory wilków do ojca), ale większość plateau konstruuje pozytywne narzędzia analityczne (kłącze, asemblaż, stawanie-się, linie, reżimy znaków), które po prostu nie potrzebują Edypa, kastracji ani Znaczącego. Schizoanaliza w TP jest przede wszystkim kartografią i pragmatyką, nie anty-psychoanalizą.</p>`

        html: `<h4 class="r-h3">26.1. Schizoanaliza jako praktyka: kartografia, pragmatyka, mikropolityka, eksperymentacja</h4>
<p>Schizoanaliza, zainicjowana w <em>Anty-Edypie</em> i rozwinięta w <em>Tysiącu plateau</em>, nie jest teorią w tradycyjnym sensie -- jest przede wszystkim <strong>praktyką</strong>. Jej charakter można opisać przez cztery współzależne wymiary.</p>
<p><strong>Kartografia.</strong> Schizoanaliza zastępuje interpretację (hermeneutykę) mapowaniem. Nie szuka ukrytych znaczeń, lecz kreśli mapy linii, które składają się na życie jednostki lub grupy: linii molowych (sztywne segmenty instytucjonalne), linii molekularnych (giętkie mikro-ruchy pragnienia) i linii ujścia (twórcze deterytorializacje). Mapa, w odróżnieniu od kalki, jest otwarta, możliwa do połączenia, odłączenia i odwrócenia. Nie reprodukuje gotowego modelu, lecz konstruuje nowe możliwości.</p>
<p><strong>Pragmatyka.</strong> Schizoanaliza jest pragmatyką w podwójnym sensie: semiotycznym (analiza konkretnych reżimów znaków i ich mieszanin, zamiast poszukiwania uniwersalnego Znaczącego) i politycznym (badanie, jak asemblaże faktycznie funkcjonują w danym kontekście). Pytanie „jak to działa?" zastępuje pytanie „co to znaczy?". Ta zmiana perspektywy jest fundamentalna: nieświadomość nie wyraża niczego, lecz produkuje; nie odgrywa mitów, lecz montuje maszyny.</p>
<p><strong>Mikropolityka.</strong> Schizoanaliza operuje na poziomie mikropolitycznym, badając molekularne ruchy pragnienia, które umykają analizie makropolitycznej. Kluczowa teza brzmi: nie ma makropolityki bez mikropolityki i odwrotnie. Faszyzm nie rodzi się z ideologii, lecz z mikrofaszyzmów -- molekularnych „czarnych dziur" pragnienia, które zaczynają ze sobą rezonować. Rewolucja nie polega na zdobyciu aparatu państwowego, lecz na schizofrenizacji pola społecznego -- uwolnieniu przepływów pragnienia z paranoicznych struktur.</p>
<p><strong>Eksperymentacja.</strong> Schizoanaliza jest eksperymentacją na Ciele bez Organów, nie odkrywaniem ukrytych prawd. Eksperymentacja oznacza konstruowanie planu konsystencji kawałek po kawałku, z zachowaniem ostrożności. Nie chodzi o gwałtowną destratyfikację (która prowadzi do katastrofy -- pustego lub rakowego CbO), lecz o cierpliwe demontowanie organizmu za pomocą „bardzo drobnego pilnika", przy zachowaniu wystarczającej ilości organizacji i podmiotowości, by przetrwać.</p>
<h4 class="r-h3">26.2. Cztery zadania schizoanalizy (negatywne i pozytywne)</h4>
<p>Deleuze i Guattari definiują program schizoanalizy przez cztery zadania, które muszą być realizowane równocześnie i wzajemnie się warunkują.</p>
<p><strong>Pierwsze zadanie negatywne (destruktywne): Wyskrobanie nieświadomości.</strong> Polega na fizycznym zburzeniu edypalnych przedstawień, kastracji, Fallusa jako transcendentnego Znaczącego, nad-ja, „ja" i poczucia winy. Schizoanalityk nie „przepracowuje" problemów (co je konserwuje), lecz je niszczy. Destrukcja dotyczy samej wiary w znaczenie i symbolikę, która tłumi produkcję pragnącą. Jest to „kiretaż" nieświadomości -- oczyszczenie pola pragnienia z narzuconych mu form ideologicznych.</p>
<p><strong>Drugie zadanie negatywne: Rozbicie reterytorializacji.</strong> Polega na demontowaniu sztucznych terytoriów, na których kapitalizm reterytorializuje zdekodowane przepływy -- przede wszystkim rodziny edypalnej, nacjonalizmu i innych form „intymnej formacji kolonialnej". Zadanie to jest nierozłączne od analizy politycznej.</p>
<p><strong>Pierwsze zadanie pozytywne: Odkrycie maszyn pragnących.</strong> Polega na ustaleniu, jak funkcjonują maszyny pragnące danego podmiotu -- co wprowadza do swoich maszyn, co z nich wyprowadza, jakie usterki składają się na ich działanie. Schizoanaliza szuka „wskaźników maszynowych" w maszynach społecznych i technicznych, niezależnie od jakiejkolwiek interpretacji.</p>
<p><strong>Drugie zadanie pozytywne: Dotarcie do inwestycji społecznych pragnienia.</strong> Polega na odróżnieniu nieświadomych inwestycji libidynalnych pola społecznego (grupowych, pragnieniowych) od przedświadomych inwestycji interesu (klasowych, racjonalnych). Kluczowe pytanie brzmi: w jaki biegun inwestuje pragnienie -- paranoiczno-reakcyjny (faszyzujący, terytorializujący) czy schizo-rewolucyjny (nomadyczny, deterytorializujący)?</p>
<h4 class="r-h3">26.3. „Nowa ziemia" jako horyzont</h4>
<p>Pojęcie „nowej ziemi" pojawia się w kulminacyjnych fragmentach obu tomów jako horyzont projektu schizoanalitycznego. Nowa ziemia nie jest utopijną krainą obiecaną ani przyszłym stanem idealnym -- jest czymś, co stwarza się w samym przebiegu deterytorializacji. Jest „siedliskiem uzdrowienia", w którym pragnienie nie jest już blokowane przez kody ani aksjomaty. Nowa ziemia powstaje, gdy maszyny artystyczne, naukowe i analityczne stają się częściami składowymi maszyny rewolucyjnej, tworząc płaszczyznę immanencji, na której pragnienie produkuje realność bez pośrednictwa braku.</p>
<p>Program schizoanalizy dąży do tego, by proces deterytorializacji nie kończył się „upadkiem" (breakdown) w chorobę, lecz stawał się „przełomem" (breakthrough) ku nowej ziemi. Jest to zarazem zadanie kliniczne, polityczne i egzystencjalne.</p>
<h4 class="r-h3">26.4. Związek z Kantem: krytyka transcendentalna pragnienia</h4>
