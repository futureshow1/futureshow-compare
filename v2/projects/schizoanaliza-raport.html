<script>
// ══════════════════════════════════════
// APP LOGIC
// ══════════════════════════════════════
(function(){

  // flatten chapters
  const allChapters = [];
  reportData.forEach(part => {
    part.chapters.forEach(ch => {
      allChapters.push({ ...ch, part: part.part });
    });
  });

  let currentIdx = 0;

  // ── build TOC ──
  const tocEl = document.getElementById('toc');
  let tocHTML = '';
  reportData.forEach(part => {
    tocHTML += `<div class="toc-part">${part.part}</div>`;
    part.chapters.forEach(ch => {
      const idx = allChapters.findIndex(c => c.id === ch.id);
      tocHTML += `<div class="toc-item" data-idx="${idx}">${ch.id}. ${ch.title}</div>`;
    });
  });
  tocEl.innerHTML = tocHTML;

  // TOC click
  tocEl.querySelectorAll('.toc-item').forEach(item => {
    item.addEventListener('click', () => {
      goTo(parseInt(item.dataset.idx));
      closeTocMobile();
    });
  });

  // ── render chapter ──
  const contentEl = document.getElementById('content');

  function render(idx) {
    currentIdx = idx;
    const ch = allChapters[idx];
    const prev = idx > 0 ? allChapters[idx - 1] : null;
    const next = idx < allChapters.length - 1 ? allChapters[idx + 1] : null;

    // estimate reading time (~200 words/min for academic Polish)
    const wordCount = ch.html.replace(/<[^>]+>/g, '').split(/\s+/).length;
    const readMin = Math.max(1, Math.round(wordCount / 180));

    contentEl.innerHTML = `
      <div class="chapter active">
        <div class="chapter-header">
          <div class="chapter-part-label">${ch.part}</div>
          <h1 class="chapter-title">Rozdział ${ch.id}. ${ch.title}</h1>
          <div class="chapter-nav">
            <button onclick="goTo(${idx - 1})" ${!prev ? 'disabled' : ''}>← Poprzedni</button>
            <button onclick="goTo(${idx + 1})" ${!next ? 'disabled' : ''}>Następny →</button>
          </div>
          <div class="reading-info">~${readMin} min czytania · ${wordCount.toLocaleString('pl')} słów</div>
        </div>
        <div class="chapter-body">${ch.html}</div>
        <div class="chapter-footer">
          <button onclick="goTo(${idx - 1})" ${!prev ? 'disabled' : ''}>
            ${prev ? `<span class="prev-label">← Poprzedni</span><span class="ch-name">${prev.title}</span>` : ''}
          </button>
          <button onclick="goTo(${idx + 1})" ${!next ? 'disabled' : ''}>
            ${next ? `<span class="next-label">Następny →</span><span class="ch-name">${next.title}</span>` : ''}
          </button>
        </div>
      </div>
    `;

    // update TOC active
    tocEl.querySelectorAll('.toc-item').forEach(item => {
      item.classList.toggle('active', parseInt(item.dataset.idx) === idx);
    });
    // scroll active TOC item into view
    const activeItem = tocEl.querySelector('.toc-item.active');
    if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    // update progress
    updateProgress();

    // scroll to top
    window.scrollTo({ top: 0, behavior: 'smooth' });

    // save position
    try { localStorage.setItem('report_chapter', idx); } catch(e){}
  }

  // expose globally for onclick
  window.goTo = function(idx) {
    if (idx >= 0 && idx < allChapters.length) render(idx);
  };

  // ── progress bar ──
  function updateProgress() {
    const pct = ((currentIdx + 1) / allChapters.length * 100).toFixed(1);
    document.getElementById('progressFill').style.width = pct + '%';
  }

  // ── scroll progress within chapter ──
  window.addEventListener('scroll', () => {
    const scrollH = document.documentElement.scrollHeight - window.innerHeight;
    if (scrollH <= 0) return;
    const scrollPct = window.scrollY / scrollH;
    // blend chapter progress with scroll progress
    const chapterBase = currentIdx / allChapters.length * 100;
    const chapterSlice = 1 / allChapters.length * 100;
    const pct = chapterBase + chapterSlice * scrollPct;
    document.getElementById('progressFill').style.width = pct.toFixed(1) + '%';
  });

  // ── TOC toggle (mobile) ──
  window.toggleToc = function() {
    document.getElementById('toc').classList.toggle('open');
    document.getElementById('tocOverlay').classList.toggle('open');
  };
  function closeTocMobile() {
    document.getElementById('toc').classList.remove('open');
    document.getElementById('tocOverlay').classList.remove('open');
  }

  // ── keyboard nav ──
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      if (currentIdx > 0) render(currentIdx - 1);
    }
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      if (currentIdx < allChapters.length - 1) render(currentIdx + 1);
    }
  });

  // ── init ──
  let startIdx = 0;
  try { startIdx = parseInt(localStorage.getItem('report_chapter')) || 0; } catch(e){}
  if (startIdx < 0 || startIdx >= allChapters.length) startIdx = 0;
  render(startIdx);

})();
</script>
