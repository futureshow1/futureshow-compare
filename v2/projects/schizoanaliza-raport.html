<h4 class="r-h3">7.3 Barbarzyńska maszyna despotyczna</h4>
<p><strong>Nadkodowanie jako istota państwa</strong></p>
<p>Nadkodowanie jest operacją konstytuującą istotę państwa. Polega ono na tym, że państwo narzuca wyższą, transcendentną jedność przepływom, które zostały już wcześniej zakodowane przez wspólnoty pierwotne. Zamiast niszczyć dawne kody, państwo czyni z nich „cegły" — części pracujące w nowym, monumentalnym systemie. Nadkodowanie sprawia, że każda forma produkcji wydaje się emanować z ciała despoty jako jej quasi-przyczyny — analogicznie do tego, jak CbO przypisuje sobie moc maszyn pragnących na poziomie indywidualnym. Maszyna despotyczna jest maszyną paranoiczną: despota-paranoik organizuje całość produkcji społecznej wokół jednego centrum — swojego ciała pełnego. Paranoja odpowiada molowej organizacji władzy, w której każdy przepływ musi przejść przez ciało suwerena.</p>
<p><strong>Urstaat</strong></p>
<p>Państwo despotyczne nie powstaje stopniowo, lecz zjawia się nagle jako pełny i gotowy system — Urstaat (pra-państwo). Jest to abstrakcyjna maszyna, która nawiedza całą historię powszechną jako jej horyzont — „zawsze było i zawsze będzie", jako wirtualność w tle każdego społeczeństwa. Społeczeństwa pierwotne aktywnie „egzorcyzmują" Urstaat, zapobiegając koncentracji władzy (tu Deleuze i Guattari powołują się na Pierre'a Clastresa i jego koncepcję „społeczeństw przeciw państwu"). W kapitalizmie Urstaat powraca w postaci nowoczesnego państwa-regulatora.</p>
<p><strong>Dług nieskończony, system terroru</strong></p>
<p>W maszynie despotycznej pełne ciało Ziemi zostaje zastąpione przez pełne ciało despoty, który staje się jedynym właścicielem i źródłem wszelkiej mocy. Dług, który w społeczeństwach pierwotnych był skończony i mobilny, staje się nieskończony — dłużnik (poddany) nigdy nie przestaje spłacać należności, ponieważ dług staje się „długiem egzystencjalnym" wobec suwerena. Miejsce pierwotnego systemu okrucieństwa zajmuje system terroru — kara przestaje być świętem zbiorowym i staje się zemstą despoty. Prawo jest metonimiczne i niepoznawalne — wyrok nie istnieje przed sankcją, jak w kafkowskiej maszynie karnej.</p>
<p><strong>Nowy alians i bezpośrednia filiacja</strong></p>
<p>Despota ustanawia nowy porządek genealogiczny: uchyla dawne linie powinowactwa i narzuca nowe przymierze między sobą a ludem (nowy alians), jednocześnie wywodząc swój rodowód wprost od bóstwa (bezpośrednia filiacja). Kazirodztwo królewskie — małżeństwo z siostrą lub matką — służy przywłaszczeniu wszystkich zapasów filiacyjnych przez jedną osobę suwerena.</p>
<p><strong>Wyłonienie się pisma i egzegezy</strong></p>
<p>Wraz z systemem imperialnym rodzi się pismo w wąskim znaczeniu — jako narzędzie biurokracji i prawodawstwa. Grafizm, który u „dzikich" był niezależny od głosu, zostaje teraz podporządkowany głosowi despoty, stając się pismem linearnym. W systemie terytorialnym triada głos-grafizm-oko składała się z trzech niezależnych serii: głos artykułował zasady aliansu, grafizm (geo-grafizm) odciskał znaki bezpośrednio na ciele niezależnie od głosu, a oko oceniało ból na ciele jako potwierdzenie wartości. W systemie despotycznym ta niezależność zostaje zniesiona: głos zyskuje transcendencję (staje się głosem „z góry", głosem prawa i objawienia), grafizm zostaje mu podporządkowany (pismo linearne jako zapis prawa), a oko zmienia funkcję — zamiast oceniać ból na ciele, teraz „czyta" tekst pisany.</p>
<p>Ta transformacja wprowadza zmianę paradygmatu: zamiast pytać o użyteczność znaku (jak w systemie terytorialnym), pojawia się pytanie „co to znaczy?" — egzegeza jako nowy sposób zniewolenia pragnienia przez znaczące. Pojawia się „znaczące despotyczne" — nadrzędny znak, który organizuje wszystkie inne znaki w łańcuch znaczeń. Deleuze i Guattari widzą w tym narodziny „hermeneutyki" w najszerszym sensie — dążenia do odszukania ukrytego sensu, które będzie kontynuowane przez psychoanalizę w warunkach kapitalizmu. Maszyna karna z opowiadania Kafki jest tu paradygmatycznym przykładem inskrypcji despotycznej — maszyna zapisuje wyrok bezpośrednio na ciele skazanego, a wyrok nie istnieje przed sankcją.</p>
<h4 class="r-h3">7.4 Cywilizowana maszyna kapitalistyczna</h4>
<p><strong>Aksjomatyka zdekodowanych przepływów</strong></p>
<p>Maszyna kapitalistyczna stanowi radykalne zerwanie z mechanizmami kodowania poprzednich społeczeństw. Jest jedyną maszyną społeczną zbudowaną na zdekodowanych przepływach — podczas gdy wcześniejsze społeczeństwa obawiały się zdekodowanych przepływów jako „koszmaru", który zniszczyłby ich tkankę społeczną, kapitalizm internalizuje to dekodowanie, czyniąc z niego sam rdzeń swojej produkcji. Zamiast jakościowych kodów przypisujących sakralne lub społeczne znaczenie działaniom, kapitalizm wprowadza funkcjonalną aksjomatykę ilości abstrakcyjnych. Pieniądz działa jako ekwiwalent ogólny, który ewakuuje znaczenie z systemu, czyniąc go czysto funkcjonalnym i cynicznym. W odróżnieniu od kodów, które musiały być zapisane na ludzkim ciele poprzez rytuał, aksjomatyka operuje bezpośrednio na pieniądzu i kapitale, nie wymagając wiary ani pamięci, jedynie regulacji przez państwo.</p>
<p><strong>Dwa przepływy: wolna praca i niezależny kapitał</strong></p>
<p>Maszyna kapitalistyczna rodzi się z przypadkowej koniunkcji dwóch specyficznych zdeterytorializowanych przepływów: zdeterytorializowanej pracy („wolny pracownik" oddzielony od ziemi i środków produkcji, posiadający jedynie siłę roboczą) oraz zdeterytorializowanego kapitału (niezależny pieniądz-kapitał zdolny do zakupu tej siły roboczej). Kapitalizm nie powstaje, dopóki kapitał bezpośrednio nie przywłaszcza sobie produkcji, przechodząc poza działalność kupiecką w przemysłowo-filiacyjną formę, gdzie pieniądz rodzi pieniądz.</p>
<p><strong>Deterytorializacja i reterytorializacja</strong></p>
<p>Kapitalizm funkcjonuje poprzez podwójny ruch, który stanowi jego fundamentalną dynamikę. Deterytorializacja nieustannie rozbija stare terytoria, tradycje i rodziny, aby uwolnić przepływy dla zysku — niszczy wspólnoty wiejskie, więzy feudalne, rzemieślnicze gildie, tradycyjne formy życia. Jednocześnie reterytorializacja tworzy „sztuczne residua" i „pułapki" — nowoczesne państwo, nacjonalizm, rodzinę edypalną — aby ponownie przywiązać pragnienie do kontrolowalnych form. Państwo służy jako regulator, który „aksjomatyzuje jedną ręką to, co dekoduje drugą", tworząc pole immanencji, w którym przechwytuje same przepływy, które uwolnił. Własność prywatna wyłania się w tym kontekście jako „subiektywna istota" bogactwa — kapitalizm odkrywa, że bogactwo jest produkowane przez „pracę w ogóle" (abstrakcyjną istotę subiektywną), ale natychmiast ponownie alienuje to odkrycie, zamykając je w formie własności prywatnej.</p>
<p><strong>Tendencja i kontrtendencja</strong></p>
<p>Kapitalizm jest rządzony przez „prawo skontrtendowanej tendencji". Tendencja to wrodzona skłonność kapitalizmu do absolutnego dekodowania i spadającej stopy zysku, która popycha system ku jego granicy. Kontrtendencja to stałe przesuwanie tej granicy — dodawanie nowych aksjomatów, tworzenie sztucznej rzadkości, przesuwanie kryzysów z centrum na peryferie. System „działa tylko psując się", wykorzystując własne kryzysy jako motory ekspansji.</p>
<p><strong>Wartość dodatkowa przepływu versus kodu</strong></p>
<p>Deleuze i Guattari wprowadzają kluczowe rozróżnienie między wartością dodatkową kodu (właściwą społeczeństwom pierwotnym — jakościową, opartą na prestiżu i długu społecznym) a wartością dodatkową przepływu (właściwą kapitalizmowi — określoną ilościowo przez różnicową relację między przepływami różnej „mocy", konkretnie przepływem finansowania versus przepływem płac).</p>
<p><strong>Schizofrenia jako granica zewnętrzna</strong></p>
<p>Schizofrenia jest absolutną, zewnętrzną granicą kapitalizmu — i to właśnie w tym pojęciu najwyraźniej widać spotkanie analizy klinicznej z analizą ekonomiczno-polityczną, które stanowi o oryginalności <em>Anty-Edypa</em>. Kapitalizm jest granicą względną — dekoduje przepływy, ale natychmiast wiąże je z powrotem w swoją własną aksjomatykę, dodając nowe aksjomaty za każdym razem, gdy granica wydaje się zagrożona. Schizofrenia reprezentuje natomiast stan, w którym przepływy są całkowicie zdekodowane i wolne na „zdesocjalizowanym ciele bez organów" — stan absolutnej deterytorializacji, w którym żaden aksjomat nie jest w stanie ponownie przechwycić pragnienia.</p>
<p>Kapitalizm skutecznie produkuje schizofreników jako swój własny produkt uboczny — ponieważ sam opiera się na dekodowaniu przepływów, nieustannie wytwarza podmioty, których pragnienie wymyka się aksjomatyce. Lecz musi ich natychmiast represjonować jako kliniczne „choroby", aby uniknąć własnego systemowego rozpadu. Edyp jest wewnętrzną, domową granicą, którą kapitalizm ustawia naprzeciw granicy zewnętrznej (schizofrenii): przechwytuje pragnienie, zanim dotrze ono do punktu absolutnej deterytorializacji. W ten sposób system „działa tylko psując się" — wykorzystuje własne kryzysy jako motory ekspansji, a własnych wyrzutków jako ostrzeżenie przed przekroczeniem granicy.</p>
<h4 class="r-h3">7.5 Przedstawienie kapitalistyczne i przybycie Edypa</h4>
<p><strong>Figury, obrazy, symulakra</strong></p>
<p>Przedstawienie kapitalistyczne operuje hierarchią abstrakcji. Figury to niefiguratywne „punkty-znaki" aksjomatyki kapitalistycznej (abstrakcyjne ilości pieniądza lub pracy). Obrazy to persony społeczne, które „personifikują" abstrakcyjny kapitał — „Kapitalista" lub „Robotnik". Symulakra to osoby prywatne (Mama, Tata, Dziecko) — „obrazy obrazów", które nie reprezentują realnej produkcji społecznej, lecz są domowymi residuami pozwalającymi systemowi stosować obrazy społeczne do osób prywatnych.</p>
<p><strong>Trzy użycia Edypa</strong></p>
<p>Deleuze i Guattari rozróżniają trzy warstwy Edypa. Edyp wyobrażeniowy (imaginaire) koncentruje się na realnych lub wyimaginowanych postaciach rodzicielskich i wspomnieniach z dzieciństwa — jest „teatrem" osobistej neurozy. Edyp strukturalny, wprowadzony przez lacanistów, traktuje Edypa jako formalny niezmiennik symboliczny (Imię-Ojca), ale nadal nadkodowuje pragnienie prawem i brakiem (kastracją). Wreszcie, pod tymi warstwami leży rzeczywistość materialna — molekularna produkcja pragnąca, która nie jest ani wyobrażeniowa, ani symboliczna, lecz stanowi „Niemożliwe Realne" złożone z maszyn pragnących.</p>
<p><strong>Edyp jako wewnętrzna kolonia kapitalizmu</strong></p>
<p>Edyp „wreszcie przybywa" w kapitalizmie, ponieważ kapitalizm tworzy unikalne warunki niezbędne do jego zajęcia nieświadomości. W społeczeństwach pierwotnych i despotycznych rodzina była „otwartą" strategią, pokrywającą się bezpośrednio z polem społecznym. W kapitalizmie produkcja społeczna staje się niezależna od reprodukcji ludzkiej — sam kapitał przejmuje funkcje aliansu i filiacji, pozostawiając rodzinę jako sprywatyzowane, zdesocjalizowane „residuum". Edyp działa jako wewnętrzna, domowa granica, w której pragnienie zostaje przechwycone i zneutralizowane, aby nie dotarło do swojej absolutnej granicy — schizofrenii.</p>
<p>Operacja nakładania (rabattement) polega na „złożeniu" rozległego pola społecznego (zbiór 4 + n klas, ras i agentów politycznych) na mały, ograniczony zbiór rodzinny (trójkąt 3 + 1: Mama-Tata-Ja). Każda postać społeczna (szef, ksiądz, policjant) zostaje nałożona na postać rodzinną — podmiot uczy się widzieć świat wyłącznie przez pryzmat relacji rodzicielskich. Ta redukcja czasoprzestrzenna zapewnia, że inwestycje pragnące zostają odwrócone od rewolucyjnych celów społecznych ku prywatnym, neurotycznym konfliktom.</p>
<p>Deleuze i Guattari podkreślają, że Edyp nie jest jedynie narzędziem wewnętrznym — jest on również narzędziem kolonializmu. Kolonizator narzuca skolonizowanym ramy rodzinne (tata-mama), aby odciąć ich od politycznych i społecznych inwestycji ich własnego pragnienia — jest to „eutanazja kulturowa" poprzez edypalizację. Problem Edypa w społeczeństwach pierwotnych jest szczególnie jaskrawy: Edyp jest tam „pustą, niezajętą granicą", ponieważ w systemie terytorialnym rodzina jest „otwarta" i pokrywa się z całym polem społeczno-historycznym. Nie istnieją tam warunki dla triangulacji edypalnej w formacie „3 + 1", ponieważ identyfikacje są grupowe i częściowe, a nie osobowe i globalne. Deleuze i Guattari krytykują zarówno uniwersalistów (widzących Edypa jako niezmiennik), jak i kulturalistów (jak Malinowski), za to, że obie strony pozostają w pułapce familializmu — traktują rodzinę jako „mikrokosmos", który rzekomo istnieje przed polem społecznym.</p>
<p><strong>Historia powszechna jako przygodność</strong></p>
<p>Dla Deleuze'a i Guattariego historia powszechna nie jest historią konieczności ani ciągłości, lecz historią przygodności (kontyngencji), cięć i granic. Kapitalizm powstał w wyniku przypadkowych zbiegów okoliczności i nieprzewidzianych spotkań zdekodowanych przepływów. Jednocześnie — idąc śladem Marksa — kapitalizm pozwala retroaktywnie zrozumieć całość dziejów, ponieważ dopiero w nim istota produkcji ujawnia się w swojej czystej, zdekodowanej formie. Podobnie jak w marksowskim stwierdzeniu, że „anatomia człowieka jest kluczem do anatomii małpy", gospodarka burżuazyjna dostarcza klucza do gospodarek antycznych — lecz klucza ironicznego i krytycznego, a nie teleologicznego.</p>`

<h4 class="r-h3">8.2 Pierwsze zadanie pozytywne: odkrycie maszyn pragnących</h4>
<p><strong>Reguła Leclaire'a</strong></p>
<p>Pierwsze pozytywne zadanie polega na odkryciu u podmiotu natury, formacji i funkcjonowania jego maszyn pragnących, całkowicie niezależnie od jakichkolwiek interpretacji. Schizoanaliza szuka elementów niezgodnych i wzajemnie niezależnych, które są związane jedynie „brakiem związku". Elementy te (obiekty częściowe) nie mogą być przeciwstawnymi określeniami tej samej istoty (jak płeć męska i żeńska), lecz muszą być realnie odrębnymi bytami. To reguła zaczerpnięta od Leclaire'a, ale radykalizowana — badanie musi przekroczyć próg rozproszenia, w którym pragnienie traci tożsamość wyobrażeniową i jedność strukturalną.</p>
<p><strong>Wskaźniki maszynowe</strong></p>
<p>Odkrycie maszyn pragnących odbywa się poprzez analizę wskaźników maszynowych, które znajdują się w maszynach społecznych i technicznych podmiotu. Schizoanaliza odkrywa, że pragnienie bezpośrednio inwestuje w pole społeczno-historyczne, a miłość i seksualność są jedynie wskaźnikami tych głębokich inwestycji. Pozytywnym celem jest przekształcenie wyparcia źródłowego (momentu, gdy CbO odpycha organy) w funkcjonowanie oparte na przyciąganiu i produkcji intensywności.</p>
<p><strong>Funkcjonalizm: „Jak to działa?"</strong></p>
<p>Fundamentalną zmianą metodologiczną, którą wprowadza schizoanaliza, jest zastąpienie pytania hermeneutycznego („co to znaczy?") pytaniem funkcjonalnym („jak to działa?"). Schizoanaliza ma charakter wyłącznie funkcjonalny — nie szuka ukrytego sensu, lecz bada mechanizmy produkcji rzeczywistości. Ustala, co podmiot wprowadza do swoich maszyn, co z nich wyprowadza i jakie usterki składają się na ich działanie.</p>
<p>Ta zmiana pytania nie jest jedynie retorycznym chwytem, lecz wyraża głęboką różnicę ontologiczną. Pytanie „co to znaczy?" zakłada, że za zjawiskami kryje się ukryty sens, który trzeba odkryć poprzez interpretację — a ten ukryty sens nieuchronnie okazuje się edypalny (wszystko „znaczy" tatę i mamę). Pytanie „jak to działa?" zakłada natomiast, że zjawiska są procesami produkcji, które trzeba opisać w kategoriach mechanicznych — jakie połączenia zachodzą, jakie przepływy są produkowane, jakie cięcia je organizują. Schizoanaliza zastępuje skojarzenia (które zawsze prowadzą do Edypa) dysocjacjami — uwalnianiem czystych osobliwości spod jarzma molarnych organizacji.</p>
<h4 class="r-h3">8.3 Drugie zadanie pozytywne: inwestycje społeczne libido</h4>
<p><strong>Grupy podmiotowe versus ujarzmione</strong></p>
<p>Drugie pozytywne zadanie polega na dotarciu do nieświadomych inwestycji libidynalnych pola społecznego oraz odróżnieniu ich od przedświadomych inwestycji interesu. Deleuze i Guattari wyróżniają dwa rodzaje organizacji grupowej. Grupy ujarzmione (groupes assujettis) charakteryzują się nieświadomą inwestycją paranoiczną i reakcyjną — podporządkowują produkcję pragnącą molowym strukturom władzy, wzmacniają hierarchie i narcyzm grupowy. Nawet grupy rewolucyjne na poziomie interesu mogą pozostawać grupami ujarzmionymi na poziomie pragnienia. Grupy podmiotowe (groupes-sujets) charakteryzują się inwestycjami libidynalnymi rewolucyjnymi — podporządkowują formy władzy produkcji pragnącej, wynajdują „śmiertelne" (zmienne) instytucje i dążą do uwalniania przepływów.</p>
<p><strong>Biegun paranoiczny versus schizo-rewolucyjny</strong></p>
<p>Inwestycje libido w pole społeczne oscylują między dwoma biegunami, które stanowią „matrycę każdej nieświadomej inwestycji społecznej". Biegun paranoiczno-reakcyjny (faszyzujący) inwestuje w centralną formację suwerenną (Państwo, Naród, Kapitał), dąży do terytorializacji, zakleszcza pragnienie w kodach i aksjomatach, wspiera segregację i rasizm. Jego dewizą jest: „Tak, jestem jednym z was, należę do wyższej rasy". Biegun schizo-rewolucyjny (nomadyczny) podąża wzdłuż linii ujścia, przekracza mury systemu, dekoduje przepływy i dąży do absolutnej deterytorializacji. Jego dewizą jest: „Nie jestem jednym z was, od wieków należę do podrzędnej rasy, jestem zwierzęciem".</p>
<p>Kluczowe jest to, że pytanie o to, „po której stronie" jest dane pragnienie, jest zawsze pytaniem mikropolitycznym — dotyczy molekularnych inwestycji, a nie deklarowanych ideologii. To tłumaczy fenomen, który fascinował Reicha: dlaczego masy pragnęły faszyzmu? Odpowiedź nie leży w ideologii ani oszustwie, lecz w pragnieniu — libido może zainwestować w system represyjny, ponieważ pragnienie jest częścią bazy ekonomicznej, a nie nadbudowy. Można obiektywnie mieć interes rewolucyjny (na poziomie przedświadomego interesu klasowego), a jednocześnie nieświadomie pragnąć represji (na poziomie libidynalnej inwestycji grupowej).</p>
<p><strong>Cztery tezy schizoanalizy</strong></p>
<p>Program schizoanalizy opiera się na czterech fundamentalnych tezach dotyczących pragnienia:</p>
<p>1. Każda inwestycja libido jest społeczna — pragnienie bezpośrednio inwestuje w pole społeczno-historyczne, rasy, klasy i maszyny.</p>
<p>2. Należy odróżnić nieświadomą inwestycję libidynalną (grupy/pragnienia) od przedświadomej inwestycji interesu (klasy/interesu) — można obiektywnie mieć interes rewolucyjny, a jednocześnie nieświadomie pragnąć represji.</p>
<p>3. Inwestycje nieświadomości w pole społeczne są pierwotne wobec inwestycji rodzinnych — Edyp jest jedynie wtórnym „zastosowaniem" pola społecznego na mały trójkąt rodzinny.</p>
<p>4. Inwestycje społeczne oscylują między biegunem paranoicznym (reakcyjnym, faszyzującym, terytorializującym) a biegunem schizoidalnym (rewolucyjnym, nomadycznym, deterytorializującym).</p>
<h4 class="r-h3">8.4 Bilans-program</h4>
<p><strong>Definicja maszyn pragnących (rekurencyjna komunikacja)</strong></p>
<p>Bilans-program zamykający <em>Anty-Edypa</em> pełni podwójną funkcję: jest zarazem podsumowaniem całego wywodu i programem przyszłych badań. W podsumowującym bilansie maszyny pragnące zostają zdefiniowane przede wszystkim jako układy rekurencyjnej komunikacji — nie proste narzędzia ani projekcje wyobraźni, lecz realne systemy, w których heterogeniczne elementy wchodzą w funkcjonalne związki. Autorzy kategorycznie odrzucają traktowanie maszyny jako metafory — pragnienie jest maszyną, a maszyna jest pragnąca. Maszyna pragnąca powstaje, gdy realnie odrębne części świata zostają skomunikowane w systemie, którego prawdopodobieństwo jest niskie, a człowiek staje się częścią składową tej maszyny. Maszyna jest „córką urodzoną bez matki" — sieroctwem nieświadomości, nie wywodzącą się z reprodukcji biologicznej, lecz z połączeń na ciele pełnym socius lub CbO. Maszyny nie przedstawiają niczego — są czystymi stanami intensywnymi i afektywnymi, pozbawionymi funkcji sygnifikacyjnej.</p>

<p><strong>Pojęcie „nowej ziemi"</strong></p>
<p><em>Anty-Edyp</em> zamyka się pojęciem „nowej ziemi" — koncepcji, która nie jest utopijną krainą obiecaną ani stanem przyszłym, lecz czymś, co stwarza się w samym przebiegu deterytorializacji. Jest to „siedlisko uzdrowienia", w którym pragnienie nie jest już blokowane przez kody ani aksjomaty. Program schizoanalizy dąży do tego, by proces deterytorializacji nie kończył się upadkiem (breakdown) w chorobę, lecz stawał się przełomem (breakthrough) ku nowej ziemi. Nowa ziemia powstaje, gdy maszyny artystyczne, naukowe i analityczne stają się częściami składowymi maszyny rewolucyjnej, tworząc płaszczyznę immanencji, na której pragnienie produkuje realność bez pośrednictwa braku.</p>
<p>Pojęcie nowej ziemi łączy się z nietzscheańskim Wiecznym Powrotem i marksowską ideą znoszącej się alienacji, tworząc horyzont, w którym tożsamość natury, przemysłu i historii zostaje w pełni zrealizowana. Nie jest to jednak cel, do którego dąży się linearnie — jest to raczej immanentna możliwość każdego aktu deterytorializacji, każdej linii ujścia, która otwiera się na to, co jeszcze nie zostało zakodowane.</p>

<p>Pierwsze plateau <em>Tysiąca plateau</em> — zatytułowane po prostu „Wprowadzenie: Kłącze" — pełni funkcję programową dla całości dzieła. Deleuze i Guattari ustanawiają w nim fundamentalną metodologię „myśli nomadycznej", przeciwstawiając nielinearne, zdecentrowane <strong>kłącze</strong> (<em>rhizome</em>) hierarchicznym, binarnym strukturom zachodniego myślenia <strong>arborescencyjnego</strong> (drzewiastego). Plateau to nie jest jedynie wstępem teoretycznym — stanowi deklarację ontologiczną i epistemologiczną, która warunkuje sposób lektury wszystkich pozostałych plateau.</p>
<p>Autorzy formułują trzy modele książki, które jednocześnie odpowiadają trzem modelom myślenia i trzem modelom organizacji rzeczywistości: <strong>książka-korzeń</strong> (<em>root-book</em>), <strong>system korzonkowy</strong> (<em>radicle-system</em>) i <strong>książka-kłącze</strong> (<em>rhizome-book</em>). Książka-korzeń to klasyczna postać myśli zachodniej — znaczące i podmiotowe organiczne wnętrze, które naśladuje świat na zasadzie odbicia (mimesis). System korzonkowy stanowi wariant nowoczesny: główny korzeń został przerwany, jednakże jedność szczytowa przetrwała jako utajona całość. Fragmentacja, jaką spotykamy u Joyce'a czy Nietzschego, jedynie przywołuje wyższą jedność. Dopiero książka-kłącze realizuje prawdziwe odejście od jedności — odejmuje jedność od wielości wedle formuły n–1.</p>
<h4 class="r-h3">9.2. Sześć zasad kłącza</h4>
<p>Deleuze i Guattari wyodrębniają sześć powiązanych ze sobą zasad definiujących kłącze:</p>
<p><strong>Zasady 1 i 2: Połączenie i heterogeniczność.</strong> Każdy punkt kłącza może i musi być połączony z każdym innym. W odróżnieniu od drzewa, które ustala porządek i wyznacza punkty, kłącze łączy łańcuchy semiotyczne każdej natury — biologiczne, polityczne, ekonomiczne — z bardzo różnorodnymi sposobami kodowania i stanami rzeczy. Nie istnieje tu żaden punkt uprzywilejowany: semioza językowa łączy się bezpośrednio z materialnym stanem ciała, ekonomiczny przepływ z politycznym dyskursem.</p>

<h4 class="r-h3">9.3. Pojęcie „plateau"</h4>
<p>Termin „plateau" zostaje zapożyczony od Gregory'ego Batesona, który w badaniach nad kulturą Balijczyków opisał „ciągły, samowibrujący region intensywności", unikający orientacji ku klimaksowi lub zewnętrznemu celowi. W odróżnieniu od rozdziału, który ma kulminację i punkt zakończenia, plateau jest regionem intensywności, którego energia nie rozładowuje się w finale, lecz trwa jako ciągła wibracja. Każde plateau w książce jest „wielością połączoną z innymi wielościami przez powierzchowne podziemne łodygi" i — co istotne — może być czytane w dowolnej kolejności. Sam układ książki realizuje zasady kłącza: brak linearnej progresji, brak teleologii, wielość punktów wejścia.</p>
<h4 class="r-h3">9.4. Mapa vs. kalka — implikacje metodologiczne</h4>
<p>Opozycja mapa/kalka ma daleko idące implikacje metodologiczne. Kalka kopiuje coś, co już istnieje — reprezentuje domniemaną „kompetencję" i tłumaczy mapę na obraz. Psychoanaliza jest dla autorów paradygmatycznym przykładem myślenia-kalki: odtwarza gotowy model (trójkąt edypalny) i nakłada go na każdy przypadek, zamiast konstruować mapę konkretnych wielości i linii ujścia. Lingwistyka generatywna Chomsky'ego to kolejna kalka — drzewa gramatyczne jako „znaczniki władzy" reprodukujące model arborescencyjny. Mapa natomiast ma wiele wejść — jest „performansem", nie kompetencją. Konstruuje się ją w kontakcie z rzeczywistością, a nie z góry ustalonego modelu. Reguła metodologiczna „podłączyć kalki z powrotem do mapy" stanowi instrukcję przekształcania zamkniętych systemów reprezentacji w otwarte procesy eksperymentowania.</p>
<h4 class="r-h3">9.5. Książka jako asemblaż</h4>
<p>Autorzy odrzucają ideę książki jako „obrazu świata". Książka jest <strong>asemblażem</strong> — „małą maszyną", która nie ma ani przedmiotu, ani podmiotu. Jest zbudowana z różnorodnie ukształtowanych materii i różnych prędkości; istnieje jedynie poprzez „zewnętrze" i na nim, będąc podłączoną do innych maszyn (wojennych, rewolucyjnych, literackich). Pojęcie asemblażu, wprowadzone tutaj w postaci embrionalnej, zostaje w pełni rozwinięte w plateau 3 („Geologia moralności"), gdzie nabiera precyzyjnej definicji obejmującej oś horyzontalną (maszynowy asemblaż ciał / kolektywny asemblaż enuncjacji) i oś wertykalną (terytorium / deterytorializacja). Książka nie naśladuje świata — jest maszyną funkcjonującą w świecie, „podłączoną" do innych maszyn, produkującą realne efekty.</p>
<p>Wśród przykładów ilustrujących logikę kłącza najbardziej wymowny jest obraz <strong>osy i orchidei</strong>: tworzą one kłącze przez „ewolucję aparalelną". Orchidea deterytorializuje się, tworząc obraz osy, a osa reterytorializuje się na tym obrazie — jest to „przechwycenie kodu", nie prosta imitacja. Obraz ten powróci w plateau 10 jako model bloku stawania-się. Inne przykłady obejmują nory zwierząt (kłącza zwierzęce funkcjonujące jako schronienie, zaopatrzenie, ruch i ucieczka), szczury i mrówki (których nie można zniszczyć, ponieważ odbudowują się przez wielorakie połączenia) oraz trawę i chwasty — autorzy cytują Henry'ego Millera, twierdząc, że „mózg jest o wiele bardziej trawą niż drzewem." Heinrich von Kleist jest chwalony za tworzenie „przerwanego łańcucha afektów" i „książki-maszyny wojennej" istniejącej jedynie na zewnętrze — jego pisarstwo realizuje logikę kłącza avant la lettre.</p>
<p>Plateau 1 ustanawia zatem nie tylko metodologię lektury <em>Tysiąca plateau</em>, lecz także ontologiczną ramę, w której rzeczywistość nie jest hierarchicznym drzewem bytów, lecz kłączem — heterogeniczną siecią połączeń, wielości i linii ujścia. Każde kolejne plateau rozwija i konkretyzuje tę ramę w odniesieniu do specyficznych problemów: psychoanalizy, geologii, lingwistyki, polityki, estetyki.</p>`

      {
        id: 11,
        title: "Wielość i krytyka psychoanalizy (Plateau 2)",
        html: `<h4 class="r-h3">10.1. Od sfory do ojca: procedura redukcji</h4>
<p>Drugie plateau — „1914: Jeden czy kilka wilków?" — stanowi frontalny atak na procedurę psychoanalityczną. Centralnym przedmiotem krytyki jest analiza przypadku „Człowieka-Wilka" przeprowadzona przez Freuda. Kiedy pacjent opowiada sen o sześciu lub siedmiu wilkach siedzących na drzewie, natychmiastowa reakcja Freuda polega na redukcji tej liczby do jedności. Poprzez serię odejmowań — siedem wilków staje się sześcioma zjedzonymi koźlątkami z bajki; siódme to dziecko ukryte w zegarze; pięć wilków odnosi się do godziny piątej (domniemanego czasu sceny pierwotnej) — Freud dochodzi do konkluzji: „Jeden wilk: wilk jest ojcem."</p>
<p>Deleuze i Guattari twierdzą, że „każde dziecko wie", iż wilki chodzą w sforach, a jednak Freud traktuje zwierzę jedynie jako <strong>reprezentanta</strong> członka rodziny. Dla Freuda zwierzę może reprezentować jedynie stosunek między rodzicami, nigdy „wezwanie do stawania-się-wilkiem." Psychoanaliza działa tu jako „despotyczna agencja", która zastępuje „aznaczące imiona własne" „posępną jednością obiektu ogłoszonego za utracony."</p>
<h4 class="r-h3">10.2. Sfora i masa — rozróżnienie Canettiego</h4>
<p>Opierając się na Eliasie Canettim, autorzy rozróżniają dwa typy wielości, które współistnieją i przenikają się wzajemnie. <strong>Masa</strong> (wielość molarna) charakteryzuje się dużą ilością, podzielnością, równością członków, hierarchią i terytorializacją — jest to „pozycja paranoiczna" podmiotu bezpiecznie osadzonego w grupie. <strong>Sfora</strong> (wielość molekularna) definiowana jest przez ograniczoną liczbę, rozproszenie, nierozkładalne zmienne odległości i niemożność ustalenia hierarchii. Sfora konstytuuje się przez linie ujścia lub deterytorializacji — człowiek jest w niej zawsze na krawędzi, w „pozycji schizo."</p>
<p>Rozróżnienie to ma zasadnicze znaczenie dla całego projektu schizoanalitycznego: nieświadomość nie jest teatrem edypalnym (molarnym), lecz fabryką — maszynowym polem sfor, intensywności i stawań-się (molekularnym). Wielości molarne są ekstensywne, podzielne, organizowalne; wielości molekularne — libidinalne, nieświadome i intensywne, złożone z cząstek, które nie dzielą się bez zmiany natury.</p>
<h4 class="r-h3">10.3. Ciało bez Organów i Człowiek-Wilk</h4>
<p>Ciało bez Organów (CbO) pojawia się tu jako „pełne ciało", powierzchnia zapisu, na której rozkładają się wielości. „Zero" to CbO Człowieka-Wilka — nie oznacza braku, lecz pozytywną „matryce intensywności." CbO nie jest pustym ciałem, lecz takim, na którym organy (oczy wilka, szczękał, odbyty) są rozmieszczone jak „tłum" w ruchu Browna. Wilki reprezentują „próg intensywności" na CbO.</p>
<h4 class="r-h3">10.4. Stawanie-się-wilkiem</h4>
<p>Stawanie-się-zwierzęciem jest realnym procesem, a nie fantazją czy imitacją. Nie jest naśladowaniem — to emisja cząstek, które wchodzą w „strefę bliskości" z cząstkami zwierzęcymi. Każda sfora ma swego <strong>Anomalnego</strong> lub „Outsidera" — figurę graniczną, z którą podmiot zawiera „potworny sojusz", aby wyzwolić stawanie-się. Moby Dick kapitana Ahaba jest takim Anomalnym — „Unikalnym", granicą sfory. Pojęcia te zostają w pełni rozwinięte w plateau 10.</p>
<p>Warto podkreślić, że Deleuze i Guattari reinterpretują sen o wilkach w sposób radykalnie odmienny od Freuda: wilki nie są symbolami, lecz <strong>intensywnościami, prędkościami i temperaturami</strong>. Nazwa „Człowiek-Wilk" jest prawdziwym imieniem własnym, ponieważ jest „natychmiastowym uchwyceniem wielości." „Pole odbytów" łączy „maszynę wilczą" z „maszyną analną" — dziecko trzyma się wilków przez swój odbyt, co nie jest regresją edypalną, lecz kompozycją prędkości i afektów na CbO. Kluczowym odwołaniem jest Jung, chwalony za dostrzeganie wielości tam, gdzie Freud widział jedność, oraz Riemann i Bergson, cytowani za matematyczne i filozoficzne ugruntowanie teorii wielości. Virginia Woolf doświadczająca siebie jako „oddziału małp" lub „ławicy ryb" stanowi literacki przykład wielości molekularnej, którego psychoanaliza nie jest w stanie uchwycić swoimi narzędziami.</p>
<p>Plateau to formułuje zatem zasadniczą alternatywę wobec psychoanalizy: zamiast redukcji wielości do jedności (Ojciec, Fallus, Kastracja), schizoanaliza proponuje teorię wielości jako substancji nieświadomości — maszynowego pola sfor, intensywności i stawań-się. Krytyka obejmuje również Melanie Klein, której przypadek „Małego Ryszarda" (dziecięce mapy geopolityczne) został zredukowany do „tatusia i mamusi" — a przecież dziecko rysowało mapy imperium, bitew morskich i lotniczych, nie zaś sceny rodzinne. Psychoanaliza nie potrafi zobaczyć tego, co dla dziecka jest oczywiste: wielości są realne, sfory są realne, intensywności są realne. Ich redukcja do molarnych jedności jest aktem przemocy semiotycznej — nadkodowaniem przepływów, które powinny swobodnie cyrkulować na CbO.</p>
<p>Matematyczne ugruntowanie teorii wielości pochodzi od Riemanna (wielości ciągłe definiowane przez wymiary, nie przez punkty) i Bergsona (wielości jakościowe versus ilościowe). Deleuze i Guattari przekształcają te inspiracje w narzędzie krytyki psychoanalizy i — szerzej — wszelkiego myślenia, które redukuje n do 1, zamiast realizować operację n–1.</p>`

      {
        id: 12,
        title: "Geologia moralności — stratyfikacja (Plateau 3)",
        html: `<h4 class="r-h3">11.1. Strata i podwójna artykulacja</h4>
<p>Plateau „10 000 p.n.e. — Geologia moralności (Kim Ziemia myśli, że jest?)" konstruuje ontologię stratyfikacji, kluczową dla zrozumienia relacji między porządkiem a chaosem. <strong>Strata</strong> są opisane jako „warstwy" lub „pasy" istniejące jako zgrubienia na Ciele Ziemi (Ciele bez Organów). Polegają na nadawaniu formy niestabilnym materiom i „uwięzieniu" wolnych intensywności w systemach rezonansu i redundancji. Stratyfikacja jest porównywana do „sądu Bożego" — nieuniknionej operacji, która organizuje „nomadyczne osobliwości" w molarne agregaty.</p>
<p>Za językoznawcą Louisem Hjelmslevem autorzy twierdzą, że każde stratum jest „podwójnie artykułowane" — posiada „podwójne szczypce" lub „podwójne wiązanie". <strong>Pierwsza artykulacja</strong> (treść) „wybiera lub dedukuje" metastabilne jednostki molekularne z niestabilnych przepływów i narzuca im statystyczny porządek połączeń. W terminach Hjelmsleva obejmuje to formę treści (porządek) i substancję treści (wybraną materię). <strong>Druga artykulacja</strong> (ekspresja) ustanawia funkcjonalne, kompaktowe, stabilne struktury i konstruuje molarne związki, w których te struktury się aktualizują. Kluczowy przykład geologiczny: <strong>sedymentacja</strong> to pierwsza artykulacja (osadzanie jednostek), a <strong>fałdowanie</strong> to druga (ustanawianie stabilnej struktury). Między treścią a ekspresją nie ma odpowiedniości typu „znaczone–znaczące" — jedynie izomorfizm i wzajemne zakładanie się.</p>
<h4 class="r-h3">11.2. Trzy główne strata</h4>
<p>Autorzy wyodrębniają trzy główne strata, z których każde cechuje się specyficzną konfiguracją relacji między treścią a ekspresją:</p>
<p><strong>Strata fizykochemiczne</strong> są rządzone rezonansem i „wzmacniającą strukturacją", gdzie molarne wyrażają interakcje molekularne. Kryształ jest paradygmatycznym przykładem: jest makroskopową (molarną) ekspresją mikroskopowych (molekularnych) interakcji. Na tym stratum treść jest molekularna, a ekspresja molarna — relacja ta jest stosunkowo prosta, choć nie pozbawiona złożoności.</p>
<p><strong>Strata organiczne</strong> wyróżniają się liniowością, która stanowi ich fundamentalną innowację. W odróżnieniu od kryształów, ograniczonych trójwymiarowością, stratum organiczne wyodrębnia autonomiczną „linię ekspresji" — sekwencje kwasów nukleinowych (DNA, RNA). Liniowość ta pozwala organizmowi osiągnąć znacznie wyższy próg deterytorializacji i reprodukcji niż kryształ. Kod genetyczny stanowi autonomiczną linię ekspresji, niezależną od substancji, w których się aktualizuje — jest to „deterytorializacja właściwa życiu." Pojawia się tu <strong>epigeneza</strong> jako proces, w którym organizm rozwija się nie według preformowanego planu, lecz przez kolejne indukcje i różnicowanie — co stanowi model dla pojęcia płaszczyzny konsystencji.</p>
<p><strong>Strata alloplastyczne</strong> (antropomorficzne) wprowadzają nowy rozkład treści i ekspresji. Treść jest powiązana z biegunem <strong>ręka–narzędzie</strong> (formalne cechy manualne), a ekspresja z biegunem <strong>twarz–język</strong> (cechy wokalne/symboliczne). To stratum wprowadza <strong>tłumaczenie</strong> i <strong>tłumaczalność</strong> — fundamentalną innowację pozwalającą językowi reprezentować wszystkie inne strata. Pojawia się „nadliniowość" ekspresji językowej, która wchłania liniowość genetyczną i przekształca ją w symboliczną. Technologia (narzędzie) i język (symbol) tworzą „podwójną artykulację" specyficzną dla ludzkiego stratum — jednakże autorzy ostrzegają przed antropocentryzmem: strata alloplastyczne nie są „wyższe" od organicznych czy fizykochemicznych, lecz jedynie inaczej skonfigurowane.</p>
<h4 class="r-h3">11.3. Maszyna abstrakcyjna i asemblaż</h4>
<p>Maszyna abstrakcyjna istnieje w dwóch współistniejących stanach: jako <strong>owinięta</strong> (Ecumenon) — więźień stratyfikacji, definiujący „jedność kompozycji" dla konkretnego stratum (np. „abstrakcyjne Zwierzę"); oraz jako <strong>rozwinięta</strong> (Planomenon) — przecinająca wszystkie stratyfikacje, rozwijająca się na płaszczyźnie konsystencji, aby pilotować przepływy absolutnej deterytorializacji. Jest czystą „Materią-Funkcją", która nie zna rozróżnienia między treścią a ekspresją.</p>
<p><strong>Asemblaż</strong> (<em>agencement</em>) jest „dwugłowym" konkretnym bytem, różnym od maszyny abstrakcyjnej, choć ją urzeczywistniającym. Posiada stronę skierowaną ku stratom (maszynowy asemblaż ciał, czyli treść) i stronę skierowaną ku płaszczyźnie konsystencji (kolektywny asemblaż enuncjacji, czyli ekspresja). Zapewnia „koadaptację" treści i ekspresji na stratum oraz reguluje relacje między stratami a płaszczyzną konsystencji.</p>
<h4 class="r-h3">11.4. Destratyfikacja i jej niebezpieczeństwa</h4>
<p>Destratyfikacja to ruch ku płaszczyźnie konsystencji, z dala od „Sądu Bożego." Jednakże jest pełna niebezpieczeństw: gwałtowna destratyfikacja — rozsadzenie strat zbyt szybko — prowadzi do katastrofy, „samobójczego załamania" lub wpadnięcia w „czarną dziurę." Stratum może również utracić swoją konfigurację i w dziki sposób proliferować (jak nowotwór), tworząc „totalitarne i faszystowskie CbO", które są „przerażającymi karykaturami płaszczyzny konsystencji." Stąd fundamentalna reguła ostrożności: należy „naśladować strata" i zachować małe racje podmiotowości i organizacji, aby przetrwać, jednocześnie cierpliwie demontując organizm. Motyw ostrożności — jeden z przewodnich w całej książce — powraca explicite w plateau 6 i w konkluzji.</p>
<h4 class="r-h3">11.5. CbO jako Ciało Ziemi</h4>
<p>CbO jest tu utożsamione z „Ciałem Ziemi" — płaszczyzną konsystencji, na której strata tworzą się jako „zgrubienia" lub „resztki." CbO nie jest pustym ciałem, lecz zaludnionym przez wielości, przepływy i intensywności. Jest to „nieuformowana, niezorganizowana, niestratyfikowana" materia istniejąca pod wszystkimi strukturami — ontologiczne podłoże, na którym rozgrywa się dialektyka stratyfikacji i destratyfikacji.</p>
<p>Wśród przykładów ilustrujących tę ontologię stratyfikacji najbardziej niezwykły jest profesor Challenger — postać zapożyczona od Arthura Conana Doyle'a, opisywana jako „małpia" i „podwójnie artykułowana." Jego głos staje się coraz bardziej zwierzęcy w miarę trwania wykładu, aż w końcu deterytorializuje się na miejscu, znikając w płaszczyźnie konsystencji. Obraz ten ilustruje dynamikę destratyfikacji: nawet wykładowca wygłaszający traktat o stratach jest podatny na siły, które go rozkładają. Metafora „Bóg jest homarem" (podwójne szczypce artykulacji) oraz przykład kleszcza (definiowanego przez jedynie trzy afekty — światło, zapach, ciepło) wzbogacają konceptualny arsenał tego plateau. Opozycja Geoffroy Saint-Hilaire (chwalony za ideę jednego „abstrakcyjnego Zwierzęcia" realizowanego przez różne fałdowania) i Cuvier (prezentowany jako „sztywny specjalista" twierdzący, że istnieją nieredukowalne typy) modeluje napięcie między topologicznym myśleniem płaszczyzny konsystencji a metrycznym myśleniem stratyfikacji — napięcie powracające we wszystkich kolejnych plateau.</p>`

      {
        id: 13,
        title: "Postulaty lingwistyki (Plateau 4)",
        html: `<h4 class="r-h3">12.1. Cztery postulaty i ich krytyka</h4>
<p>Plateau „20 listopada 1923 — Postulaty lingwistyki" stanowi systematyczną dekonstrukcję podstawowych założeń lingwistyki strukturalnej. Autorzy wyodrębniają cztery postulaty, z których każdy zostaje poddany krytyce:</p>
<p><strong>Postulat 1:</strong> „Język jest informacyjny i komunikacyjny." Krytyka: język nie dotyczy komunikowania informacji, lecz <strong>posłuszeństwa</strong>. Nauczycielka nie informuje uczniów o regule — ona „naznacza" regułę, wydając rozkaz. Informacja jest jedynie minimum wymaganym do transmisji słów-haseł.</p>
<p><strong>Postulat 2:</strong> „Istnieje maszyna abstrakcyjna języka, która nie odwołuje się do żadnego czynnika zewnętrznego." Krytyka: nie istnieje „język w sobie." Lingwistyka jest niczym bez pragmatyki (semiotycznej lub politycznej), która definiuje użycie elementów językowych. Modele lingwistyczne często nie są dostatecznie abstrakcyjne, ponieważ nie osiągają maszyny abstrakcyjnej łączącej język z mikropolityką pola społecznego.</p>
<p><strong>Postulat 3:</strong> „Istnieją stałe lub uniwersalia języka, które umożliwiają zdefiniowanie go jako systemu homogenicznego." Krytyka: każdy język jest „zasadniczo heterogeniczną rzeczywistością." Za Williamem Labovem autorzy twierdzą, że wariacja jest systematyczna i wewnętrzna wobec systemu językowego, a nie zewnętrznym błędem performatywnym.</p>
<p><strong>Postulat 4:</strong> „Język może być naukowo badany jedynie pod warunkami języka standardowego lub większościowego." Krytyka: jedność języka jest fundamentalnie polityczna, nie naukowa. Wyodrębnianie stałych jest połączone z politycznym przedsięwzięciem narzucania ich mówiącym. Nie istnieje „język ojczysty" — jedynie przejęcie władzy przez dominujący język w ramach politycznej wielości.</p>
<h4 class="r-h3">12.2. Słowo-hasło jako elementarna jednostka</h4>
<p>Autorzy zastępują „znak" lub „fonem" <strong>słowem-hasłem</strong> (<em>mot d'ordre</em>) jako elementarną jednostką języka. Słowo-hasło to relacja każdego słowa lub wypowiedzi do ukrytych założeń — aktów mowy dokonywanych <em>w</em> wypowiedzi. Język jest stworzony nie po to, by wierzyć, lecz by być posłusznym. Każde słowo-hasło niesie ze sobą „mały wyrok śmierci" lub sąd. Jest ono redundancją aktu i wypowiedzi — to dzięki redundancji twarz ojca, nauczyciela lub szefa odsyła do centrum znaczenia.</p>
<h4 class="r-h3">12.3. Transformacje bezcielesne</h4>
<p>Słowa-hasła wyrażają <strong>transformacje bezcielesne</strong> (<em>incorporeal transformations</em>) przypisywane ciałom. Są to czyste akty, rozpoznawalne po ich natychmiastowości: wyrok sędziego przekształca oskarżonego w skazańca; porywacz samolotu przekształca pasażerów w zakładników. Ekspresje nie reprezentują ciał — <strong>interweniują</strong> w nie, aby je przyspieszyć, spowolnić lub przegrupować. Transformacje bezcielesne stanowią „osnowę" językową w „wątku" ciał materialnych — metafora tkacka, która łączy to plateau z analizą przestrzeni prążkowanej w plateau 14.</p>
<h4 class="r-h3">12.4. Mowa zależna jako forma pierwotna</h4>
<p>Wbrew przekonaniu, że język zaczyna się od komunikacji bezpośredniej, Deleuze i Guattari twierdzą, że <strong>mowa zależna</strong> (<em>indirect discourse</em>) jest pierwotną formą języka. Język zawsze „idzie od mówienia do mówienia" — narracja polega na przekazywaniu tego, co się usłyszało, a nie co się widziało. Nie istnieje indywidualna enuncjacja: enuncjacja jest zawsze produktem <strong>kolektywnego asemblażu</strong>. Nawet „Ja" jest słowem-hasłem wynikającym z mowy zależnej. Pojęcie kolektywnego asemblażu enuncjacji, rozwinięte już w plateau 3, nabiera tu pełnej mocy politycznej.</p>
<h4 class="r-h3">12.5. Ciągła wariacja i stawanie-się-mniejszościowym</h4>
<p>Styl jest procedurą <strong>ciągłej wariacji</strong>. Autor mniejszościowy (Kafka, Beckett, Luca, Godard) sprawia, że własny język „jąka się" — nie przez wadę wymowy, lecz przez umieszczenie wszystkich elementów w wariacji. Atypowe wyrażenia funkcjonują jako <strong>tensory</strong>, wyrywające poprawne formy z ich stanu stałych i pchające język ku granicy. Spójnik „i" (<em>and</em>) może odgrywać rolę tensora, obalając ontologię czasownika „być" — zastępując logikę tożsamości logiką koniunkcji i powiązania.</p>
<p>Rozróżnienie między językiem <strong>większościowym</strong> (definiowanym przez władzę stałych i ustanowienie standardu, np. standardowy angielski brytyjski lub amerykański) a <strong>mniejszościowym</strong> (definiowanym przez władzę wariacji) ma charakter fundamentalnie polityczny. Wszelkie stawanie się jest mniejszościowe — trzeba „podbić własny język", by znaleźć w nim języki mniejszościowe.</p>
<p>Plateau to wprowadza również pojęcie <strong>tetrawalencji asemblażu</strong>: oś pozioma obejmuje maszynowy asemblaż ciał i kolektywny asemblaż enuncjacji; oś pionowa wyznacza oscylację między terytorium a deterytorializacją. Asemblaż jest zatem czterowymiarową strukturą, której nie można zredukować ani do czysto językowej, ani do czysto materialnej analizy. Ta tetrawalencja łączy analizę językową z plateau 4 z ontologią stratyfikacji z plateau 3 i z analizą mikropolityczną z plateau 8 i 9.</p>
<p>Sam tytuł — „20 listopada 1923" — odnosi się do końca kryzysu hiperinflacji w Niemczech (wprowadzenie Rentenmarku), stanowiąc przykład semiotycznej transformacji ciała monetarnego — transformacji bezcielesnej par excellence, w której słowo-hasło (dekret monetarny) przekształca cały system ekonomicznych relacji.</p>
<p>Wśród odwołań do innych myślicieli kluczowi są: Austin (performatywy i akty illokucyjne), Ducrot (odwrócenie schematu Benveniste'a), Labov (wariacja jako wewnętrzny komponent języka), Bachtin/Wołoszynow (jedno słowo jako kompletna enuncjacja) i Chomsky (krytykowany za utożsamianie abstrakcyjnego z uniwersalnym/stałym). Połączenie między językiem większościowym/mniejszościowym a aparatem chwytania i maszyną wojenną stanie się explicite w plateau 12 i 13.</p>`

        id: 14,
        title: "Reżimy znaków (Plateau 5)",
        html: `<h4 class="r-h3">13.1. Cztery reżimy semiotyczne</h4>
<p>Plateau „587 p.n.e. — 70 n.e.: O kilku reżimach znaków" konstruuje typologię czterech głównych reżimów semiotycznych, z których każdy posiada własną logikę, własny sposób traktowania linii ujścia i własną formę deterytorializacji.</p>
<p><strong>Reżim znaczący</strong> (despotyczny) charakteryzuje się nadkodowaniem wszystkich przepływów przez centralną instancję władzy. Każdy znak odsyła do innego znaku ad infinitum; znaczenie (<em>signifiance</em>) zastępuje konkretną relację ze stanem rzeczy. Cały zestaw znaków odsyła do najwyższego Znaczącego, które jest czystą abstrakcją — cechującą się zarazem brakiem i nadmiarem. „Interpretoza" — choroba tego reżimu — polega na nieustannym przypisywaniu znaków do „ukrytych" znaczeń, co służy jedynie reprodukcji Znaczącego. Reżim ten nie toleruje linii ujścia; definiuje je negatywnie i przypisuje <strong>kozłowi ofiarnemu</strong>, który zostaje wykluczony ze wspólnoty, niosąc ze sobą „zło" zagrażające systemowi. Twarz jest ikoną tego reżimu — Znaczące potrzebuje powierzchni zapisu (białej ściany), na której osadzają się znaki.</p>
<p><strong>Reżim post-znaczący</strong> (podmiotowy/pasjonalny), zilustrowany historią narodu żydowskiego, opiera się na podmiotowieniu (<em>subjectification</em>) zamiast prostego nadkodowania. Zamiast centralnego Znaczącego pojawia się <strong>punkt podmiotowienia</strong>, z którego wychodzi podmiot wypowiedzenia, wyznaczający linie pasji. Bóg odwraca twarz (staje się nieobecny), a podmiot, ogarnięty bojaźnią, również odwraca swoją twarz — to <strong>podwójne odwrócenie</strong> rysuje pozytywną linię deterytorializacji. Prorok odróżnia się tu od kapłana: kapłan interpretuje, prorok jest „zgwałcony" przez Boga — jego obłęd jest aktywny, nie ideacyjny. Choć linia ujścia otrzymuje tu znak dodatni, pozostaje podmiotowa i segmentarna, co czyni ją ostatecznie „negatywną" w porównaniu z absolutną deterytorializacją płaszczyzny konsystencji.</p>
<p><strong>Reżim przeciw-znaczący</strong> (nomadyczny) jest związany z nomadami i ich maszyną wojenną. Zamiast nadkodowania przez znaczące operuje on <strong>liczbą</strong> jako formą ekspresji — liczbą „liczącą" (<em>nombre nombrant</em>), a nie „liczoną." Deterytorializacja w tym reżimie podąża wzdłuż linii aktywnej destrukcji lub zniesienia struktur państwowych.</p>
<p><strong>Reżim przed-znaczący</strong> (poliwokalny) występuje w społeczeństwach pierwotnych. Charakteryzuje go wielość substancji ekspresji (taniec, gest, rytm), które współistnieją heterogenicznie z głosem. Jest on segmentarny i zapobiega krystalizacji Znaczącego lub Państwa poprzez mechanizmy „uprzedzania-zapobiegania" i semiofagii (pożeranie imienia/zmarłego).</p>
<h4 class="r-h3">13.2. Diagram i maszyna abstrakcyjna</h4>
<p>Maszyna abstrakcyjna to moment, w którym pozostają jedynie nieukształtowane materie (<em>phylum</em>) i niefunkcjonalne funkcje (<em>diagram</em>). Diagram pełni rolę pilotażową: nie reprezentuje rzeczywistości, lecz konstruuje rzeczywistość, która ma nadejść. Rozmywa granice między cząstką a znakiem. Opozycja między semiologią (Saussure), ograniczoną do reżimu znaczącego, a semiotyką (Peirce/Hjelmslev), szerszą i pragmatyczną, stanowi metodologiczną ramę tego plateau.</p>
<h4 class="r-h3">13.3. Semiotyki mieszane i pragmatyka</h4>
<p>W praktyce reżimy zawsze się mieszają. Kapitalizm jest semiotyką mieszaną, łączącą imperialne Znaczące z żydowską i chrześcijańską podmiotowością. Analiza tych mieszanek — a nie poszukiwanie uniwersalnego Znaczącego — stanowi właściwe zadanie schizoanalitycznej pragmatyki. Każdy reżim inaczej traktuje linie ujścia: reżim znaczący przeklina je (kozioł ofiarny), reżim podmiotowy czyni z nich pasjonalne „postępowanie" (<em>proceedings</em>), reżim przeciw-znaczący wykorzystuje je do niszczenia imperiów.</p>
<p>Daty w tytule plateau — 587 p.n.e. i 70 n.e. — odnoszą się do zniszczeń Świątyni Jerozolimskiej, wyznaczając historyczny moment przejścia do reżimu podmiotowego: brak twarzy Boga, Arka jako przenośny zestaw znaków, naród jako podmiot wygnańczy. Mojżesz jako podmiot wypowiedzenia antycypuje wolę Boga poprzez ucieczkę i „zdradę" Egiptu. Chrystus uniwersalizuje system zdrady — Judasz staje się „prawdziwym człowiekiem", a twarzyfikacja obejmuje całe ciało.</p>
<p>Plateau to wprowadza również rozróżnienie między semiologią Saussure'a (ograniczoną do reżimu znaczącego, redukującą znaki do relacji oznaczany–oznaczający) a semiotyką Peirce'a i Hjelmsleva (szerszą i pragmatyczną, zdolną analizować reżimy bez uciekania się do „znaczącego"). Diagram Peirce'a jako ikona relacji i siatka Hjelmsleva (materia, treść/ekspresja, forma/substancja) dostarczają narzędzi analitycznych, które zastępują lingwistykę strukturalną pragmatyką — dyscypliną zdolną uchwycić wielość reżimów semiotycznych w ich historycznej i politycznej konkretności.</p>
<p>Deterytorializacja i reterytorializacja znaków przebiega różnie w każdym reżimie: w reżimie znaczącym deterytorializacja jest relatywna (odsyłanie od znaku do znaku), w reżimie podmiotowym staje się absolutna, lecz negatywna (czarna dziura świadomości). Reterytorializacja następuje na twarzy (ikona) lub w „księdze." Twarz i twarzowienie (<em>faciality</em>) — system biała ściana / czarna dziura — stanowią łącznik między tym plateau a plateau 7, gdzie maszyna abstrakcyjna twarzowości zostaje poddana pełnej analizie.</p>`

      {
        id: 15,
        title: "Jak wytworzyć sobie Ciało bez Organów? (Plateau 6)",
        html: `<h4 class="r-h3">14.1. CbO — definicja i trzy typy</h4>
<p>Plateau „28 listopada 1947 — Jak wytworzyć sobie Ciało bez Organów?" stanowi rozwinięcie centralnego pojęcia schizoanalizy, zapoczątkowanego przez Antonina Artauda, który w tym właśnie dniu „wypowiedział wojnę organom." CbO nie jest martwym ciałem — jest ciałem tym bardziej żywym, im bardziej rozłożono organizację organów zwaną <strong>organizmem</strong>. Kluczowe rozróżnienie: CbO nie jest przeciwieństwem organów, lecz przeciwstawia się jedynie organizmowi, czyli specyficznej organizacji tych organów.</p>
<p>Autorzy wyróżniają trzy typy CbO: <strong>pełne CbO</strong> — udane CbO na płaszczyźnie konsystencji, zaludnione intensywnościami, które swobodnie krążą; <strong>puste CbO</strong> — wynik zbyt gwałtownej destratyfikacji (np. „szklany" narkoman, katatoniczny schizofrenik), ciało nicości z zablokowanymi intensywnościami; oraz <strong>rakowe CbO</strong> — należące do proliferującej warstwy (jak faszyzm lub pieniądz), gdzie elementy warstwy zaczynają rozrastać się w sposób niekontrolowany.</p>
<h4 class="r-h3">14.2. Jajko jako model intensywności</h4>
<p>CbO jest modelowane na wzór jajka (jajko Dogon, jajko biologiczne), reprezentującego środowisko czystej intensywności. „Stopień zero" nie oznacza braku, lecz pozytywny stan nieuformowanej materii. Organy funkcjonują na CbO jedynie jako czyste intensywności, progi i gradienty, a nie ustalone formy. Tylko intensywności, fale i wibracje przepływają i krążą na CbO.</p>
<h4 class="r-h3">14.3. Sąd Boży i organizm</h4>
<p>„Sąd Boży" jest teologicznym systemem, który narzuca zhierarchizowaną organizację ciału, aby wydobyć z niego użyteczną pracę. Artaud walczył właśnie z tym systemem. Trzy główne „warstwy" Sądu Bożego to: organizm (organizacja organów), znaczącość (narzucenie znaczenia) i podmiotowienie (konstytucja podmiotu). CbO oscyluje między tymi powierzchniami stratyfikacji a płaszczyzną konsystencji.</p>
<h4 class="r-h3">14.4. Sztuka ostrożności</h4>
<p>Deleuze i Guattari ostrzegają: nie należy używać młota, lecz „bardzo drobnego pilnika", aby cierpliwie rozkładać organizm. Zasada brzmi: <strong>mimikrować warstwy</strong> — zachować dość organizmu, podmiotowości i znaczenia, by przeżyć, jednocześnie otwierając „małe działki nowej ziemi" dla eksperymentowania. Ostrożność jest sztuką dozowania, potrzebną, by uniknąć pustych lub rakowych ciał. Ta reguła ostrożności stanowi jedno z najważniejszych ostrzeżeń etyczno-politycznych całego <em>Tysiąca plateau</em>.</p>
<h4 class="r-h3">14.5. Praktyki budowy CbO</h4>
<p>Autorzy analizują konkretne praktyki, z których każda stanowi specyficzny sposób konstruowania CbO:</p>
<p><strong>Masochizm</strong> — masochista używa cierpienia i ograniczeń (szycie, wiązanie) do anulowania organów i powstrzymania ich od działania wedle organizmu. Tworzy program odwiązania pragnienia od zewnętrznej miary przyjemności, konstruując CbO, które mogą zaludnić fale bólu. Kluczowe jest tu odróżnienie od interpretacji psychoanalitycznej: masochizm nie jest pragnieniem cierpienia (które byłoby wciąż podporządkowane kategorii przyjemności), lecz pragnieniem samej intensywności, uwolnionym od logiki organizmicznej.</p>
<p><strong>Miłość dworska</strong> (<em>courtly love</em>) — wyrzeczenie się lub nieskończone odraczanie zewnętrznej przyjemności w celu zbudowania pola immanencji, w którym pragnienie wypełnia samo siebie. „Radość" to przepływ pragnienia, a nie kulminacja, która je przerywa. Model ten jest szczególnie istotny, ponieważ pokazuje, że CbO nie jest wyłącznie destruktywne — może być konstruowane jako przestrzeń intensywnej radości.</p>
<p><strong>Narkotyki</strong> — postrzegane jako agenci molekularnego stawania-się, gdzie percepcja staje się molekularna, a „niedostrzegalne jest postrzegane". Ciało narkotyzowane często szuka CbO „Absolutnego Zera" lub „Zimna." Jednakże autorzy ostrzegają, że narkotyki zbyt często prowadzą do pustego CbO — do katatonii, szklanych ciał, samobójczego załamania. Narkotyki zmieniają warunki percepcji, lecz rzadko konstruują trwałą płaszczyznę konsystencji.</p>
<p><strong>Tao</strong> — praktyki tantryczne stanowią obwód intensywności między energią męską a żeńską, unikający ejakulacji, aby utrzymać pole immanencji zamiast rozładowania. Model taoistyczny ilustruje ideę intensywnego obiegu, w którym pragnienie nie dąży do zaspokojenia (które byłoby formą reterytorializacji), lecz do ciągłej cyrkulacji na CbO.</p>
<p><strong>Spinoza</strong> jest cytowany jako autor „wielkiej księgi CbO" — jego <em>Etyka</em> definiuje ciała przez długość (relacje prędkości) i szerokość (intensywne afekty) na płaszczyźnie immanencji. Spinozjańska ontologia ciał jako kompozycji prędkości i afektów stanowi filozoficzne podłoże dla pojęcia CbO i zostaje rozwinięta w plateau 10 jako fundament haecceitas.</p>
<p>Plateau to pełni funkcję pomostu między <em>Anty-Edypem</em> a <em>Tysiącem plateau</em>, potwierdzając program schizoanalityczny: zastąpienie interpretacji (co to znaczy?) eksperymentowaniem (jak to działa?). CbO jest „matrycą produkcji" dla realnego — pojęcie centralne dla „produkcji pragnień" z pierwszego tomu. Odniesienie do Castanedy — jego rozróżnienie między <strong>Tonalem</strong> (organizm i wszystko, co zorganizowane) a <strong>Nagualem</strong> (CbO i eksperymentowanie) — ilustruje potrzebę „czyszczenia tonalu" przy jednoczesnej jego ochronie, by przeżyć nagual. Wilhelm Reich z „pierścieniami pancerza" (okularny, oralny itd.) dostarcza modelu tego, co należy rozwiązać, a William Burroughs — modeli dla „nieefektywnego" ludzkiego ciała i „obwodu mięsa" intensywności.</p>`

      {
        id: 16,
        title: "Twarzowość (Plateau 7)",
        html: `<h4 class="r-h3">15.1. Maszyna abstrakcyjna twarzowości</h4>
<p>Plateau „Rok zerowy — Twarzowość" analizuje twarz nie jako naturalny element ludzkiego ciała, lecz jako produkt <strong>maszyny abstrakcyjnej</strong> złożonej z dwóch komponentów: <strong>białej ściany znaczącości</strong> (powierzchni odniesienia, na której wpisywane są znaki i ustanawiane redundancje częstotliwości) oraz <strong>czarnej dziury upodmiotowienia</strong> (<em>loci</em> rezonansu, gdzie umieszczane są świadomość i pasja). System twarzy to przecięcie tych dwóch: szeroka biała ściana (policzki/powierzchnia) z czarnymi dziurami (oczy/punkty rezonansu).</p>
<p>Autorzy rozróżniają <strong>system głowa/ciało</strong> (system „objętość-wgłębienie", kodowany przez funkcje biologiczne) od <strong>systemu twarzy</strong> (system „dziurawej powierzchni"). Twarz jest produkowana dopiero wtedy, gdy głowa zostaje oderwana od warstwy organizmu i nadkodowana przez maszynę twarzowości. Co więcej, ciało jest „twarzyfikowane" — pierś, narzędzie, przedmiot mogą stać się twarzą, gdy zostaną przejęte przez system biała-ściana/czarna-dziura. Istnieje fundamentalna korelacja między twarzą a <strong>krajobrazem</strong> — tak jak głowa staje się twarzą, tak środowisko staje się zdeterytorializowanym światem.</p>
<h4 class="r-h3">15.2. Twarz Chrystusa jako standard zachodni</h4>
<p>„Rok zerowy" odnosi się do narodzin Chrystusa, który jest centralnym punktem europejskiej maszyny twarzowości. Twarz Chrystusa wynalazła twarzyfikację całego ciała i funkcjonuje jak „centralny komputer" do biuniwokalizacji, organizujący wszystkie możliwe twarze w binarne wybory (mężczyzna/kobieta, dorosły/dziecko, biały/czarny). Twarz Chrystusa jest „Przeciętnym Człowiekiem Zmysłowym" — standardową miarą dla zachodniej ludzkości.</p>
<h4 class="r-h3">15.3. Rasizm jako pomiar dewiacji</h4>
<p>Zachodni rasizm nie funkcjonuje przez wykluczanie „innych", lecz przez określanie <strong>stopni dewiacji</strong> od standardu Białego-Człowieka-Chrystusa. Maszyna skanuje twarz i ocenia, czy „przechodzi." Jeśli odchyla się, jest kategoryzowana jako „typ dywergencji." Rasizm dąży do integracji tych dewiacji w coraz bardziej ekscentryczne fale lub do ich wymazania, jeśli opierają się identyfikacji. Twarz jest zatem z istoty polityczna — kontrola społeczna we współczesnym społeczeństwie działa poprzez maszynę twarzowości.</p>
<h4 class="r-h3">15.4. Głowice sondujące i demontaż twarzy</h4>
<p>Demontaż twarzy jest aktem politycznym, obejmującym przebicie ściany znaczącego i ucieczkę z czarnej dziury podmiotowości. Nie jest regresją do „prymitywnej głowy" (co stanowiłoby nostalgiczną, neurotyczną pułapkę), lecz wynalezieniem nowych kombinacji. <strong>Głowice sondujące</strong> (<em>têtes chercheuses</em>) to urządzenia nawigacyjne, które pojawiają się, gdy dokonuje się „odtwarzyfikowania" — rozkładają warstwy, przebijają się przez ścianę znaczącości i kierują przepływy w twórcze linie ujścia. Celem jest uwolnienie „cech twarzowości" jak ptaków, łącząc je z uwolnionymi cechami krajobrazu, muzyki lub malarstwa, aby osiągnąć stan absolutnej, pozytywnej deterytorializacji.</p>
<p>Maszyna twarzowości działa w różnych stanach i mieszaninach, tworząc cztery kombinacje: twarze graniczne — ziemska/despotyczna (czarne dziury rozłożone na białej ścianie — proliferacja oczu/znaczącość) i morska/autorytarna (biała ściana rozwijająca się ku pojedynczej czarnej dziurze — pasja/upodmiotowienie). Cztery kołowe komponenty pragmatyki — generatywny (mieszaniny), transformacyjny (kreacje), diagramatyczny (maszyny abstrakcyjne) i maszynowy (asemblaże) — dostarczają narzędzi do analizy konkretnych konfiguracji twarzowości. Wśród odwołań: Spitz, Isakower i Lewin (badania nad rozwojem dzieci i „białym ekranem" snu); Sartre i Lacan (krytykowani za czynienie „spojrzenia" lub „lustra" pierwotnym, gdy są one wtórne wobec maszyny abstrakcyjnej twarzowości); Giotto, Tycjan i Eisenstein (ilustrują historię „twarzy Chrystusa" i kinematograficznego zbliżenia jako narzędzi twarzyfikacji); Henry James i D.H. Lawrence (eksploracja „sekretu" i „linii ujścia" prowadzącej do demontażu twarzy).</p>
<p>Plateau to łączy się z plateau 5 (twarz jako ikona reżimu znaczącego), z plateau 8 (twarz a sekret), z plateau 10 (stawanie-się-niedostrzegalnym jako demontaż twarzy) oraz z plateau 14 (haptyczne vs. optyczne — twarz jako struktura optyczna, której rozmontowanie prowadzi do percepcji haptycznej).</p>`

      {
        id: 17,
        title: "Trzy linie i mikropolityka (Plateau 8 i 9)",
        html: `<h4 class="r-h3">16.1. Trzy linie: molowa, molekularna, ujścia</h4>
<p>Plateau 8 („1874: Trzy nowele, czyli co się stało?") i plateau 9 („1933: Mikropolityka i segmentarność") tworzą dyptyk poświęcony kartografii linii — centralnej praktyce schizoanalitycznej. Autorzy wyodrębniają trzy typy linii, które <strong>współistnieją we wszystkim</strong> — w każdym życiu, społeczeństwie i dziele sztuki:</p>
<p><strong>Linia molowa (sztywna)</strong> odpowiada wielkim strukturom — państwo, klasy społeczne, rodzina, instytucje. Na tej linii życie dzieli się na wyraźne etapy i segmenty (szkoła, wojsko, praca), a wszystko wydaje się przewidywalne i obliczalne. <strong>Linia molekularna (giętka)</strong> operuje na poziomie mikropociągnięć, drobnych zmian w pragnieniu, przecieków i „mikropęknięć." Segmenty są płynne, a relacje dotyczą przepływów i cząsteczek, nie ustalonych tożsamości. <strong>Linia ujścia (pęknięcia)</strong> jest linią abstrakcyjną, niesegmentarną, odpowiadającą absolutnej deterytorializacji. Nie łączy punktów, lecz przechodzi między nimi, prowadząc do całkowitej przemiany i stawania się „niedostrzegalnym."</p>
<h4 class="r-h3">16.2. Sekret: treść, forma, klandestynność</h4>
<p>Ewolucja sekretu odpowiada trzem liniom: na linii molowej sekret ma <strong>treść</strong> — jest „brudnym małym sekretem" (np. edypalnym), czymś ukrytym w przeszłości. Na linii molekularnej sekret staje się <strong>formą</strong> samą w sobie — materią niepoznawalną i niedostrzegalną. Na linii ujścia sekret osiąga <strong>klandestynność</strong> — nie ma już nic do ukrycia, podmiot staje się przezroczysty i niedostrzegalny.</p>
<h4 class="r-h3">16.3. Wyłom, pęknięcie, zerwanie</h4>
<p>Trzy typy przerw odpowiadają trzem liniom: <strong>wyłom</strong> (molowy) to wielkie, nagłe ciosy z zewnątrz (utrata majątku, choroba), które przesuwają nas między sztywnymi segmentami. <strong>Pęknięcie</strong> (molekularne) dzieje się niemal bez naszej wiedzy, wewnątrz, gdy wszystko wydaje się iść dobrze — subtelna zmiana intensywności. <strong>Zerwanie</strong> (linia ujścia) to punkt, z którego nie ma powrotu — przeszłość przestaje istnieć, podmiot staje się „niedostrzegalnym."</p>
<h4 class="r-h3">16.4. Segmentarność molowa i molekularna</h4>
<p>W plateau 9 autorzy odchodzą od klasycznego przeciwstawienia społeczeństw segmentarnych (pierwotnych) i scentralizowanych (państwowych), twierdząc, że nowoczesne państwa są równie segmentarne, lecz w sposób sztywny. Każda polityka jest jednocześnie makropolityką i mikropolityką — nie istnieje jedno bez drugiego.</p>
<p>Segmentarność molowa (sztywna) charakteryzuje się trzema cechami: <strong>binarnymi opozycjami</strong> (klasy społeczne, mężczyźni–kobiety, dorośli–dzieci), <strong>koncentrycznymi kręgami</strong> rezonującymi w jednym centrum (mój dom, moja dzielnica, moje miasto, moje państwo — kręgi rozszerzające się, lecz podporządkowane jednemu centrum władzy) oraz <strong>nadkodowanymi liniami</strong> (przestrzeń mierzalna i jednorodna, podporządkowana jednolitej mierze). Jest to domena <strong>aparatu państwowego</strong>, który produkuje i reprodukuje sztywne segmenty.</p>
<p>Segmentarność molekularna (giętka) to mikrosegmentacja oparta na przepływach pragnienia i wiary — segmenty są płynne, a relacje dotyczą cząsteczek i kwantów, nie ustalonych tożsamości. Każdy z nas składa się jednocześnie z obu tych segmentarności — molowej i molekularnej. Nie są one po prostu „różnymi skalami" tego samego zjawiska, lecz dwoma ontologicznie odmiennymi porządkami, które przenikają się nawzajem w każdym konkretnym przypadku.</p>
<p>Dwa bieguny maszyny abstrakcyjnej odpowiadają tym dwóm segmentarnościom: <strong>maszyna abstrakcyjna nadkodowania</strong> tworzy sztywną segmentarność i jednorodną przestrzeń (utożsamiana z aparatem państwowym), natomiast <strong>maszyna abstrakcyjna mutacji</strong> działa przez dekodowanie i deterytorializację, rysując linie ujścia i tworząc maszyny wojenne.</p>
<h4 class="r-h3">16.5. Mikrofaszyzm</h4>
<p>Analiza faszyzmu stanowi jedno z najbardziej przenikliwych osiągnięć tego dyptiku. Faszyzm różni się od totalitaryzmu pochodzeniem: totalitaryzm jest operacją państwową polegającą na sztywnym nadkodowaniu; <strong>faszyzm jest ruchem masowym opartym na mikrofaszyzmach</strong>. Faszyzm powstaje z proliferacji molekularnych „czarnych dziur", które zaczynają ze sobą rezonować. Jest <strong>rakowym ciałem</strong>, nie tylko totalitarnym organizmem — przenika do najmniejszych komórek społeczeństwa (rodzina, biuro, szkoła). Niebezpieczeństwo faszyzmu polega na tym, że ludzie pragną własnej represji poprzez zainwestowanie pragnienia w mikroukłady władzy. Gabriel Tarde, twórca prawdziwej mikrosocjologii, i Michel Foucault z analizą mikrowładz dostarczają teoretycznych narzędzi dla tej diagnozy.</p>
<h4 class="r-h3">16.6. Przepływy kwantowe i centra władzy</h4>
<p>Społeczeństwo definiuje się nie przez swoje sprzeczności, lecz przez to, co z niego ucieka — przez linie ujścia. Centra władzy działają na granicy między liniami molowymi a przepływami kwantowymi, posiadając trzy strefy: strefę władzy (odnoszącą się do sztywnych segmentów), strefę nieodróżnialności (rozproszenie w mikrofizycznej tkance społecznej) i strefę impotencji (punkt, w którym władza nie może kontrolować przepływów).</p>
<h4 class="r-h3">16.7. Cztery niebezpieczeństwa</h4>
<p>Za Castanedą i Nietzschem autorzy wymieniają cztery zagrożenia czyhające na liniach: <strong>strach</strong> (ucieczka z linii ujścia z powrotem w sztywne segmenty i binarną logikę — niebezpieczeństwo linii molowej); <strong>jasność</strong> (monomanie i mikrofaszyzmy płynące z molekularnych „czarnych dziur", przekonanie, że wszystko się zrozumiało, prowadzące do stawania się sędzią dla innych — niebezpieczeństwo linii molekularnej); <strong>władza</strong> (próba zatrzymania przepływów mutacji w aparacie nadkodowania — niebezpieczeństwo na granicy między liniami); i czwarte, najstraszniejsze — <strong>pasja zniesienia</strong> (gdy linia ujścia zmienia się w <strong>linię śmierci</strong> i czystej destrukcji, prowadząc do samobójstwa państwa, jak w faszyzmie, lub jednostki, jak w przypadku Ahaba w <em>Moby Dicku</em>).</p>
<p>Analiza literacka stanowi integralną część argumentacji tych plateau. Henry James w noweli „W klatce" ukazuje bohaterkę-telegrafistkę żyjącą na sztywnej linii segmentarnej (praca–narzeczony), która wchodzi w molekularną relację z bogatym klientem, dopóki nie osiąga stanu, w którym „wie tak dużo, że nie może już nic interpretować" — i musi wybrać między powrotem na linię molową a ucieczką na linię ujścia. F. Scott Fitzgerald w „The Crack-up" analizuje własny upadek jako przejście od molowych nieszczęść do molekularnego pęknięcia i konieczności „czystego zerwania." Pierrette Fleutiaux w „Historii otchłani i lunety" przedstawia społeczeństwo podzielone na segmenty obserwowane przez „blisko-widzących" (geometria państwowa) i „daleko-widzących" (mikrosegmentacja), kończące się ucieczką na linię ujścia.</p>
<p>Dyptyk plateau 8-9 dostarcza zatem kompletnego narzędzia kartograficznego dla schizoanalitycznej praktyki: trzy linie, trzy formy sekretu, trzy typy przerw, dwa rodzaje segmentarności i cztery niebezpieczeństwa tworzą mapę, na której schizoanalityk może lokalizować i analizować pragnienie jednostki lub grupy — nie pytając „co to znaczy?", lecz „jakie są twoje linie? Gdzie pękasz? Jakie linie ujścia rysujesz?"</p>`

      {
        id: 18,
        title: "Stawanie-się (Plateau 10)",
        html: `<h4 class="r-h3">17.1. Stawanie-się vs. imitacja, filiacja, podobieństwo</h4>
<p>Plateau „1730: Stawanie-się-intensywnym, stawanie-się-zwierzęciem, stawanie-się-niedostrzegalnym" oferuje najbardziej rozbudowaną ontologię procesualną całego <em>Tysiąca plateau</em>. Stawanie-się jest ściśle odróżniane od imitacji (nie jest naśladowaniem ani „graniem" zwierzęcia — nie mimesis), od podobieństwa (nie opiera się na analogii relacji), od filiacji (nie jest ewolucją przez pochodzenie czy dziedziczność — filiacja to domena Państwa i rodziny, podczas gdy stawanie-się jest porządku <strong>sojuszu</strong> lub <strong>paktu</strong>). Stawanie-się jest <strong>inwolucją</strong> — twórczym ruchem przebiegającym „między" terminami i pod przypisywalnymi relacjami. Jest procesem samego pragnienia.</p>
<h4 class="r-h3">17.2. Blok stawania-się i strefa bliskości</h4>
<p><strong>Blok stawania-się</strong> stanowi strefę bliskości lub nieodróżnialności — „ziemię niczyją", gdzie punkty wyjścia i przybycia znikają. Osa i orchidea — ich połączenie tworzy blok stawania-się produkujący wspólną deterytorializację. Blok stawania-się jest asymetryczny i podwójny: osa nie staje się orchideą, a orchidea nie staje się osą — obydwie wchodzą w strefę nieodróżnialności, z której wyłaniają się zmienione.</p>
<h4 class="r-h3">17.3. Anomalny i Outsider</h4>
<p>Każda wielość lub sfora ma swoją <strong>anomalną</strong> figurę — nie jednostkę ani gatunek, lecz zjawisko graniczne (<em>phenomenon of bordering</em>), „Outsidera" (odwołanie do Lovecrafta), który istnieje na krawędzi sfory, określając jej wymiary. Z tą anomalną figurą czarownik lub podmiot wchodzi w sojusz, aby uruchomić stawanie-się. Moby Dick jest Anomalnym dla Ahaba — „Unikalnym", z którym zawiązuje się demoniczny pakt. Pojęcie Anomalnego łączy plateau 10 z plateau 2 (wilki i sfora) oraz z plateau 12 (maszyna wojenna nomadów).</p>
<h4 class="r-h3">17.4. Haecceitas jako indywiduacja</h4>
<p><strong>Haecceitas</strong> (<em>haecceity</em>) to sposób indywiduacji odróżnialny od osoby lub substancji. Ciało definiowane jest przez <strong>długość</strong> (relacje prędkości i powolności między cząsteczkami) i <strong>szerokość</strong> (intensywne afekty, do których jest zdolne). Pora roku, godzina, wiatr — to haecceitas. Są doskonałymi indywidualnościami składającymi się całkowicie z relacji i afektów, niezależnymi od podmiotu. Pojęcie to jest bezpośrednio zaczerpnięte ze spinozjańskiej ontologii ciał, a jednocześnie radykalizuje ją, odrzucając substancjalność na rzecz czystych relacji i afektów.</p>
<h4 class="r-h3">17.5. Dwie płaszczyzny: organizacji vs. konsystencji</h4>
<p>Autorzy wyodrębniają dwie fundamentalnie odmienne płaszczyzny, których rozróżnienie stanowi jedną z najważniejszych osi konceptualnych całego <em>Tysiąca plateau</em>:</p>
<p><strong>Płaszczyzna organizacji/rozwoju</strong> jest transcendentnym „planem" — ukrytym i wnioskowanym z efektów, rządzącym rozwojem form i formowaniem podmiotów. Jest „Sądem Bożym" — teleologiczną strukturą, która z góry wyznacza, czym coś ma się stać. Organizm, znaczącość i podmiotowienie są trzema wielkimi formami organizacji tej płaszczyzny. Psychoanaliza, biologia ewolucyjna w wersji neodarwinowskiej i lingwistyka strukturalna operują na tej płaszczyźnie — szukają ukrytych struktur, które determinują rozwój form i podmiotów.</p>
<p><strong>Płaszczyzna konsystencji/kompozycji</strong> jest immanentną płaszczyzną (Planomenon), gdzie istnieją jedynie prędkości i powolności między nieuformowanymi elementami i afektami. Jest Ciałem bez Organów, na którym pisane są wszystkie haecceitas i stawania-się. Nie ma tu form ani podmiotów — jedynie relacje ruchu i spoczynku, prędkości i powolności, oraz intensywne afekty. Spinozjańska ontologia ciał definiowanych przez longitudo (relacje prędkości między cząstkami) i latitudo (zdolność do afektów) stanowi filozoficzną podstawę tej płaszczyzny.</p>
<p>Opozycja ta przenika całą książkę i stanowi ramę dla wszystkich rozróżnień między molarnym a molekularnym, stratyfikacją a destratyfikacją, narzędziem a bronią, nauką królewską a nauką mniejszą. Nie jest to jednak prosta opozycja binarna: płaszczyzna konsystencji nie istnieje „poza" płaszczyzną organizacji — jest raczej jej granicą, tym, co ją podważa od wewnątrz i otwiera na nowe możliwości.</p>
<h4 class="r-h3">17.6. Seria stawań-się</h4>
<p>Stawania-się podążają za specyficzną, choć nie ściśle logiczną, sekwencją: <strong>stawanie-się-kobietą</strong> (pierwszy molekularny segment, „wprowadzająca moc" do wszystkich innych stawań-się, konieczne ponieważ standard to Biały-Człowiek-Dorosły-Mężczyzna), następnie <strong>stawanie-się-zwierzęciem</strong>, <strong>stawanie-się-molekularne</strong> (stawanie-się-bakterią, -wirusem, -molekułą), a wreszcie <strong>stawanie-się-niedostrzegalnym</strong> jako ostateczny cel.</p>
<h4 class="r-h3">17.7. Większość i mniejszość</h4>
<p>Większość nie odnosi się do liczebności, lecz do stanu dominacji i standardu miary. Mniejszość jest definiowana jako <strong>zbiór nieprzeliczalny</strong> lub moc stawania-się. Nie istnieje „stawanie-się-większościowe"; wszelkie stawanie się jest mniejszościowe, ponieważ obejmuje podmiot wycofywany z większości i medium wyłaniające się z mniejszości. Pojęcie to łączy się bezpośrednio z analizą języków większościowych i mniejszościowych z plateau 4.</p>
<h4 class="r-h3">17.8. Czary jako sojusz</h4>
<p>Czary są praktycznym modelem stawania-się: zastępują filiacyjną logikę rodzin i Państw logiką paktu lub sojuszu. Stawanie-się przebiega przez zarażenie i epidemię zamiast dziedziczności — nie produkuje się; zaraża się. Czarownik zawiera demoniczny pakt z Anomalnym (granicą sfory), aby uruchomić stawanie-się-zwierzęciem. Model ten ma głębokie implikacje polityczne: o ile filiacja jest porządkiem Państwa i reprodukcji, o tyle sojusz jest porządkiem maszyny wojennej i tworzenia nowego. Stawanie-się-zwierzęciem jest zatem zawsze aktem politycznym — podważeniem filiacyjnego porządku dominacji.</p>
<h4 class="r-h3">17.9. Rola muzyki i malarstwa</h4>
<p>Muzyka i malarstwo pełnią szczególne funkcje w procesie stawania-się. Malarstwo zajmuje się problemem twarz–krajobraz — jego celem jest deterytorializacja twarzy/krajobrazu na rzecz „głowic sondujących", które nie kreślą już form. Muzyka zajmuje się <strong>rytornelem</strong> — jest twórczą operacją deterytorializującą terytorialny rytornel (np. śpiew ptaka) w dźwiękowy blok stawania-się. Muzyka posiada silniejszą moc deterytorializującą niż malarstwo i może bezpośredniej osiągnąć „kosmiczność." Te rozróżnienia łączą plateau 10 z plateau 11 (o refrenie) i z plateau 7 (o twarzowości), tworząc spójną teorię estetyczną jako praktyki stawania-się.</p>
<p>Wśród odwołań literackich i filozoficznych centralne miejsce zajmują: Lovecraft (koncepcja „Outsidera" i „Rzeczy" na krawędzi wszechświata), Melville (Ahab i Moby Dick jako najwyższy przykład stawania-się-wielorybem poprzez demoniczny sojusz), Virginia Woolf (chwalona za „nasycanie każdego atomu" i osiąganie stawania-się-niedostrzegalnym poprzez grupową indywiduację), Castaneda (Tonal i Nagual), von Uexküll (kleszcz jako ciało definiowane przez trzy afekty) i Spinoza (ciała definiowane przez długość i szerokość na płaszczyźnie immanencji).</p>`
