      {
        id: 1,
        title: "Cel i zakres raportu",
        html: `<h4 class="r-h3">1.1. Przedmiot analizy</h4>
<p>Niniejszy raport stanowi próbę dogłębnej analizy pojęciowej, strukturalnej i argumentacyjnej dwóch fundamentalnych dzieł Gillesa Deleuze'a i Félixa Guattariego, składających się na projekt zatytułowany <em>Kapitalizm i schizofrenia</em>: <em>Anty-Edyp. Kapitalizm i schizofrenia</em> (<em>L'Anti-Œdipe. Capitalisme et schizophrénie</em>, 1972) oraz <em>Tysiąc plateau. Kapitalizm i schizofrenia 2</em> (<em>Mille plateaux. Capitalisme et schizophrénie 2</em>, 1980). Oba tomy, choć tworzą spójny projekt intelektualny, różnią się zasadniczo pod względem strategii argumentacyjnej, stylu pisarskiego i dominujących kategorii pojęciowych. Pierwszy ma charakter przede wszystkim krytyczny — jest wymierzony w psychoanalityczną ortodoksję i jej strukturalne powiązania z kapitalizmem. Drugi jest dziełem konstruktywnym — wypracowuje pozytywną ontologię, nową teorię języka, polityki, sztuki i podmiotowości.</p>
<p>Celem raportu nie jest streszczenie tych dzieł, lecz przeprowadzenie systematycznej rekonstrukcji ich aparatu pojęciowego, prześledzenie wewnętrznej logiki argumentacji oraz uchwycenie transformacji, jakim ulegają kluczowe kategorie w przejściu od pierwszego do drugiego tomu. Ambicją jest ukazanie schizoanalizy nie jako luźnego zbioru prowokacyjnych tez, lecz jako rygorystycznego — choć nieortodoksyjnego — przedsięwzięcia filozoficznego, posiadającego własną spójność metodologiczną i ontologiczną.</p>
<h4 class="r-h3">1.2. Metodologia</h4>
<p>Przyjęta metoda pracy opiera się na trzech wzajemnie powiązanych procedurach:</p>
<p><strong>Po pierwsze: analiza rozdział po rozdziale.</strong> Każdy rozdział obu tomów zostaje potraktowany jako względnie autonomiczna jednostka argumentacyjna, posiadająca własną tezę centralną, własny zasób pojęciowy i własną dynamikę wywodu. Taka segmentacja pozwala uchwycić zarówno lokalną logikę poszczególnych fragmentów, jak i ich miejsce w architektonice całego dzieła. W przypadku <em>Anty-Edypa</em>, który posiada klasyczną strukturę czteroczęściową, analiza podąża za linearnymi etapami argumentacji. W przypadku <em>Tysiąca plateau</em>, którego autorzy explicite zaprojektowali jako dzieło nie-linearne, ryzomaryczne, analiza respektuje tę intencję, ale jednocześnie rekonstruuje ukryte powiązania i rezonanse między poszczególnymi plateau.</p>
<p><strong>Po drugie: śledzenie przebiegu argumentacji.</strong> Chodzi tu o uchwycenie tego, w jaki sposób Deleuze i Guattari budują swoje rozumowanie — jakie przesłanki przyjmują, jakie strategie retoryczne stosują, jakie kontrargumenty antycypują, jakie przykłady przywołują. Szczególną uwagę poświęcamy momentom przejścia: miejscom, w których autorzy dokonują decydujących rozróżnień, wprowadzają nowe pojęcia lub radykalnie przeformułowują dotychczasowe kategorie. Interesują nas także punkty napięcia — miejsca, w których argumentacja zdaje się wchodzić w konflikt z wcześniejszymi ustaleniami lub w których pojawiają się nieredukowalne wieloznaczności.</p>
<p><strong>Po trzecie: ekstrakcja i systematyzacja pojęć kluczowych.</strong> Deleuze i Guattari są twórcami niezwykle rozbudowanego i oryginalnego słownika pojęciowego. Pojęcia takie jak <em>maszyny pragnące</em>, <em>ciało bez organów</em>, <em>terytorializacja/deterytorializacja/reterytorializacja</em>, <em>ryzomat</em>, <em>plan immanencji</em>, <em>linia ujścia</em>, <em>maszyna abstrakcyjna</em>, <em>asambraż</em> (agencement) i wiele innych stanowią narzędzia myślowe, których sens ujawnia się w pełni dopiero w kontekście ich wzajemnych relacji. Raport dąży do odtworzenia tej sieci pojęciowej, ukazania wewnętrznych związków między kategoriami oraz prześledzenia ich genealogii i transformacji.</p>
<h4 class="r-h3">1.3. Uwagi wstępne o stylu i recepcji</h4>
<p>Dzieła Deleuze'a i Guattariego należą do najbardziej kontrowersyjnych i polaryzujących tekstów w historii filozofii XX wieku. Były atakowane zarówno z pozycji analitycznych (zarzut braku ścisłości, nadużywania terminologii naukowej), jak i z pozycji ortodoksyjnie marksistowskich (zarzut idealizmu, woluntaryzmu) czy psychoanalitycznych (zarzut niezrozumienia Freuda i Lacana). Jednocześnie wywarły ogromny wpływ na teorię kultury, studia postkolonialne, geografię krytyczną, filozofię technologii, ekologię polityczną, a nawet teorię architektury i urbanistyki.</p>
<p>Niniejszy raport stara się zachować postawę interpretacyjnej życzliwości (principle of charity), rekonstruując argumenty autorów w ich najsilniejszej postaci, ale nie rezygnuje z formułowania krytycznych pytań tam, gdzie argumentacja wydaje się niepełna lub problematyczna.</p>`
      },
      {
        id: 2,
        title: "Kontekst filozoficzny — od strukturalizmu do schizoanalizy",
        html: `<h4 class="r-h3">2.1. Deleuze jako kartograf strukturalizmu</h4>
<p>Zanim Deleuze podjął współpracę z Guattarim, opublikował w 1967 roku tekst o charakterze programowym: <em>Po czym rozpoznać strukturalizm?</em> (<em>À quoi reconnaît-on le structuralisme?</em>), zamieszczony w tomie <em>Historia filozofii</em> pod redakcją François Châteleta. Tekst ten ma dla zrozumienia późniejszego projektu schizoanalizy znaczenie zupełnie wyjątkowe. Deleuze nie ogranicza się bowiem do neutralnego opisu ruchu strukturalistycznego — dokonuje twórczej interpretacji, która jednocześnie wydobywa produktywne elementy strukturalizmu i wskazuje na kierunki ich możliwego przekroczenia. Wyróżnia on siedem kryteriów pozwalających rozpoznać myśl strukturalistyczną.</p>
<h4 class="r-h3">2.2. Siedem kryteriów strukturalizmu</h4>
<p><strong>Kryterium pierwsze: symboliczność (le symbolique).</strong> Strukturalizm odkrywa trzeci porządek, nieredukowalny ani do porządku realnego, ani do porządku wyobrażeniowego. Porządek symboliczny nie jest odbiciem rzeczywistości ani produktem wyobraźni — jest autonomicznym systemem relacji, który warunkuje zarówno to, co realne, jak i to, co wyobrażeniowe. Deleuze podkreśla, że to odkrycie symboliczności stanowi fundamentalny gest strukturalizmu: język, pokrewieństwo, ekonomia, nieświadomość — we wszystkich tych domenach strukturaliści identyfikują nieredukowalny poziom symboliczny.</p>
<p><strong>Kryterium drugie: pozycyjność (le local ou de position).</strong> Elementy struktury nie posiadają istoty ani wewnętrznej treści — ich tożsamość jest w pełni określona przez pozycje, jakie zajmują w ramach struktury. Sens nie jest własnością izolowanego elementu, lecz efektem pozycji w sieci relacji. Deleuze odwołuje się tu do fonologii Jakobsona i Trubeckiego: fonem nie posiada żadnej pozytywnej substancji, jest czystą wartością pozycyjną, określoną wyłącznie przez różnice wobec innych fonemów.</p>
<p><strong>Kryterium trzecie: różnicowość (le différentiel et le singulier).</strong> Relacje między elementami struktury mają charakter różnicowy — są stosunkami różnic, a nie podobieństw czy analogii. Elementy nie są uprzednie wobec relacji; przeciwnie, to relacje różnicowe ustanawiają elementy jako takie. Deleuze łączy tu inspirację lingwistyczną (de Saussure: w języku istnieją tylko różnice) z inspiracją matematyczną (rachunek różniczkowy Leibniza jako model myślenia o stosunkach czysto różnicowych).</p>
<p><strong>Kryterium czwarte: seryjność (les séries).</strong> Struktura implikuje co najmniej dwie heterogeniczne serie, między którymi zachodzą relacje odpowiedniości. Serie te nie są symetryczne — jedna pełni rolę znaczącego (signifiant), druga znaczonego (signifié). Deleuze przywołuje tu Lacanowską koncepcję dwóch łańcuchów: łańcucha znaczących i łańcucha znaczonych, których wzajemne przesunięcie (glissement) wytwarza efekt sensu.</p>
<p><strong>Kryterium piąte: pusta przegródka (la case vide).</strong> Jest to być może najważniejszy element Deleuze'owskiej interpretacji strukturalizmu. Między dwiema seriami krąży paradoksalny element, który jest jednocześnie nadliczbowy w jednej serii i brakujący w drugiej. Ten element — Deleuze nazywa go za Lacanem <em>objet = x</em> — nie posiada stałej tożsamości; jest tym, co wprawia strukturę w ruch, co uniemożliwia jej zamknięcie, co wytwarza dynamikę sensu. Jest on pustą przegródką, brakiem, który paradoksalnie warunkuje pełnię znaczenia.</p>
<p><strong>Kryterium szóste: podmiot nomadyczny (le sujet).</strong> Podmiot strukturalizmu nie jest podmiotem substancjalnym ani transcendentalnym — jest efektem struktury, wytworzonym przez cyrkulację pustej przegródki. Podmiot jest nomadyczny w tym sensie, że nie posiada stałego miejsca, lecz przemieszcza się zgodnie z ruchami elementu paradoksalnego. Nie jest źródłem sensu, lecz produktem gry różnic.</p>
<p><strong>Kryterium siódme: praktyka (la pratique).</strong> Deleuze podkreśla, że strukturalizm nie jest kontemplatywną teorią, lecz formą praktyki. Struktura nie jest tylko przedmiotem poznania — jest polem transformacji. Odkrycie struktury umożliwia interwencję, przekształcenie, a nawet rewolucję.</p>
<h4 class="r-h3">2.3. Od struktury do maszyny: prefiguracje schizoanalizy</h4>
<p>Retrospektywna lektura tekstu z 1967 roku pozwala dostrzec, w jaki sposób Deleuze'owska interpretacja strukturalizmu już wówczas toruje drogę późniejszemu projektowi schizoanalizy. Trzy momenty tej prefiguracji zasługują na szczególną uwagę.</p>
<p><strong>Od pustej przegródki do maszyn pragnących.</strong> Pusta przegródka jest elementem, który wprowadza do struktury dynamizm, ruch, produktywność. Jest tym, co sprawia, że struktura nie jest martwym schematem, lecz żywym procesem. W <em>Anty-Edypie</em> ta intuicja zostaje zradykalizowana: miejsce pustej przegródki zajmują maszyny pragnące, które nie krążą już w obrębie gotowej struktury, lecz same wytwarzają połączenia, produkują realne. Przejście od pustej przegródki do maszyny pragnącej jest przejściem od logiki braku (manque) do logiki produkcji (production): pusta przegródka jest definiowana przez to, czego w niej nie ma, maszyna pragnąca — przez to, co produkuje.</p>
<p><strong>Od podmiotu nomadycznego w strukturze do podmiotu nomadycznego na CbO.</strong> W tekście o strukturalizmie podmiot jest nomadyczny, ale jego nomadyzm jest ograniczony topologią struktury — porusza się on po z góry określonych pozycjach. W <em>Anty-Edypie</em> i <em>Tysiącu plateau</em> nomadyzm podmiotu zostaje uwolniony z ram struktury: podmiot przemierza nie pozycje w zamkniętym systemie, lecz intensywności na Ciele bez Organów (Corps sans Organes, CsO). CbO nie jest strukturą — jest powierzchnią rejestracji, na której intensywności rozpraszają się, zagęszczają, tworzą strefy i gradienty.</p>
<p><strong>Od struktury do maszyny.</strong> Być może najważniejsze przejście: pojęcie struktury, z jego implikacjami synchroniczności, zamknięcia i dominacji symbolicznego, zostaje zastąpione pojęciem maszyny, które akcentuje procesuralność, otwartość i materialną produkcję. Maszyna nie reprezentuje — łączy, przecina, produkuje. Nie podlega logice znaczącego — funkcjonuje.</p>
<h4 class="r-h3">2.4. Trzej wielcy odkrywcy nieświadomości: Marks, Nietzsche, Freud</h4>
<p>W <em>Anty-Edypie</em> Deleuze i Guattari przywołują Marksa, Nietzschego i Freuda jako „trzech wielkich odkrywców" nieświadomości — trzech myślicieli, którzy w różny sposób odsłonili domenę produkcji ukrytą pod powierzchnią świadomych reprezentacji. Marks odkrył produkcję społeczną jako proces, którego podmioty nie kontrolują i nie rozumieją — nieświadomość ekonomii politycznej. Nietzsche odkrył produkcję wartości, genealogię sił, które działają poza świadomością moralną — nieświadomość woli mocy. Freud odkrył produkcję pragnienia, dynamikę popędów i fantazji, która wymyka się kontroli ego — nieświadomość libido.</p>
<p>Zdaniem Deleuze'a i Guattariego jednak każdy z tych odkrywców w pewnym momencie zdradził własne odkrycie. Marks podporządkował produkcję reprezentacji (towar jako forma, baza i nadbudowa jako struktura). Nietzsche popadł w reaktywny nihilizm wiecznego powrotu źle zrozumianego. Freud — i to jest centralna teza krytyczna <em>Anty-Edypa</em> — podporządkował produkcję pragnienia trójkątowi edypalnemu, sprowadził nieświadomość-fabrykę do nieświadomości-teatru, zastąpił realną produkcję pragnienia jej familiarną reprezentacją.</p>
<p>Schizoanaliza proponuje się jako projekt, który podejmuje i radykalizuje odkrycia całej trójki, unikając zarazem ich zdrad. Jest materialistyczną psychiatrią, która łączy analizę produkcji społecznej (Marks) z analizą produkcji pragnienia (Freud/Nietzsche), nie podporządkowując jednej drugiej.</p>`

<p>Félix Guattari (1930–1992) nie był filozofem akademickim. Był psychoanalitykiem, psychoterapeutą instytucjonalnym i aktywistą politycznym. Jego formacja intelektualna odbywała się na trzech, wzajemnie przenikających się polach.</p>
<p><strong>Pole kliniczne: La Borde.</strong> Od 1955 roku Guattari pracował w klinice psychiatrycznej La Borde, założonej przez Jeana Oury'ego. La Borde była laboratorium psychiatrii instytucjonalnej (psychothérapie institutionnelle) — ruchu, który postulował, że leczenie pacjenta wymaga jednoczesnego leczenia instytucji, w której przebywa. W La Borde tradycyjne hierarchie między lekarzem a pacjentem, między personelem medycznym a technicznym były systematycznie podważane. Pacjenci uczestniczyli w zarządzaniu kliniką, prowadzili warsztaty, organizowali wydarzenia. To doświadczenie ukształtowało Guattariego jako myśliciela, dla którego pragnienie nigdy nie jest sprawą prywatną, indywidualną — jest zawsze sprawą kolektywną, instytucjonalną, polityczną.</p>
<p><strong>Pole psychoanalityczne: dialog z Lacanem.</strong> Guattari był analizantem Lacana i przez wiele lat uczestniczył w seminariach lacanowskich. Znał Lacanowski aparat pojęciowy od wewnątrz — i to właśnie ta znajomość pozwoliła mu na tak radykalną krytykę. W pismach przeddeleuze'owskich Guattari wypracował pojęcie <em>maszyny</em> jako alternatywy dla Lacanowskiej <em>struktury</em>: tam, gdzie Lacan widział łańcuch znaczących, Guattari widział maszynowe układy produkcji. Pojęcie <em>maszyn pragnących</em> (machines désirantes) jest wynalazkiem Guattariego, choć to Deleuze nadał mu pełną filozoficzną artykulację.</p>
<p><strong>Pole polityczne: grupy podmiotowe.</strong> Guattari był zaangażowany w rozmaite inicjatywy polityczne — od pracy z imigrantami, przez ruch antypsychiatryczny, po ekologię polityczną. Wypracował rozróżnienie między <em>grupą podporządkowaną</em> (groupe assujetti), która reprodukuje w swoim wnętrzu hierarchie otaczającego ją społeczeństwa, a <em>grupą podmiotową</em> (groupe-sujet), która jest zdolna do twórczej artykulacji własnego pragnienia. To rozróżnienie stanie się jednym z kluczowych narzędzi analitycznych <em>Anty-Edypa</em>.</p>
<h4 class="r-h3">3.2. Gilles Deleuze: szlifierz diamentów</h4>
<p>Gilles Deleuze (1925–1995) był natomiast filozofem par excellence — myślicielem zakorzenionym głęboko w tradycji filozoficznej, autorem monografii poświęconych Hume'owi, Nietzschemu, Kantowi, Bergsonowi, Spinozie, Leibnizowi i Foucaultowi. Jego wkład w projekt schizoanalizy polegał nie na dostarczeniu materiału klinicznego czy politycznego, lecz na nadaniu temu materiałowi precyzji pojęciowej i filozoficznej głębi.</p>
<p>Sam Deleuze opisywał swoją rolę we współpracy z Guattarim za pomocą metafory szlifierza diamentów: Guattari dostarczał „surowe kamienie" — intuicje, doświadczenia kliniczne, pojęcia in statu nascendi — a Deleuze nadawał im formę, szlifował, wbudowywał w architektonikę pojęciową. To oczywiście uproszczenie: Deleuze wnosił także własne, głęboko oryginalne intuicje filozoficzne, a Guattari był daleki od roli biernego „dostawcy materiału". Niemniej podział ról jest instruktywny: spotkanie filozofa i klinicysty wytworzyło napięcie, z którego narodziła się zupełnie nowa formacja dyskursywna.</p>
<p>Trzy tradycje filozoficzne okazały się szczególnie istotne dla Deleuze'owskiego wkładu w schizoanalizę:</p>
<p><strong>Spinoza</strong> dostarczył modelu ontologii immanentnej — filozofii, która nie odwołuje się do żadnej instancji transcendentnej (Boga, Podmiotu, Prawa), lecz myśli byt jako samoorganizującą się produkcję. Spinozjańska koncepcja substancji jako causa sui, atrybutów jako nieskończonych sposobów jej ekspresji i modusów jako konkretnych konfiguracji siły stanie się jednym z fundamentów ontologii plateau.</p>
<p><strong>Nietzsche</strong> dostarczył krytyki wartości jako produktu reaktywnych sił, koncepcji wiecznego powrotu jako selektywnej zasady ontologicznej oraz wizji myśli jako eksperymentacji, a nie reprezentacji. Nietzscheańskie pojęcie sił aktywnych i reaktywnych zostanie przekształcone w Deleuze'owsko-Guattariańskie rozróżnienie między liniami ujścia a liniami segmentaryzacji.</p>
<p><strong>Bergson</strong> dostarczył koncepcji czasu jako trwania (durée), krytyki spacyjalizacji czasu, teorii obrazu jako ruchu i koncepcji życia jako twórczej ewolucji. Bergsonowska intuicja — specyficzna metoda filozoficzna, pozwalająca uchwycić rzeczywistość w jej stawaniu się — rezonuje z Deleuze'owsko-Guattariańskim naciskiem na procesuralność, stawanie-się (devenir) i eksperymentację.</p>
<h4 class="r-h3">3.3. Kontekst historyczny: Maj '68 i kryzys instytucji</h4>
<p>Współpraca Deleuze'a i Guattariego rozpoczęła się w 1969 roku, a więc w bezpośrednim następstwie wydarzeń Maja 1968. Znaczenie tego kontekstu jest trudne do przecenienia. Maj '68 nie był dla Deleuze'a i Guattariego po prostu wydarzeniem politycznym — był doświadczeniem ontologicznym, ujawnieniem sił i możliwości, które dotychczas pozostawały stłumione. Wydarzenia Maja unaoczniły, że pragnienie jest siłą polityczną, że inwestycje libidinalne mają bezpośredni wymiar społeczny, że pytanie „dlaczego ludzie pragną własnego ucisku?" jest pytaniem fundamentalnym — nie mniej ważnym niż pytania o stosunki produkcji czy struktury klasowe.</p>
<p>Jednocześnie Maj '68 odsłonił — zdaniem autorów <em>Anty-Edypa</em> — głęboką nieadekwatność dostępnych narzędzi teoretycznych. Marksizm ortodoksyjny nie potrafił wyjaśnić, dlaczego rewolucyjna energia klasy robotniczej tak łatwo zostaje przechwycona przez formacje reaktywne, faszyzujące, autorytarne. Psychoanaliza, nawet w swojej lacanowskiej wersji, redukowała pragnienie do trójkąta rodzinnego i dynamiki kastracji, nie potrafiąc uchwycić jego bezpośrednio społecznego, politycznego, kosmicznego wymiaru.</p>
<p>W polu psychoanalizy kryzys miał także wymiar instytucjonalny. Lacanowska École Freudienne de Paris, mimo początkowego radykalizmu, ulegała stopniowej dogmatyzacji. Lacan, który sam dokonał rewolucyjnego przełomu w psychoanalizie, stawał się coraz bardziej figurą autorytarną, a jego szkoła — instytucją zamkniętą, reprodukującą w swoim wnętrzu struktury, które oficjalnie krytykuje. Guattari, który znał tę dynamikę z bezpośredniego doświadczenia, widział w niej symptom głębszego problemu: psychoanaliza nie jest po prostu „błędną teorią" — jest maszyną społeczną, która produkuje określone efekty podmiotowe, wśród nich reprodukcję edypalnej zależności.</p>
<h4 class="r-h3">3.4. Projekt "Kapitalizm i schizofrenia": architektonika dwóch tomów</h4>
<p>Projekt <em>Kapitalizm i schizofrenia</em> został pomyślany jako dzieło dwutomowe, w którym oba tomy pełnią komplementarne, ale asymetryczne funkcje.</p>
<p><strong>Tom pierwszy: <em>Anty-Edyp</em> (1972) — krytyka.</strong> <em>Anty-Edyp</em> jest przede wszystkim dziełem polemicznym. Jego głównym celem jest krytyka psychoanalitycznej koncepcji pragnienia jako braku, koncepcji nieświadomości jako teatru edypalnego i koncepcji podmiotu jako efektu kastracji symbolicznej. Strategia argumentacyjna polega na wykazaniu, że psychoanaliza nie odkrywa „prawdy" pragnienia, lecz narzuca mu określoną formę — formę edypalną — która jest jednocześnie formą kapitalistyczną. Edyp nie jest uniwersalną strukturą ludzkiej psychiki, lecz specyficznym produktem kapitalistycznej organizacji społecznej, instrumentem „prywatyzacji" pragnienia, jego odcięcia od pola społecznego i zamknięcia w trójkącie rodzinnym (ojciec-matka-dziecko).</p>
<p>Pozytywnym rdzeniem <em>Anty-Edypa</em> jest koncepcja pragnienia jako produkcji. Pragnienie nie jest brakiem, nie jest pożądaniem tego, czego się nie ma — jest maszynową produkcją realnego. Maszyny pragnące łączą się, odcinają, produkują przepływy — pragnienie jest procesem, a nie stanem. Ta koncepcja prowadzi do sformułowania programu schizoanalizy jako alternatywy dla psychoanalizy: zamiast interpretować pragnienie (co ono „znaczy"?), schizoanaliza pyta, jak ono działa, jakie połączenia wytwarza, jakie przepływy uruchamia.</p>
<p><strong>Tom drugi: <em>Tysiąc plateau</em> (1980) — konstrukcja.</strong> <em>Tysiąc plateau</em> jest dziełem radykalnie odmiennym od <em>Anty-Edypa</em>. Rezygnuje z polemiki z psychoanalizą (Edyp niemal nie pojawia się w tekście), aby podjąć ambitniejsze zadanie: wypracowanie pozytywnej ontologii, nowej teorii języka, polityki, etyki, estetyki i podmiotowości. Forma dzieła jest bezprecedensowa: składa się z piętnastu „plateau" — względnie autonomicznych rozdziałów, które mogą być czytane w dowolnej kolejności i które rezonują ze sobą, tworząc nie linearny wywód, lecz ryzomaryczną sieć wzajemnych odwołań.</p>
<p>Kluczowe pojęcia drugiego tomu — ryzomat, plan immanencji i plan organizacji, terytorializacja/deterytorializacja, maszyna abstrakcyjna, asambraż, stawanie-się, linie ujścia, segmentaryzacja, przestrzeń gładka i żłobkowana, maszyna wojenna i aparat państwowy — tworzą imponujący w swojej złożoności aparat pojęciowy, który został od czasu publikacji przejęty i twórczo rozwinięty przez całe pokolenia badaczy w najróżniejszych dziedzinach.</p>`

        title: "Metodologiczna rewolucja — \"Jak to działa?\" zamiast \"Co to znaczy?\"",
        html: `<h4 class="r-h3">4.1. Od hermeneutyki do pragmatyki</h4>
<p>Najbardziej fundamentalna innowacja metodologiczna schizoanalizy daje się ująć w jednym pytaniu: zamiast pytać „co to znaczy?" (hermeneutyka), schizoanaliza pyta „jak to działa?" (pragmatyka). Ta zmiana pytania pociąga za sobą przeobrażenie całego pola teoretycznego.</p>
<p>Hermeneutyka — czy to w wersji fenomenologicznej (Heidegger, Gadamer, Ricoeur), czy w wersji psychoanalitycznej (Freud, Lacan) — zakłada, że za manifestacją kryje się sens ukryty, że powierzchnia jest zasłoną głębi, że zadaniem myśli jest interpretacja, odczytanie, deszyfraż. Symptom „znaczy" coś — jest zaszyfrowanym komunikatem, który analityk ma odczytać. Sen „znaczy" coś — jest zniekształconą realizacją stłumionego życzenia. Mit „znaczy" coś — jest symboliczną transpozycją konfliktu strukturalnego.</p>
<p>Schizoanaliza odrzuca ten paradygmat nie dlatego, że uważa go za „fałszywy" w prostym sensie, lecz dlatego, że rozpoznaje w nim operację władzy. Pytanie „co to znaczy?" zakłada pozycję interpretatora — kogoś, kto posiada klucz do deszyfrażu, kto wie lepiej niż sam podmiot, co jego pragnienie „naprawdę" znaczy. Psychoanalityk, który mówi pacjentowi „pana sen o koniu tak naprawdę dotyczy pańskiego ojca", dokonuje operacji, która jest jednocześnie epistemologiczna i polityczna: podporządkowuje produkcję pragnienia kodowi interpretacyjnemu, nad którym sam sprawuje kontrolę.</p>
<p>Pytanie „jak to działa?" zmienia radykalnie perspektywę. Zamiast szukać ukrytego sensu, schizoanaliza bada realne funkcjonowanie: jakie połączenia wytwarza dany element? Jakie przepływy uruchamia? Z jakimi innymi elementami wchodzi w relacje? Jakie efekty produkuje? Sen o koniu nie „znaczy" ojca — koń w śnie funkcjonuje jako element maszynowy, który łączy się z innymi elementami (przestrzeniami, prędkościami, intensywnościami), wytwarzając określone efekty. Pytanie brzmi: co ten koń robi? Jakie stawanie-się uruchamia? Jakie terytoria rysuje lub zaciera?</p>
<h4 class="r-h3">4.2. Kantowska krytyka transcendentalna pragnienia</h4>
<p>W swoich komentarzach do <em>Anty-Edypa</em> polska filozofka Małgorzata Bednarek (za której ustaleniami tu podążamy) trafnie wskazała na kantowski wymiar projektu schizoanalizy. Tak jak Kant w <em>Krytyce czystego rozumu</em> pytał o warunki możliwości doświadczenia — nie o to, czym są rzeczy same w sobie, lecz o to, jakie struktury czynią doświadczenie w ogóle możliwym — tak Deleuze i Guattari pytają o warunki możliwości pragnienia. Nie pytają: czego pragniemy? (pytanie empiryczne) ani: co pragnienie „znaczy"? (pytanie hermeneutyczne), lecz: co sprawia, że pragnienie w ogóle jest możliwe? Jakie są transcendentalne warunki produkcji pragnienia?</p>
<p>Odpowiedź: warunkiem pragnienia jest jego maszynowy charakter — fakt, że pragnienie jest zawsze połączeniem maszyn, sprzęganiem przepływów, produkcją realnego. Nie istnieje pragnienie „czyste", niezapośredniczone, spontaniczne — pragnienie jest zawsze już maszynowe, zawsze już społeczne, zawsze już materialne. Ale — i tu tkwi decydujący moment krytyczny — warunki te są transcendentalne, a nie empiryczne, co oznacza, że nie mogą być utożsamione z żadną konkretną formą historyczną. Edyp nie jest transcendentalnym warunkiem pragnienia — jest jego empiryczną, historycznie uwarunkowaną formą, którą kapitalizm narzuca pragnieniu, aby je kontrolować.</p>
<p>Ten kantowski gest pozwala Deleuze'owi i Guattariemu na jednoczesną krytykę psychoanalizy i kapitalizmu: psychoanaliza naturalizuje Edypa (przedstawia go jako uniwersalną strukturę), kapitalizm produkuje Edypa (wytwarza warunki społeczne, w których pragnienie zostaje zamknięte w trójkącie rodzinnym). Schizoanaliza odsłania tę podwójną operację, pokazując, że pragnienie jest „przed" Edypem — że jego transcendentalne warunki nie wymagają ani ojca, ani matki, ani kastracji, lecz jedynie maszyn, przepływów i połączeń.</p>
<h4 class="r-h3">4.3. Nieświadomość jako fabryka vs. nieświadomość jako teatr</h4>
<p>Jednym z najbardziej sugestywnych obrazów <em>Anty-Edypa</em> jest przeciwstawienie dwóch koncepcji nieświadomości: nieświadomości jako fabryki i nieświadomości jako teatru.</p>
<p><strong>Nieświadomość-teatr</strong> to koncepcja psychoanalityczna. W tej wizji nieświadomość jest sceną, na której odgrywany jest wciąż ten sam dramat — dramat edypalny. Aktorzy mogą się zmieniać, kostiumy mogą być różne, dekoracje mogą się przesuwać, ale fabuła pozostaje ta sama: pragnienie dziecka skierowane ku matce, rywalizacja z ojcem, groźba kastracji, wyparcie. Sen, symptom, lapsus — wszystko to są różne inscenizacje tego samego scenariusza. Rola analityka polega na rozpoznaniu fabuły pod zmieniającymi się kostiumami: „ach, więc ten koń to pański ojciec, ta jaskinia to pańska matka".</p>
<p><strong>Nieświadomość-fabryka</strong> to koncepcja schizoanalizy. W tej wizji nieświadomość nie jest sceną, na której coś się odgrywa — jest halą produkcyjną, w której coś się wytwarza. Nieświadomość produkuje — produkuje pragnienie, połączenia, przepływy, intensywności. Nie jest miejscem reprezentacji, lecz miejscem produkcji. Nie interpretuje się jej — bada się jej funkcjonowanie.</p>
<p>Przeciwstawienie to ma konsekwencje daleko wykraczające poza pole psychoterapii. Jeśli nieświadomość jest teatrem, to jej zawartość jest ostatecznie prywatna, indywidualna, rodzinna — dotyczy relacji dziecka z rodzicami. Jeśli nieświadomość jest fabryką, to jej zawartość jest bezpośrednio społeczna, polityczna, kosmiczna — dotyczy relacji sił, inwestycji libidinalnych w pole społeczne, maszynowych połączeń z całym polem realności. Schizoanaliza twierdzi, że Edyp nie jest prawdą nieświadomości — jest produktem jej stłumienia, efektem operacji, która odcina pragnienie od jego społecznych połączeń i zamyka je w prywatnej celi rodziny.</p>
<h4 class="r-h3">4.4. Funkcjonalizm vs. strukturalizm/semiologia</h4>
<p>Przejście od pytania „co to znaczy?" do pytania „jak to działa?" ma swój odpowiednik na poziomie ogólnej orientacji teoretycznej: przejście od strukturalizmu i semiologii do funkcjonalizmu maszynowego.</p>
<p>Strukturalizm i semiologia — nawet w swoich najbardziej wyrafinowanych postaciach (Lacan, Barthes, wczesny Derrida) — operują w ramach modelu językowego. Ich podstawowym schematem jest relacja znaczące/znaczone, ich podstawową operacją jest interpretacja, ich podstawową jednostką jest znak. Nawet gdy Lacan wprowadza pojęcie Realnego jako tego, co wymyka się symbolizacji, Realne to zostaje zdefiniowane negatywnie — jako reszta, nadmiar, to, czego nie da się powiedzieć. Model językowy pozostaje dominujący.</p>
<p>Deleuze i Guattari proponują radykalnie inny model: model maszynowy. Podstawową jednostką nie jest znak, lecz maszyna. Podstawową operacją nie jest znaczenie (signification), lecz funkcjonowanie (fonctionnement). Podstawową relacją nie jest relacja znaczące/znaczone, lecz relacja połączenie/odcięcie (coupure/flux). Maszyna nie znaczy — działa. Nie reprezentuje — produkuje.</p>
<p>To przejście ma konsekwencje dla sposobu, w jaki myślimy o języku. Dla Deleuze'a i Guattariego język nie jest przede wszystkim systemem znaków — jest formą działania, sposobem interwencji w pole społeczne. Wypowiedź nie jest przede wszystkim opisem stanu rzeczy — jest aktem, który modyfikuje relacje sił, który terytorializuje lub deterytorializuje, który uruchamia lub blokuje przepływy. W <em>Tysiącu plateau</em> ta intuicja zostanie rozwinięta w pełną teorię pragmatyki językowej (plateau 4: <em>Postulaty lingwistyki</em>), w której Deleuze i Guattari, nawiązując do teorii aktów mowy Austina, ale jednocześnie ją przekraczając, pokażą, że każda wypowiedź jest <em>hasłem</em> (mot d'ordre) — aktem społecznym, który narzuca określoną transformację cielesną.</p>
<h4 class="r-h3">4.5. Konsekwencje przejścia metodologicznego</h4>
<p>Przejście od hermeneutyki do pragmatyki, od teatru do fabryki, od struktury do maszyny rysuje nowe pole problemowe, w którym tradycyjne pytania filozofii — pytania o podmiot, o sens, o prawdę — zostają nie tyle odrzucone, ile przeformułowane.</p>
<p>Pytanie o podmiot nie brzmi już: „czym jest podmiot?" (pytanie ontologiczne) ani „jak podmiot konstytuuje doświadczenie?" (pytanie transcendentalne), lecz: „jak podmiot jest produkowany?" — przez jakie maszyny, na jakim ciele bez organów, w jakim polu społecznym? Podmiot nie jest punktem wyjścia — jest produktem, efektem, resztą procesu produkcji.</p>
<p>Pytanie o sens nie brzmi już: „co to znaczy?", lecz: „jak to funkcjonuje?" — jakie połączenia wytwarza, jakie przepływy uruchamia, jakie terytoria rysuje? Sens nie jest ukrytą treścią, którą trzeba wydobyć spod powierzchni — jest efektem maszynowego funkcjonowania, emergentną własnością sieci połączeń.</p>
<p>Pytanie o prawdę nie brzmi już: „co jest prawdziwe?", lecz: „co jest produktywne?" — jakie formy życia wytwarza dany układ? Jakie możliwości otwiera, a jakie zamyka? Jakie stawania-się uruchamia? Kryterium nie jest adekwatność reprezentacji (zgodność z „faktami"), lecz produktywność maszynowa — zdolność do wytwarzania nowych połączeń, nowych form istnienia, nowych sposobów życia.</p>

        html: `<p>Pierwszy rozdział <em>Anty-Edypa</em> ustanawia fundamenty ontologiczne całego przedsięwzięcia Deleuze'a i Guattariego. Jest to zarazem najbardziej zagęszczony pojęciowo fragment książki, w którym autorzy dokonują radykalnego przewrotu w rozumieniu nieświadomości, pragnienia i podmiotowości. Zamiast traktować nieświadomość jako scenę teatralną, na której odgrywają się rodzinne dramaty, Deleuze i Guattari proponują model nieświadomości jako fabryki — przestrzeni nieustannej produkcji, w której maszyny pragnące wytwarzają rzeczywistość.</p>
<h4 class="r-h3">5.1 Produkcja pragnąca i trzy syntezy pasywne</h4>
<p>Centralnym aksjomatem <em>Anty-Edypa</em> jest twierdzenie, że „wszystko jest produkcją". Autorzy odrzucają tradycyjny podział na produkcję, dystrybucję i konsumpcję jako sztuczny i właściwy jedynie kapitalistycznej ideologii. W nieświadomości produkcja jest bezpośrednio zapisem i konsumpcją — te trzy momenty nie następują po sobie chronologicznie, lecz współistnieją jako aspekty jednego procesu. To założenie prowadzi do sformułowania teorii trzech syntez pasywnych nieświadomości, które stanowią rdzeń aparatu pojęciowego pierwszego rozdziału.</p>
<p>Materialistyczny zwrot, jakiego dokonują Deleuze i Guattari, polega na zastąpieniu idealistycznej logiki pragnienia-braku (od Platona po Freuda) materialistyczną logiką pragnienia-produkcji. W tradycji idealistycznej pragnienie jest definiowane przez brak — pragnę tego, czego nie mam, a zatem pragnienie jest wtórne wobec braku przedmiotu. Deleuze i Guattari odwracają tę relację: pragnienie jest siłą wytwórczą, która produkuje rzeczywistość (Realne), a brak jest wtórnym, ideologicznym konstruktem narzucanym pragnieniu przez represję społeczną. To odwrócenie ma fundamentalne konsekwencje zarówno dla teorii nieświadomości, jak i dla rozumienia relacji między człowiekiem a naturą. Nie istnieje bowiem rozdział między człowiekiem a naturą, przemysłem a naturą, czy produkcją społeczną a produkcją pragnącą — tożsamość ta stanowi jedną z najważniejszych tez całego dzieła, powracającą w każdym kolejnym rozdziale.</p>
<p><strong>Synteza łącząca (connective synthesis) — Libido: „i... a następnie..."</strong></p>
<p>Pierwsza synteza odpowiada za „produkcję produkcji" i działa według reguły asocjacyjnej wyrażonej formułą „i... a następnie...". Jej mechanizm polega na sprzęganiu maszyn-organów z maszynami-źródłami w serii binarnych połączeń. Jedna maszyna wytwarza ciągły przepływ materialny (hylè), a podłączona do niej druga maszyna działa jako cięcie, pobierając fragment tego przepływu. Paradygmatycznym przykładem jest para pierś-usta: maszyna-pierś emituje przepływ mleka, maszyna-usta go przecina i pobiera. Seria ta jest liniowa we wszystkich kierunkach — usta z kolei podłączone są do maszyny-gardła, ta do maszyny-żołądka i tak dalej w nieskończoność. Energią mobilizowaną przez tę syntezę jest Libido rozumiane nie w wąskim sensie freudowskim, lecz jako energia produkcji w ogóle.</p>
<p>Kluczowe jest tutaj pojęcie cięcia-przepływu. Cięcie nie sprzeciwia się ciągłości, lecz jest jej warunkiem — jest to „cięcie-pobranie" (prélèvement), które jednocześnie kontynuuje i przerywa przepływ. Maszyny pragnące funkcjonują wyłącznie w trybie binarnym: zawsze jest maszyna podłączona do innej maszyny, przepływ sprzężony z cięciem. Przykład anorektyka dobrze ilustruje tę dynamikę: jego usta oscylują między byciem maszyną-jedzącą, maszyną-analną, maszyną-mówiącą i maszyną-oddychającą — każde cięcie otwiera nowy przepływ i nową serię połączeń.</p>
<p><strong>Synteza rozłączna (disjunctive synthesis) — Numen: „albo... albo... albo..."</strong></p>
<p>Druga synteza odpowiada za „produkcję zapisu" i wyraża się formułą „albo... albo... albo...", rozumianą jednak nie jako alternatywa wykluczająca, lecz jako system permutacji. W tym momencie procesu produkcja zostaje zapisana na powierzchni Ciała bez Organów, które pełni funkcję „magicznej tablicy zapisu". Energia Libido ulega częściowej transformacji w Numen — energię boską lub energię zapisu rozłącznego.</p>
<p>Na powierzchni CbO maszyny pragnące osadzają swoje punkty dysjunkcji, tworząc siatkę współrzędnych, która pozwala na lokalizację intensywności. Synteza rozłączna nie narzuca wykluczających wyborów (jak czyni to Edyp: „albo ojciec, albo matka"), lecz afirmuje wszystkie terminy w ich odstępach. Podmiot może przemieszczać się między stanami — być mężczyzną lub kobietą, żywym lub martwym — nie będąc na stałe uwięzionym w żadnym z nich. Przypadek sędziego Schrebera jest tu paradygmatyczny: jego „stawanie-się-kobietą" nie jest urojeniem dotyczącym tożsamości płciowej w sensie molarnym, lecz przejściem przez pasmo intensywności na CbO, w którym dysjunkcje płci, rasy i boskości są włączające, a nie wykluczające.</p>
<p><strong>Synteza koniunktywna (conjunctive synthesis) — Voluptas: „A więc to tak!"</strong></p>
<p>Trzecia synteza odpowiada za „produkcję konsumpcji" i wyraża się okrzykiem „A więc to tak!" lub „A więc to ja!". Jest to moment, w którym z produkcji i zapisu wyłania się specyficzny rodzaj podmiotowości. Podmiot rodzi się jako „residuum" — reszta pozostawiona po podziałach na powierzchni zapisu. Energia resztkowa, która ożywia tę syntezę, nosi nazwę Voluptas — rozkoszy konsumowanej przez podmiot przechodzący przez kolejne stany intensywne na CbO.</p>
<p>Synteza koniunktywna polega na pogodzeniu sił przyciągania i odpychania na CbO. Podmiot nie jest centrum pragnienia ani jego przyczyną, lecz efektem ubocznym syntez pasywnych — „częścią przylegającą" do maszyny, a nie jej konstruktorem. W terminologii Lacana, którą Deleuze i Guattari twórczo przechwytują, podmiot „rodzi się z podziału" — gry słów między <em>parere</em> (wywoływać), <em>separare</em> (oddzielać) i <em>se parere</em> (samowytwarzać się). Lecz w przeciwieństwie do Lacana, u którego ten podział jest naznaczony brakiem i kastracją, u Deleuze'a i Guattariego jest on źródłem rozkosz (Voluptas) — pozytywnej energii konsumpcji intensywności.</p>
<p>Postacie Becketta — Murphy, Watt, Mercier, Molloy — służą jako modele podmiotu nomadycznego, który jest jedynie stanem przejściowym w serii, pozbawionym stałej tożsamości i rodziny. Podobnie dzieło Prousta jest opisane jako „maszyna schizoidalna", w której fragmenty są łączone liniami poprzecznymi bez tworzenia harmonijnej całości, a podmiot (narrator) jest „pająkiem czającym się na znaki-maszyny".</p>
<p><strong>Obiekty częściowe versus osoby globalne</strong></p>
<p>Fundamentalne znaczenie ma tu rozróżnienie między obiektami częściowymi a osobami globalnymi. Obiekty częściowe (pierś, usta, odbyt) nie są — wbrew tradycji psychoanalitycznej — fragmentami utraconej całości ani częściami „całkowitych osób" (matki, ojca). Są samodzielnymi jednostkami funkcjonalnymi, molekularnymi elementami maszyn pragnących, którym niczego nie brakuje. Deleuze i Guattari krytykują tu Melanie Klein, która wprawdzie odkryła obiekty częściowe, ale ostatecznie poddała je „edypalnej totalizacji", traktując je jako etapy prowadzące do integracji osób globalnych w ramach „pozycji depresyjnej". Osoby globalne — Mama, Tata, Ja — są natomiast bytami „molowymi", produkowanymi przez kodowanie społeczne i rodzinne. Są symulakrami, które maskują realną molekularną pracę maszyn pragnących.</p>
<h4 class="r-h3">5.2 Ciało bez Organów</h4>
<p>Pojęcie Ciała bez Organów (CbO) jest jednym z najbardziej oryginalnych i zarazem najtrudniejszych konceptów <em>Anty-Edypa</em>. Zapożyczone od Antonina Artauda, który postulował ciało uwolnione od organicznej organizacji, zostaje przez Deleuze'a i Guattariego przekształcone w kluczową kategorię ontologiczną.</p>
<p><strong>CbO jako powierzchnia zapisu i antyprodukcji</strong></p>
<p>CbO nie jest brakiem organów ani destrukcją ciała — podkreślenie to jest istotne, ponieważ pojęcie to bywa nader często błędnie interpretowane jako apologia autodestrukcji lub masochizmu. Jest ono „pełnym ciałem" — jałową i nieproduktywną powierzchnią, która powstaje jako trzeci termin w serii produkcji. Jego funkcja polega na tym, że jest ono „nieruchomym poruszycielem" pragnienia: to na nim przepływy energii przesuwają się w stanie swobodnym, to na nim zapisują się wszystkie procesy produkcji. CbO należy do domeny antyprodukcji, lecz jest paradoksalnie niezbędne dla procesu produkcji, ponieważ bez niego produkcja rozpadłaby się w nieograniczone rozproszenie. CbO nadaje produkcji powierzchnię, na której może ona zostać zarejestrowana i skonsumowana.</p>
<p><strong>Odpychanie i przyciąganie</strong></p>
<p>Relacja między CbO a maszynami pragnącymi jest jednocześnie konfliktowa i komplementarna, oscylując między dwoma biegunami. W pierwszym momencie CbO odpycha maszyny pragnące — każde połączenie organów jest postrzegane jako „odstraszające robactwo" i „larwy", które próbują wtargnąć w jego indyferencję. Ten moment odpychania produkuje to, co autorzy nazywają maszynami paranoicznymi — maszyny pragnące w swojej relacji wrogości wobec CbO stają się aparatem prześladowczym.</p>
<p>W drugim momencie siła odpychania ustępuje sile przyciągania. Maszyny pragnące zaczepiają się na CbO „niczym medale na mundurze zwycięzcy", a CbO przypisuje sobie ich moc, sprawiając wrażenie, że cała produkcja emanuje z niego jako z „quasi-przyczyny". Ten moment przyciągania wytwarza maszyny cudowne (machines à miracles), w których CbO jawi się jako cudowne źródło wszelkiej produkcji.</p>
<p><strong>Artaud i geneza pojęcia</strong></p>
<p>Artaud jest kluczową postacią dla zrozumienia CbO. Jego wizja ciała, które nie potrzebuje organów i jest wrogiem organizmów, dostarcza Deleuze'owi i Guattariemu modelu dla ich koncepcji. Organizm jest wrogiem ciała, ponieważ narzuca częściom sztywną organizację, hierarchię i funkcjonalność. CbO jest natomiast ciałem uwolnionym od tej organizacji — czystą intensywnością, na której pragnienie może się swobodnie przemieszczać.</p>
<p><strong>CbO a Kapitał — analogia marksowska</strong></p>
<p>Jedną z najważniejszych operacji teoretycznych pierwszego rozdziału jest analogia między CbO a Kapitałem. Deleuze i Guattari porównują relację między produkcją pragnącą a CbO do relacji między siłami wytwórczymi (pracą) a Kapitałem w analizie Marksa. Kapitał jest „ciałem bez organów kapitalisty" — jałową powierzchnią, która nie produkuje niczego sama z siebie, ale przywłaszcza sobie siły pracy, sprawiając wrażenie, że to on „cudownie" wytwarza wartość dodatkową. Tak jak CbO przypisuje sobie moc maszyn pragnących jako quasi-przyczyna ich produkcji, tak Kapitał przypisuje sobie moc pracy żywej, sprawiając, że zysk wydaje się emanować z samego kapitału, a nie z wyzysku pracy.</p>
<p>Ta analogia ma daleko idące konsekwencje. Po pierwsze, zapowiada centralne tezy rozdziału trzeciego o cywilizowanej maszynie kapitalistycznej, gdzie Kapitał-Pieniądz zostanie explicite zidentyfikowany jako trzecia historyczna forma socius (ciała pełnego). Po drugie, pozwala zrozumieć, dlaczego krytyka psychoanalizy i krytyka kapitalizmu są w <em>Anty-Edypie</em> ściśle powiązane: tak jak CbO może stać się instancją represji pragnienia (odpychając maszyny pragnące), tak Kapitał jako socius jest instancją represji społecznej (podporządkowując siły wytwórcze logice zysku). Po trzecie, analogia ta ujawnia głęboką homologię między strukturą nieświadomości a strukturą pola społecznego — homologię, która jest podstawą tezy o tożsamości produkcji pragnącej i produkcji społecznej.</p>
<h4 class="r-h3">5.3 Podmiot i rozkosz</h4>
<p>Trzecia sekcja rozdziału pierwszego poświęcona jest wyłanianiu się podmiotowości z procesu pragnienia. Jest to jedna z najbardziej subtelnych analiz w całym <em>Anty-Edypie</em>, w której autorzy dokonują radykalnej decentracji podmiotu.</p>
<p><strong>Podmiot nomadyczny jako residuum</strong></p>
<p>Podmiot w ujęciu Deleuze'a i Guattariego nie jest stałą tożsamością, centrum świadomości ani przyczyną pragnienia. Stanowi to radykalne zerwanie zarówno z kartezjańskim cogito, jak i z freudowskim „ja" — w obu tych tradycjach podmiot jest w jakimś sensie pierwotny wobec swoich doświadczeń, nawet jeśli jest podzielony (jak u Freuda między „ja", „nad-ja" i „to"). U Deleuze'a i Guattariego podmiot jest raczej „resztkowym" efektem syntez pasywnych — residuum pozostawionym po podziałach na powierzchni CbO. Podmiot nomadyczny nie zajmuje środka koła produkcji (ten zajmuje maszyna), lecz znajduje się na jego brzegu, przechodząc przez kolejne stany intensywne. Rodzi się z każdego kolejnego stanu serii i odradza w następnym, konsumując te, które go zrodziły. Jest to byt bez stałej tożsamości, stale zdecentrowany, wywiedziony ze stanów, przez które przechodził.</p>
<p><strong>Maszyny celibatarne</strong></p>
<p>Trzecim typem maszyn — po paranoicznych (odpychanie) i cudownych (przyciąganie) — są maszyny celibatarne (machines célibataires). Powstają one w momencie, gdy pogodzenie sił odpychania i przyciągania na CbO wytwarza nowe przymierze między maszynami pragnącymi a powierzchnią zapisu. Zadaniem maszyn celibatarnych jest wytwarzanie ilości intensywnych w stanie czystym — czystych intensywności, przez które przechodzi podmiot nomadyczny. Termin ten nawiązuje do tradycji artystycznej (Duchamp, Kafka, Roussel), w której maszyny bezżenne celebrują autoerotyczną konsumpcję intensywności zamiast służyć celom reprodukcyjnym.</p>
<p><strong>Klossowski/Nietzsche: podmiot jako seria intensywności</strong></p>
<p>Fundamentalne znaczenie dla koncepcji podmiotowości w <em>Anty-Edypie</em> ma interpretacja Nietzschego dokonana przez Pierre'a Klossowskiego, szczególnie w jego dziele <em>Nietzsche i błędne koło</em>. Podmiot nietzscheański nie jest spójnym „Ja", lecz „serią indywidualności" wywołaną przez wahania sił odśrodkowych i dośrodkowych wokół pustego centrum. Nietzsche w swoich listach obłędu wykrzykuje: „Jestem każdym nazwiskiem z historii!" — jest to model schizofrenicznego podmiotu, który identyfikuje wszystkie imiona historii ze stanami intensywnymi na swoim CbO. Podmiot-Nietzsche nie „jest" Cezarem ani Dionizosem, lecz przechodzi przez pasma intensywności, które te imiona oznaczają. Ta koncepcja ma fundamentalne konsekwencje dla rozumienia delirium schizofrenicznego: schizofrenik, który „jest Napoleonem", nie utożsamia się z osobą historyczną, lecz doświadcza intensywności, która jest oznaczona tym imieniem. Delirium nie jest więc błędem co do tożsamości, lecz doświadczeniem czystych intensywności, które wyprzedza jakąkolwiek identyfikację osobową.</p>
<h4 class="r-h3">5.4 Materialistyczna psychiatria</h4>
<p>Czwarta sekcja rozdziału pierwszego stanowi moment, w którym Deleuze i Guattari wyprowadzają swoją teorię poza ramy kliniki, formułując projekt materialistycznej psychiatrii — programu, który zostanie w pełni rozwinięty w rozdziale czwartym pod nazwą schizoanalizy.</p>
<p><strong>Schizofrenia jako proces versus schizofrenik szpitalny</strong></p>
<p>Jednym z najważniejszych rozróżnień w całym <em>Anty-Edypie</em> jest rozróżnienie między schizofrenią jako procesem a schizofrenikiem jako jednostką kliniczną. Schizofrenia jako proces to fundamentalna matryca nieświadomości, pozytywna siła deterytorializacji, która przybliża podmiot do „żyjącego i gwałtownego środka materii". Nie jest ona z natury patologiczna — jest modelem funkcjonowania pragnienia jako syntezy. Schizofrenik szpitalny natomiast to „autystyczny ludzki wrak", produkt psychiatrii i represji społecznej, która brutalnie przerwała naturalny proces produkcji pragnącej. Choroba kliniczna nie jest skutkiem procesu schizofrenicznego, lecz wynikiem jego przerwania lub uwięzienia w próżni.</p>
<p><strong>Podróż schizofreniczna</strong></p>
<p>Autorzy, podążając za Laingiem i Cooperem z nurtu antypsychiatrii, opisują doświadczenie schizofrenicznego procesu jako „podróż" — doświadczenie inicjacyjne polegające na utracie Ego i przechodzeniu przez kolejne stany intensywności na CbO. Jest to ruch „w spoczynku", podróż przez skalę intensywności, a niekoniecznie przemieszczenie w przestrzeni fizycznej. Schizofrenik w podróży cierpi nie na nadmiar fantazji, lecz na „nadmiar rzeczywistości", którą zmuszony jest przetwarzać bez osłony społecznych kodów.</p>
<p><strong>Homo natura i Homo historia</strong></p>
<p>Projekt materialistycznej psychiatrii opiera się na podwójnej charakterystyce schizofrenika. Jako Homo natura schizofrenik doświadcza tożsamości człowieka i natury w procesie produkcji — nie postrzega natury jako malowniczego tła, lecz jako maszynowy proces, w który wchodzi całym ciałem. Spacer Lenca opisany przez Büchnera jest tu paradygmatycznym przykładem: Lenc na spacerze nie jest już synem ani chrześcijaninem, lecz staje się „maszyną chlorofilową", łączącą się z gwiazdami i górskimi krajobrazami. Jako Homo historia schizofrenik karmi się historią powszechną, a nie tylko historią rodzinną — „roi rasy" i utożsamia się z wszystkimi imionami historii.</p>
<p><strong>Projekt materialistycznej psychiatrii: pragnienie w produkcji, produkcja w pragnieniu</strong></p>
<p>Materialistyczna psychiatria definiuje się przez podwójną operację, która stanowi zarazem teoretyczne zbliżenie psychoanalizy i marksizmu: wprowadzenie pragnienia do mechanizmu społecznego (pokazanie, że libido bezpośrednio inwestuje w pole ekonomiczne i polityczne) oraz wniesienie dziedziny produkcji do pragnienia (traktowanie nieświadomości nie jako teatru przedstawień, lecz jako fabryki). Zamiast pytać „co to znaczy?" — co nieuchronnie prowadzi do Edypa — materialistyczna psychiatria pyta „jak to działa?" i dąży do ponownego uruchomienia maszyn pragnących.</p>
<p>W tym kontekście Deleuze i Guattari podejmują dialog z kluczowymi postaciami antypsychiatrii. Doceniają R.D. Lainga za definicję procesu schizofrenicznego jako „podróży" i „przełomu" (<em>breakthrough</em>), a nie upadku (<em>breakdown</em>). Jednakże krytykują go — wraz z Davidem Cooperem — za pozostanie w pułapce „rodzinnego mikrokosmosu": antypsychiatria szuka przyczyn choroby w patologii relacji rodzicielskich, co paradoksalnie utrzymuje ją w orbicie familializmu, który zamierzała krytykować. Materialistyczna psychiatria musi wyjść poza tę pułapkę, lokalizując przyczyny załamania procesu schizofrenicznego nie w rodzinie, lecz w represji społecznej, której rodzina jest jedynie oddelegowanym agentem.</p>
<p>Karl Jaspers jest z kolei doceniony za postrzeganie procesu schizofrenicznego jako „wtargnięcia demoniczności" — za rozpoznanie w nim czegoś, co radykalnie przekracza normalne „ja". Lecz Jaspers nie dostrzega w tym procesie materialnej rzeczywistości ekonomicznej. Artaud natomiast „rozrywa psychiatrię na kawałki", ponieważ wypełnia proces literatury jako schizofrenik — jego twórczość jest dowodem na to, że schizofreniczny proces nie jest patologią, lecz formą produkcji. Henry Miller jest cytowany jako autor rozumiejący nieświadomość jako „skrobankę" — proces oczyszczania życia z mitów i idei, co zapowiada destruktywne zadanie schizoanalizy z rozdziału czwartego.</p>
<h4 class="r-h3">5.5 Definicja maszyny</h4>
<p>Piąta sekcja rozdziału pierwszego poświęcona jest systematycznej definicji pojęcia maszyny, które jest kluczowe dla całego aparatu pojęciowego <em>Anty-Edypa</em>.</p>
<p><strong>Maszyna versus mechanizm versus organizm</strong></p>
<p>Deleuze i Guattari dokonują podwójnego odgraniczenia maszyny pragnącej zarówno od mechanizmu (maszyny technicznej), jak i od organizmu. Maszyna techniczna pracuje i działa jedynie pod warunkiem, że nie jest zepsuta — jej granicą jest zużycie. Maszyna pragnąca natomiast „działa tylko wtedy, gdy jest zepsuta" i przez to, że ciągle się psuje. Usterki i spięcia nie są jej wadami, lecz warunkami funkcjonowania — proces produkcji jest w niej nieustannie przeszczepiany na produkt. Organizm z kolei jest wrogiem ciała, ponieważ narzuca częściom sztywną organizację, podporządkowując je hierarchii i celowości. Maszyna pragnąca składa się z „części realnie odrębnych", które funkcjonują razem właśnie dzięki brakowi związku — dzięki dysjunkcji włączającej.</p>
<p><strong>Witalizm maszynowy</strong></p>
<p>Autorzy odrzucają zarówno klasyczny mechanicyzm, jak i klasyczny witalizm. Zamiast tego proponują „witalizm maszynowy" — koncepcję, w której pragnienie jest maszyną, a maszyna jest pragnąca. Nie ma tu podziału na sferę duchową i mechaniczną, na życie i maszynę. Inspirując się Samuelem Butlerem i jego <em>Księgą maszyn</em>, Deleuze i Guattari rozbijają zarówno specyficzną jedność życia, jak i specyficzną jedność mechanizmu, aby ukazać ich wspólny fundament w maszynowym pragnieniu.</p>
<p>Istotne jest również to, że autorzy krytykują ewolucyjny schemat „narzędzie przechodzące w maszynę", twierdząc, że maszyna społeczna zawsze poprzedza narzędzie i określa, jacy ludzie i jakie przedmioty stają się jej częściami. Odwołując się do koncepcji Lewisa Mumforda, opisują maszynę społeczną jako „megamaszynę", w której częściami składowymi są ludzie — przykładem jest egipska megamaszyna budowy piramid, złożona z tysięcy ludzkich ciał podporządkowanych jednemu despotycznemu celowi. Maszyny techniczne są jedynie wskaźnikami maszyn społecznych, a maszyny pragnące stanowią ich molekularną bazę.</p>
<p><strong>Binarne cięcie-przepływ</strong></p>
<p>Maszyna jest zdefiniowana przede wszystkim jako system cięć na ciągłym przepływie materialnym. Trzy rodzaje cięć odpowiadają trzem syntezom: cięcie-pobranie (produkcja), cięcie-odłączenie (zapis) oraz cięcie-reszta (wytwarzające podmiot). Ta definicja jest fundamentalnie funkcjonalna — maszyna nie jest określona przez swoją strukturę ani formę, lecz przez sposób, w jaki tnie i łączy przepływy.</p>
<p><strong>Wartość dodatkowa kodu</strong></p>
<p>Pojęcie wartości dodatkowej kodu pojawia się, gdy fragment łańcucha kodu jednej maszyny zostaje przechwycony przez inną. Paradygmatycznym przykładem jest relacja orchidei i osy: dwa skrajnie różne byty tworzą jedną maszynę pragnącą poprzez wymianę fragmentów kodu — orchidea przechwytuje kod osy, osa przechwytuje kod orchidei. Ta maszynowa komunikacja produkuje nadwyżkę — wartość dodatkową, która nie jest ekonomiczna w nowoczesnym sensie, lecz jakościowa, oparta na prestiżu kodu.</p>
<p><strong>Molarne versus molekularne</strong></p>
<p>Rozróżnienie między porządkiem molowym a molekularnym jest jednym z najważniejszych w całym <em>Anty-Edypie</em> i przenika wszystkie późniejsze rozdziały. Maszyny pragnące są molekularne — działają na poziomie przedosobowych osobliwości, mikrofizyki nieświadomości. Maszyny społeczne i techniczne są molowe — stanowią statystyczną akumulację elementów molekularnych podlegającą prawu wielkich liczb. Oba poziomy współistnieją i są ze sobą powiązane, lecz różnią się reżimem funkcjonowania. Maszyny pragnące i maszyny społeczne to „te same maszyny", lecz rozpatrywane w odmiennych skalach.</p>
<p>Różnica ta jest porównywalna do spojrzenia na ciało: gołym okiem widzimy molową całość (osobę), ale pod mikroskopem dostrzegamy molekularną wielość komórek i atomów. Odwołując się do cybernetyki molekularnej Wienera i Monoda, autorzy wykazują, że na poziomie mikroskopowym funkcjonowanie i formowanie się maszyn są tożsame — maszyna pragnąca nie jest najpierw skonstruowana, a potem uruchomiona; jej konstytuowanie się jest zarazem jej funkcjonowaniem. To rozróżnienie molowe/molekularne stanie się w rozdziale czwartym fundamentem programu schizoanalizy, który dąży do dotarcia poza molowe iluzje „ja" i „osoby" do molekularnych sił wytwórczych nieświadomości.</p>
<h4 class="r-h3">5.6 Całość i części</h4>
<p>Ostatnia sekcja rozdziału pierwszego stanowi podsumowanie mechaniki maszyn pragnących i jednocześnie formułuje jedno z najważniejszych twierdzeń ontologicznych <em>Anty-Edypa</em>.</p>
<p><strong>Odrzucenie totalizacji</strong></p>
<p>Deleuze i Guattari odrzucają wszelką formę totalizacji — procesu, w którym niejednorodne części zostają zmuszone do stworzenia zunifikowanej jedności. Całość nie jest tutaj jednością nadrzędną, która zbiera części w totalność. Jest ona „wytwarzana jako dodatkowa część obok innych części", nie ujednolicając ich, lecz przylegając do nich. Na przykładzie dzieła Prousta autorzy pokazują, że jedność powstaje jako „osobno skomponowany fragment", a nie jako plan nadrzędny organizujący całość.</p>
<p><strong>Obiekty częściowe bez braku</strong></p>
<p>Fundamentalnym twierdzeniem jest, że obiekty częściowe nie są naznaczone brakiem. Brak jest ideologicznym konstruktem narzuconym przez klasę panującą i psychoanalizę, aby zahamować produkcję pragnącą. Produkcja pragnąca jest czystą wielością (multiplicité) — kategorią używaną jako rzeczownik, która znosi opozycję „jednego i wielu". Pragnienie nie dąży do integracji osób ani do odzyskania utraconej całości — składa maszyny z elementów realnie odrębnych, które są związane wyłącznie „brakiem związku".</p>
<p><strong>Nieświadomość jako sierota, anarchistka, ateistka</strong></p>
<p>Zamykając pierwszy rozdział, Deleuze i Guattari formułują trychotomiczną charakterystykę nieświadomości, która stanowi zarazem programowe credo całego <em>Anty-Edypa</em>. Nieświadomość jest „sierotą" — nie posiada rodzicielskiej struktury edypalnej, nie wywodzi się z ojca ani matki, lecz samowytwarza się w tożsamości natury i człowieka. Maszyna pragnąca jest „córką urodzoną bez matki" — ten obraz sieroctwa nie oznacza jednak braku czy osamotnienia, lecz wskazuje na fakt, że nieświadomość jest produkcyjna, a nie reprodukcyjna: nie odtwarza rodzinnych scenariuszy, lecz wytwarza nowe połączenia.</p>
<p>Jest „anarchistką" — funkcjonuje poza prawem, kastracją i wszelkim porządkiem normatywnym. Nie uznaje hierarchii ani władzy, nie poddaje się symbolicznemu prawu Ojca ani nakazom nad-ja. Jej „anarchizm" nie jest politycznym programem, lecz opisem sposobu funkcjonowania: maszyny pragnące łączą się i rozłączają według logiki immanentnej, bez zewnętrznego prawodawcy.</p>
<p>Jest „ateistką" — nie uznaje żadnego transcendentnego znaczącego, żadnego bóstwa ani fallusa jako nadrzędnego organizatora. Nie istnieje żaden „wielki Inny" w sensie Lacana, który by nadawał strukturę nieświadomości z pozycji transcendentnej. Ta potrójna charakterystyka stanowi bezpośredni kontrargument wobec psychoanalitycznej wizji nieświadomości jako zorganizowanej wokół trójkąta edypalnego, kastracji i prawa ojca — a zarazem zapowiedź destruktywnego zadania schizoanalizy, które będzie polegało na przywróceniu nieświadomości jej sierocego, anarchistycznego i ateistycznego charakteru.</p>`

<h4 class="r-h3">6.2 Trzy teksty Freuda</h4>

<p><strong>Przypadek sędziego Schrebera (1911)</strong> — Freud zredukował bogate, kosmiczne i polityczno-historyczne urojenia Schrebera wyłącznie do „wątku ojcowskiego". Zignorował fakt, że ojciec Schrebera był wynalazcą sadystyczno-paranoicznych maszyn ortopedycznych, które bezpośrednio komunikowały się z maszynami pragnącymi sędziego. Zamiast widzieć w obłędzie inwestycję w pole społeczne (rasy, religie, narody), Freud sprowadził wszystko do stłumionego homoseksualizmu wobec lekarza jako substytutu ojca.</p>
<p><strong>„Dziecko jest bite" (1919)</strong> — Freud zredukował grupową naturę fantazji (bicie dzieci przez nauczyciela) do wymiaru indywidualnego i edypalnego. Wprowadził pojęcie braku i kastracji jako „wspólnej miary" obu płci, co wymusza wykluczającą dysjunkcję „albo chłopiec, albo dziewczynka".</p>
<p><strong>„Analiza zakończona i nieukończona" (1937)</strong> — „Testament" Freuda, w którym dostrzega on, że proces leczenia staje się nieskończony. Interpretuje to jednak jako przeszkodę wynikającą z „litej skały" kastracji. Deleuze i Guattari twierdzą, że ta „skała" nie jest odkryciem, lecz efektem samej metody psychoanalitycznej, która kastruje pragnienie, narzucając mu edypalne ramy.</p>
<p>Łącznie te trzy teksty ilustrują „odkrycie i zdradę" nieświadomości wytwórczej — Freud odkrył maszyny pragnące (zastrzyk Irmy, tykanie maszyny Człowieka od Wilków, maszyna kaszląca Anny O.), ale przestraszył się tego odkrycia i wycofał w stronę klasycznego teatru przedstawień. Autocenzura Freuda polegała na ucieczce ze świata nieoswojonej produkcji do klasycznego porządku greckiej tragedii, aby wprowadzić ład w „wybuchowe pragnienie". Stał się „reżyserem teatru prywatnego" zamiast pozostać „inżynierem" maszyn.</p>
<p>Przypadki kliniczne ilustrują ten proces z pełną jaskrawością. Mały Hans jest przykładem przejścia od rzeczywistego uwiedzenia i presji społecznej do wewnętrznego poczucia winy — Freud rozgrzeszył autorytet rodzicielski, czyniąc dziecko winnym jego własnych fantazji. Człowiek od Wilków ujawnia, jak Freud zignorował skłonność pacjenta do „poniżania" kobiet (inwestycję w inną klasę społeczną — służące), sprowadzając wszystko do substytutów siostry i matki. Sędzia Schreber, którego libido inwestuje w „Historię powszechną" (rasy, kontynenty), zostaje odcięty przez Freuda od rzeczywistości społecznej i zamknięty w trójkącie „tata-mama-ja".</p>
<h4 class="r-h3">6.3 Trzy syntezy: użycia prawomocne i nieuprawnione</h4>
<p>Centralnym osiągnięciem teoretycznym rozdziału drugiego jest systematyczne rozróżnienie między prawomocnymi (immanentnymi, transcendentalnymi) a nieuprawnionymi (transcendentnymi) użyciami każdej z trzech syntez pasywnych. Deleuze i Guattari odwołują się tu explicite do rewolucji krytycznej Kanta, transponując ją na teren nieświadomości.</p>
<p><strong>Synteza łącząca: częściowe/niespecyficzne versus całościowe/specyficzne — paralogizm ekstrapolacji</strong></p>
<p>W użyciu prawomocnym synteza łącząca jest częściowa i niespecyficzna — łączy obiekty częściowe z nieosobowymi, wielogłosowymi przepływami bez przypisywania im stałego znaczenia czy globalnego podmiotu. Podąża za logiką „i-i-i", gdzie połączenia dokonują się bez wykluczenia. W użyciu nieprawomocnym synteza staje się całościowa i specyficzna — „i... i potem..." produkcji zostaje zastąpione przez „aha! więc to był mój ojciec/matka" reprezentacji. Psychoanaliza dokonuje ekstrapolacji obiektu częściowego (penisa) do „odłączonego obiektu kompletnego" — Fallusa jako transcendentnego znaczącego, który wprowadza brak do pragnienia.</p>
<p><strong>Synteza rozłączna: włączające versus wykluczające — paralogizm double bind</strong></p>
<p>W użyciu prawomocnym synteza rozłączna jest włączająca i nieograniczająca — opiera się na logice „albo... albo... albo...", gdzie wszystkie terminy są potwierdzane w swoich odstępach. Schizofrenik posługuje się dysjunkcjami włączającymi: imiona historyczne nie są osobami, lecz stanami intensywności na CbO. W użyciu nieprawomocnym synteza staje się wykluczająca i ograniczająca — narzuca logikę „albo/albo", wymuszając wybór między terminami niewymiennymi. Edyp działa jak kleszcze: podmiot ma wybór między „normalnym" uwewnętrznieniem autorytetu a neurotycznym utożsamieniem — oba prowadzą z powrotem do Edypa. Jest to paralogizm podwójnego wiązania (double bind) w sensie Batesona.</p>
<p><strong>Synteza koniunktywna: nomadyczne versus segregujące — paralogizm przyporządkowania (rabattement)</strong></p>
<p>W użyciu prawomocnym synteza koniunktywna jest nomadyczna i poliwokalna — podmiot nomadyczny błądzi po CbO, identyfikując się z pasmami intensywności, a nie ze stałymi osobami. Może wykrzykiwać: „Jestem każdą rasą, każdym imieniem z historii!". W użyciu nieprawomocnym synteza staje się segregująca i jednoznaczna — polega na przypisaniu podmiotu do stałej tożsamości w ramach molarnego układu społecznego: „Jestem jednym z was", „Należę do rasy wyższej". Paralogizm przyporządkowania (rabattement) polega na „złożeniu" nieskończonego pola społeczno-historycznego na mały, skończony trójkąt rodzinny.</p>

<p>Nieuprawnione użycia syntez tworzą tzw. formułę „3 + 1", gdzie trójka oznacza ojca, matkę i dziecko, a jedynka to transcendentny Fallus jako zasada formalna triangulacji. Trzy paralogizmy współdziałają ze sobą w sposób systematyczny: ekstrapolacja wytwarza brak (Fallus jako transcendentne znaczące), double bind zamyka podmiot w pułapce bez wyjścia (każda ścieżka prowadzi do Edypa), a przyporządkowanie „składa" całe pole społeczne na trójkąt rodzinny. Razem tworzą one maszynę edypalizacji — aparat, który przekształca nieświadomość wytwórczą w nieświadomość ekspresywną, fabrykę w teatr.</p>
<p>Deleuze i Guattari podkreślają, że ten proces nie jest przypadkowym błędem psychoanalizy, lecz jej systematyczną funkcją w obrębie kapitalizmu. Psychoanaliza wprowadza ideologię braku tam, gdzie pragnienie jest pełnią produkcji. Zamiast pytać „jak to działa?", pyta „co to znaczy?", narzucając egzegezę zamiast inżynierii. Analiza staje się formą „terroryzmu interpretacji", w której analityk krzyczy: „Odpowiadaj 'Tata i Mama', kiedy do ciebie mówię!" — co efektywnie „kastruje" produktywną nieświadomość, uwięziając ją w monotonnej grze znaczącego.</p>
<h4 class="r-h3">6.4 Represja społeczna i wyparcie psychiczne</h4>
<p>Sekcje siódma i ósma rozdziału drugiego poświęcone są relacji między represją społeczną a wyparciem psychicznym oraz redefinicji nerwicy i psychozy. Stanowią one most między krytyką psychoanalizy (rozdziały 1-6) a analizą historyczno-polityczną (rozdział 3), łącząc problematykę kliniczną z problematyką władzy.</p>
<p><strong>Rozróżnienie represji i wyparcia (za Reichem)</strong></p>
<p>Idąc śladem Wilhelma Reicha, którego chwalą za sformułowanie pytania „dlaczego ludzie walczą za swoje poddaństwo?" i za uznanie pragnienia za część bazy ekonomicznej (a nie ideologii), Deleuze i Guattari wprowadzają kluczowe rozróżnienie między represją społeczną (répression) a wyparciem psychicznym (refoulement). Represja społeczna jest działaniem świadomym i zewnętrznym, sprawowanym przez maszynę społeczną — państwo, aparat policyjny, system edukacyjny — na pragnienie. Wyparcie psychiczne jest operacją nieświadomą, zachodzącą wewnątrz aparatu psychicznego. Kluczowa teza brzmi: wyparcie jest całkowicie uzależnione od represji społecznej i nie może być wyjaśnione w kategoriach czysto psychicznych.</p>
<p><strong>Rodzina jako „oddelegowany agent" wyparcia</strong></p>
<p>Rodzina nie jest przyczyną wyparcia, lecz „agentem oddelegowanym" przez produkcję społeczną do jego przeprowadzenia. Represyjna formacja społeczna deleguje swoją władzę rodzinie, która z kolei zastępuje rzeczywistą produkcję pragnącą jej sfałszowanym i przemieszczonym obrazem — popędami kazirodczymi (Edypem). Cel tego zabiegu jest precyzyjny: wyparcie służy temu, aby represja przestała być uświadamiana i stała się pożądana. Edyp jest „przynętą", w którą pragnienie daje się złapać, co pozwala społeczeństwu opanować jego rewolucyjną moc.</p>
<p><strong>Rola antyprodukcji</strong></p>
<p>CbO pełni funkcję instancji antyprodukcji w tym procesie. Odpychając maszyny pragnące (wyparcie źródłowe), tworzy napiętą powierzchnię, na której represja społeczna może się osadzić i przekształcić w wyparcie wtórne. Mechanizm ten działa na dwóch poziomach jednocześnie — molekularnym (maszyny pragnące) i molowym (maszyna społeczna) — i właśnie to podwójne oddziaływanie zapewnia jego skuteczność.</p>
<h4 class="r-h3">6.5 Nerwica i psychoza: redefinicja</h4>
<p><strong>Krytyka Freuda i Lacana</strong></p>
<p>Deleuze i Guattari dokonują radykalnej redefinicji nerwicy i psychozy w opozycji do tradycji psychoanalitycznej. Freud odróżniał nerwicę (gdzie „ja" ulega rzeczywistości i wypiera id) od psychozy (gdzie „ja" ulega id i zrywa z rzeczywistością). Dla autorów to rozróżnienie jest złudne, ponieważ oba stany są efektami tego samego procesu — produkcji pragnącej. Lacan jest krytykowany za to, że jego uczniowie ponownie zamknęli psychozę w ramach edypalnych poprzez pojęcie „wykluczenia" (forclusion) imienia ojca — schizofrenik nie cierpi na brak symbolicznego ojca, lecz na edypalizację, która jest mu siłą narzucana.</p>
<p><strong>Neurotyzacja versus schizofrenizacja</strong></p>
<p>Nerwica jest wynikiem pomyślnej „neurotyzacji" — wtłoczenia pragnienia w edypalny trójkąt i terytorializm kozetki analityka. Neurotyk jest „wyleczony" w tym sensie, że zaakceptował edypalną ramę i poczucie winy jako normę. Psychoza pojawia się, gdy podmiot opiera się edypalizacji — jeśli proces deterytorializacji zostanie brutalnie przerwany, psychotyk „wycofuje się" na CbO, co może prowadzić do katatonii.</p>
<p>Schizoanaliza proponuje odwrotny ruch: zamiast neurotyzować (edypalizować) psychotyka, należy „schizofrenizować" pole analizy — uwolnić pragnienie z paranoicznych struktur państwa i rodziny. Nie chodzi o wywoływanie choroby klinicznej, lecz o uwolnienie schizofrenicznego procesu, który jest pozytywną siłą twórczą. Wielki artysta, według Deleuze'a i Guattariego, to ten, który przechodzi przez „schizofreniczny mur" — styl nie jest formą ekspresji, lecz siłą, która rozsadza język od środka. Linie ujścia nie są wycofaniem, lecz twórczym aktem „stwarzania ujścia" dla całego systemu.</p>
<p><strong>Dwa bieguny inwestycji</strong></p>
<p>Inwestycje pragnienia w pole społeczne mogą mieć dwa bieguny. Biegun paranoiczno-reakcyjny inwestuje w struktury molowe — naród, rasę wyższą i aparat państwa. Wspiera centralne formacje suwerenne, dąży do terytorializacji i zakleszcza pragnienie w kodach. Biegun schizo-rewolucyjny podąża liniami ujścia, dekoduje przepływy i dąży do absolutnej deterytorializacji. To rozróżnienie nie pokrywa się z rozróżnieniem na prawicę i lewicę — grupa rewolucyjna na poziomie interesu klasowego może być paranoiczna i reakcyjna na poziomie pragnienia (jak biurokracja stalinowska).</p>
<h4 class="r-h3">6.6 Proces</h4>
<p>Ostatnia sekcja rozdziału drugiego stanowi kulminację argumentacji, redefiniując schizofrenię z jednostki klinicznej na uniwersalny proces ontologiczny i historyczny.</p>
<p><strong>Breakthrough versus breakdown</strong></p>
<p>Rozróżnienie to, zapożyczone z nurtu antypsychiatrii (Laing, Cooper), jest kluczowe. Przełom (breakthrough) to pozytywny proces deterytorializacji — „podróż inicjacyjna" i doświadczenie transcendentalne, które rozbija normalne „Ja". Upadek (breakdown) to schizofrenia kliniczna — „autystyczny wrak" produkowany przez szpitale i edypalizację. Choroba kliniczna nie jest skutkiem procesu, lecz wynikiem jego przerwania lub uwięzienia w próżni przez system represji. Proces staje się patologiczny wyłącznie wtedy, gdy zostaje brutalnie przerwany lub gdy uczyni się z niego ostateczny cel.</p>
<p><strong>Tożsamość natury, przemysłu i historii</strong></p>
<p>Proces niesie w sobie tożsamość trzech dziedzin, tradycyjnie rozdzielanych: natury (Homo natura), przemysłu (produkcja jako taka) i historii (Homo historia). Człowiek i natura nie są przeciwstawnymi terminami, lecz tą samą rzeczywistością produkcji. Schizofrenik jest „wiecznym sługą maszyn świata", doświadczającym tej tożsamości w sposób bezpośredni i niezmediowany.</p>

<p><strong>Trzy formy socius: Ziemia, Despota, Kapitał</strong></p>
<p>Socius jest zdefiniowany jako „ciało pełne", które w danej formacji społecznej stanowi instancję antyprodukcji. Jego rolą nie jest samo wytwarzanie, lecz nakładanie się na procesy produkcji i przypisywanie ich sobie jako „quasi-przyczyny". Jest to społeczny odpowiednik CbO jednostki — historycznie ukształtowane „ciało pełne", które pełni tę samą funkcję zapisu na poziomie zbiorowym.</p>

<h4 class="r-h3">7.2 Pierwotna maszyna terytorialna</h4>
<p>Analiza maszyny terytorialnej stanowi jeden z najbardziej oryginalnych fragmentów <em>Anty-Edypa</em>, łączący etnologię strukturalną (Lévi-Strauss, Mauss), filozofię Nietzschego i antropologię polityczną Clastresa w spójną teorię „dzikich" społeczeństw jako maszyn kodujących. Deleuze i Guattari podkreślają, że maszyna terytorialna nie opiera się na zasadzie terytorium geograficznego (to domena państwa), lecz na Ziemi jako „ciele pełnym" — instancji antyprodukcji, która przypisuje sobie wszystkie siły wytwórcze jako „quasi-przyczynę". W przeciwieństwie do kapitalizmu, który prywatyzuje organy, maszyna terytorialna inwestuje kolektywnie w organy — organy są „wykrawane" w socius i traktowane jako obiekty częściowe należące do wspólnoty.</p>

<p><strong>Alians i filiacja</strong></p>
<p>Działanie maszyny terytorialnej opiera się na odmienianiu sieci aliansów i filiacji. Filiacja (pokrewieństwo w linii prostej) ma charakter administracyjny i hierarchiczny — jest „zapasem filiacyjnym" lub kapitałem trwałym maszyny społecznej. Alians (powinowactwo w linii bocznej) ma charakter polityczny i ekonomiczny — wyraża władzę i stosunki ekonomiczne, działając jako „kapitał obrotowy". Co istotne, alians nie wywodzi się z filiacji — oba systemy przecinają się na powierzchni terytorialnej, a ekonomia społeczna przechodzi właśnie przez alians.</p>
<p><strong>Dług skończony</strong></p>
<p>W społeczeństwach pierwotnych dług zastępuje wymianę — to istotna korekta wobec tradycji antropologicznej idącej od Marcela Maussa i Claude'a Lévi-Straussa, którzy traktowali wymianę jako fundamentalny fakt społeczny. Deleuze i Guattari twierdzą, że wymiana jest wtórna wobec inskrypcji i długu: to nie wymiana darów konstytuuje społeczeństwo, lecz zapis długu na powierzchni socius. Dług jest kierunkiem ruchu na powierzchni zapisu — zapas (filiacja) to energia potencjalna, natomiast dług (alians) to energia kinetyczna. W „zimnej ekonomii" pierwotnej dar musi być odwzajemniony z naddatkiem, co tworzy wartość dodatkową kodu. Nierównowaga dłużnika i wierzyciela nie jest patologią, lecz fundamentem systemu — cały aparat represji służy „wytresowaniu" człowieka, by stał się zdolny do aliansu i spłacania długu.</p>
<p>Dług jest jednak skończony i mobilny — w przeciwieństwie do nieskończonego długu maszyny despotycznej. Społeczeństwa pierwotne, jak wykazuje Pierre Clastres, aktywnie zapobiegają koncentracji władzy i długu w jednych rękach, egzorcyzmując tym samym widmo państwa (Urstaat).</p>
<p><strong>Triada głos-grafizm-oko</strong></p>

<p><strong>Wartość dodatkowa kodu</strong></p>
